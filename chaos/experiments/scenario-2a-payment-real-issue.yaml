# Mandate #15 — Scenario 2, BƯỚC A: sự cố thật ở `payment`
#
# Scenario 2 ("KHÔNG BỊ CHE" / no masking) chạy bằng HAI file, apply CÁCH NHAU ~5 PHÚT:
#   A (file này) — sự cố thật ở `payment`, 10 phút                   -> apply ở T+0
#   B (scenario-2b-recommendation-noise.yaml) — nhiễu vô hại, 2 phút -> apply ở T+5
#
# VÌ SAO PHẢI TÁCH LÀM 2 (đừng gộp lại thành 1 file cho gọn):
# Engine của AIO02 start cùng lúc bơm lỗi và cần ~5 phút warm-up mới bắt đầu phát hiện,
# nên cửa sổ nó thực sự quan sát là T+5 → T+10. Nếu nhiễu bắn ở T+0 và chỉ sống 60 giây
# thì tới lúc engine tỉnh, nhiễu đã tắt từ lâu — engine không bao giờ thấy nó, và bài
# test "không bị che" tự động biến thành bản sao của Scenario 1 (chỉ còn mỗi payment).
# Kết quả trông vẫn đẹp nhưng KHÔNG chứng minh được gì về khả năng chống masking.
#
# Cách khác đã cân nhắc và loại: kéo nhiễu dài 8-10 phút để nó chồng lên cửa sổ engine.
# Làm vậy thì nhiễu không còn là "spike ngắn thoáng qua" như spec mô tả, và vì nó sống
# gần bằng sự cố thật nên engine gom theo cửa sổ thời gian cũng ra kết quả y hệt gom
# theo đồ thị phụ thuộc — mất sạch sức phân biệt của bài test.
#
# Dòng thời gian mong muốn:
#   T+0 ........ apply file A. payment bắt đầu nghẽn.
#   T+5 ........ engine warm-up xong, bắt đầu nhìn. Apply file B NGAY lúc này.
#   T+5..T+7 ... CẢ HAI cùng sống -> đây là lúc chấm "tách được 2 cluster hay không".
#   T+7..T+10 .. chỉ còn payment -> chứng minh engine không bỏ sót sự cố thật sau khi
#                nhiễu tắt, và không dính kiểu "chỉ thấy payment nhờ nhiễu đã hết".
#   T+10 ....... file A tự hết hạn, netem tự gỡ.
#
# `recommendation` và `payment` không có cạnh nào nối nhau trong đồ thị phụ thuộc (cả
# hai chỉ chung ancestor `frontend`), nên tách được 2 cluster là bằng chứng engine thật
# sự dùng topology chứ không chỉ dùng cửa sổ thời gian.
#
# ĐO GÌ:
#   - Phải ra ĐÚNG 2 incident cluster, không phải 1 (bị gộp) và không phải 3+ (vỡ vụn)
#   - Cluster `payment` phải được xếp mức nghiêm trọng cao hơn `recommendation`
#   - KHÔNG được bỏ sót `payment` — đây là cái spec sợ nhất
#   - Mốc t0 lấy từ `.status.conditions[type=AllInjected].lastTransitionTime` của TỪNG
#     file, KHÔNG phải lúc bấm apply (chaos-daemon mất vài giây mới bơm xong).
#
# ⚠️ `mode: all` = CẢ 2 replica payment đều chậm 5s -> luồng thanh toán gãy thật, SLO
# checkout vỡ thật suốt 10 phút. Báo trước cho CDO01 + AIO02 khung giờ chạy.
#
# CHẠY:  kubectl apply -f chaos/experiments/scenario-2a-payment-real-issue.yaml
# GỠ:    kubectl delete -f chaos/experiments/scenario-2a-payment-real-issue.yaml
#
# `duration: 10m` là chốt an toàn: hết giờ Chaos Mesh tự gỡ netem kể cả khi không ai
# nhớ delete. Đừng bỏ field này đi.
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: m15-s2-payment-real-issue
  namespace: techx-tf3
spec:
  action: delay
  mode: all
  duration: 10m
  selector:
    namespaces:
      - techx-tf3
    labelSelectors:
      app.kubernetes.io/name: payment
  delay:
    latency: "5s"
    jitter: "500ms"
    correlation: "50"
