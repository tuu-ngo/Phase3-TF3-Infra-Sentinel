# Mandate #15 — Scenario 4: "TỰ KHẮC PHỤC THÀNH CÔNG" (remediation actually works)
#
# ⚠️ File này CHỈ là một phần của Scenario 4. Phải chạy theo runbook:
#    chaos/experiments/scenario-4-capacity-shortage.md
#    Apply riêng file này KHÔNG tạo ra kịch bản đúng (thiếu bước hạ replica + tăng tải).
#
# VÌ SAO CẦN KỊCH BẢN NÀY (khác hẳn 3 kịch bản kia):
# Scenario 1/2/3 đo được engine PHÁT HIỆN đúng và RA QUYẾT ĐỊNH đúng, nhưng KHÔNG đo
# được "sau khi engine hành động thì sự cố hết". Lý do: netem/stress do Chaos Mesh giữ
# tới hết `duration`, nên engine có scale hay restart thì lỗi vẫn còn nguyên. Sự cố hết
# là do hết giờ, không phải do engine. Chấm "khắc phục thành công" trên 3 kịch bản đó
# thì engine chắc chắn trượt dù nó không làm gì sai.
#
# Kịch bản này thuộc loại lỗi KHÁC: **thiếu năng lực phục vụ**. `payment` bị hạ còn 1
# replica và replica đó bị ép cạn CPU, trong khi tải đang cao. Đây là loại sự cố mà
# THÊM REPLICA CHỮA ĐƯỢC THẬT — vì pod mới sinh ra KHÔNG bị stress (Chaos Mesh chốt
# danh sách pod đích tại thời điểm inject, không đuổi theo pod mới).
#
# => Engine scale payment 1 -> 3: hai pod mới hoàn toàn khoẻ gánh phần lớn traffic
#    => checkout p95 tụt xuống THẬT. Đây là thứ đo được và chấm được.
#
# `mode: all` ở đây an toàn vì lúc apply chỉ còn ĐÚNG 1 replica (runbook đã hạ trước),
# nên chỉ 1 pod bị stress. Sau khi engine scale lên, các pod mới không nằm trong danh
# sách đã chốt -> vẫn khoẻ. Đó chính là cơ chế làm cho remediation có tác dụng thật.
#
# ⚠️ CHƯA CHẠY NHÁP BAO GIỜ. Trước buổi chấm phải chạy thử một lần để chỉnh `load`:
# payment có CPU limit chỉ 300m (chặt hơn recommendation nhiều) và readinessProbe
# tcpSocket timeout 2s. Ép quá tay thì pod fail probe -> bị loại khỏi endpoint -> sự cố
# trượt từ "quá tải" thành "chết hẳn", và lúc đó scale vẫn cứu được nhưng chữ ký sự cố
# lại sai giống bài học Scenario 1 (xem PR #400). Chạy nháp: xem payment còn `1/1 Ready`
# và checkout còn phục vụ được (dù chậm) thì mới đạt.
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: m15-s4-payment-cpu-saturation
  namespace: techx-tf3
spec:
  mode: all
  duration: 10m
  selector:
    namespaces:
      - techx-tf3
    labelSelectors:
      app.kubernetes.io/name: payment
  containerNames:
    - payment
  stressors:
    cpu:
      # payment limit = 300m. load 60 (~600m yêu cầu) ép cạn hẳn cgroup để tạo nghẽn
      # rõ rệt dưới tải. Nếu chạy nháp thấy pod mất Ready thì hạ dần (40 -> 30).
      workers: 1
      load: 60
