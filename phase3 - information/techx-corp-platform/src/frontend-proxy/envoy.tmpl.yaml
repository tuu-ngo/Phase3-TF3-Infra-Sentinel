# rebuild-sync (retry after checkout main.go fix): touch to build alongside accounting/cart/checkout/product-catalog/product-reviews/recommendation under one CI tag

static_resources:
  listeners:
    - address:
        socket_address:
          address: "${ENVOY_ADDR}"
          port_value: ${ENVOY_PORT}
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                tracing:
                  spawn_upstream_span: true
                  provider:
                    name: envoy.tracers.opentelemetry
                    typed_config:
                      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                      grpc_service:
                        envoy_grpc:
                          cluster_name: opentelemetry_collector_grpc
                        timeout: 0.250s
                      service_name: ${OTEL_SERVICE_NAME}
                      resource_detectors:
                        - name: envoy.tracers.opentelemetry.resource_detectors.environment
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.tracers.opentelemetry.resource_detectors.v3.EnvironmentResourceDetectorConfig
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: frontend
                      domains:
                        - "*"
                      routes:
                        # Mandate #1 (network-exposure): /loadgen, /jaeger, /grafana, /feature
                        # (flagd-ui) removed from the public route - ops UIs, private-only now
                        # (SSM bastion + kubectl port-forward, see docs/runbooks/private-access-to-ops-uis.md).
                        # /flagservice/ is NOT a UI - it's the flag-read path services depend on
                        # at runtime; do not remove it, that's a disqualifying flagd violation.
                        - match: { prefix: "/otlp-http/" }
                          route: { cluster: opentelemetry_collector_http, prefix_rewrite: "/" }
                        - match: { prefix: "/images/" }
                          route: { cluster: image-provider, prefix_rewrite: "/" }
                        - match: { prefix: "/flagservice/" }
                          route: { cluster: flagservice, prefix_rewrite: "/", timeout: 0s }
                        # PM-154 (load-shedding): /api/checkout protected — đặt TRƯỚC
                        # catch-all "/" để match trước. Không có typed_per_filter_config
                        # local_ratelimit → dùng global bucket 10 000 token/s → không bao
                        # giờ bị shed. Checkout = luồng tiền, ưu tiên tuyệt đối.
                        - match: { prefix: "/api/checkout" }
                          name: checkout_protected
                          route: { cluster: frontend }
                        # PM-154 (load-shedding): /api/cart protected — cart write ops
                        # (add/update/delete item) cùng nhóm ưu tiên với checkout;
                        # không bị shed để giữ session mua hàng trong khi browse bị hạn.
                        - match: { prefix: "/api/cart" }
                          name: cart_protected
                          route: { cluster: frontend }
                        # PM-154 (load-shedding): /api/products/<id> protected — product
                        # detail là bước đầu của checkout journey:
                        #   locustfile.py add_to_cart():
                        #     GET /api/products/<id>  ← bước này
                        #     POST /api/cart           ← cart_protected
                        #     POST /api/checkout       ← checkout_protected
                        # Prefix "/api/products/" (có trailing slash) CHỈ match detail
                        # pages, KHÔNG match GET /api/products (list) — list là browse.
                        # Nếu detail bị shed → add_to_cart fail → checkout funnel vỡ.
                        - match: { prefix: "/api/products/" }
                          name: product_detail_protected
                          route: { cluster: frontend }
                        # PM-154 (load-shedding): browse/homepage catch-all — SHADOW MODE.
                        # filter_enabled=100%: Envoy đếm request qua token bucket và ghi
                        # stat browse_rate_limiter.rate_limited nhưng CHƯĄ reject
                        # (filter_enforced=0%). Mục đích: quan sát thực tế bao nhiêu request
                        # bị count vượt ngưỡng trước khi bật enforce.
                        #
                        # Token bucket cần điền sau khi có PM-153 evidence:
                        #   max_tokens = floor(0.70 × browse_breakpoint_RPS
                        #                      / frontend-proxy Ready count)
                        # Ví dụ: breakpoint 400 RPS, 3 Ready pods:
                        #   max_tokens = floor(0.70 × 400 / 3) = 93
                        # HIỆN TẠI: 999999 (sất ượng, shadow mode không reject thực tế).
                        # THAY THẾ giá trị này trong enforce PR sau khi shadow đạt.
                        - match: { prefix: "/" }  # catch-all — giữ cuối
                          name: browse_shedable
                          route: { cluster: frontend }
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: browse_rate_limiter
                              token_bucket:
                                # Shadow threshold: 100 token/s/pod.
                                # Cơ sở tính: Mandate-02 baseline 200 users → ước tính
                                # ~150 browse RPS tổng / 2 proxy pod min ≈ 75 RPS/pod.
                                # Ở 1.5× overload test (~112 RPS/pod) counter SẼ tick.
                                # filter_enforced=0% → không reject thực tế.
                                # THAY THẾ bằng floor(0.70×breakpoint_RPS/proxy_ready)
                                # từ PM-153 evidence trước khi tạo enforce PR (PM-154b).
                                max_tokens: 100
                                tokens_per_fill: 100
                                fill_interval: 1s
                              filter_enabled:
                                runtime_key: browse_rate_limit_enabled
                                default_value:
                                  numerator: 100   # ON: Envoy đếm để có stat
                                  denominator: HUNDRED
                              filter_enforced:
                                runtime_key: browse_rate_limit_enforced
                                default_value:
                                  numerator: 0     # SHADOW: 0% — KHÔNG reject, chỉ đếm
                                  denominator: HUNDRED
                              response_headers_to_add:
                                # Header sẽ active khi flip enforced=100% trong enforce PR
                                - header:
                                    key: x-techx-load-shed
                                    value: browse
                                  keep_empty_value: true
                http_filters:
                  - name: envoy.filters.http.fault
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
                      max_active_faults: 100
                      delay:
                        header_delay: {}
                        percentage:
                          numerator: 100
                  # Mandate-19 (load-shedding): Local rate limit filter — in-process
                  # token bucket chạy trực tiếp trong Envoy, không cần Redis external.
                  # Global bucket đặt cực cao (10 000/s) vì việc giới hạn thực tế
                  # được cấu hình per-route trên browse_shedable route phía trên.
                  # checkout_protected route KHÔNG có per-route override → dùng
                  # global bucket này → không bao giờ bị shed (10k >> thực tế).
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: local_rate_limiter
                      # Global bucket: cực cao — chỉ làm fallback, per-route override
                      # trên browse_shedable mới là bucket thực tế cần quan tâm.
                      token_bucket:
                        max_tokens: 10000
                        tokens_per_fill: 10000
                        fill_interval: 1s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 0     # SHADOW: global fallback cũng 0% — khới tạo an toàn
                          denominator: HUNDRED
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                access_log:
                  - name: envoy.access_loggers.open_telemetry
                    typed_config:
                      "@type": "type.googleapis.com/envoy.extensions.access_loggers.open_telemetry.v3.OpenTelemetryAccessLogConfig"
                      common_config:
                        log_name: "otel_envoy_access_log"
                        grpc_service:
                          envoy_grpc:
                            cluster_name: opentelemetry_collector_grpc
                        transport_api_version: "V3"
                      body:
                        # yamllint disable-line rule:line-length
                        string_value: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %RESPONSE_CODE_DETAILS% %CONNECTION_TERMINATION_DETAILS% \"%UPSTREAM_TRANSPORT_FAILURE_REASON%\" %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% \"%REQ(X-FORWARDED-FOR)%\" \"%REQ(USER-AGENT)%\" \"%REQ(X-REQUEST-ID)%\" \"%REQ(:AUTHORITY)%\" \"%UPSTREAM_HOST%\" %UPSTREAM_CLUSTER% %UPSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_LOCAL_ADDRESS% %DOWNSTREAM_REMOTE_ADDRESS% %REQUESTED_SERVER_NAME% %ROUTE_NAME%\n"
                      resource_attributes:
                        values:
                          - key: "service.name"
                            value:
                              string_value: ${OTEL_SERVICE_NAME}
                      attributes:
                        values:
                          - key: "destination.address"
                            value:
                              string_value: "%UPSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          - key: "event.name"
                            value:
                              string_value: "proxy.access"
                          - key: "server.address"
                            value:
                              string_value: "%DOWNSTREAM_LOCAL_ADDRESS%"
                          - key: "source.address"
                            value:
                              string_value: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%"
                          - key: "upstream.cluster"
                            value:
                              string_value: "%UPSTREAM_CLUSTER%"
                          - key: "upstream.host"
                            value:
                              string_value: "%UPSTREAM_HOST%"
                          - key: "user_agent.original"
                            value:
                              string_value: "%REQ(USER-AGENT)%"
                          - key: "url.full"
                            value:
                              string_value: "%REQ(:SCHEME)%://%REQ(:AUTHORITY)%%REQ(:PATH)%"
                          - key: "url.path"
                            value:
                              string_value: "%REQ(:PATH)%"
                          - key: "url.query"
                            value:
                              string_value: "%REQ(:QUERY)%"
                          - key: "url.template"
                            value:
                              string_value: "%ROUTE_NAME%"
  clusters:
    - name: opentelemetry_collector_grpc
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: opentelemetry_collector_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${OTEL_COLLECTOR_HOST}
                      port_value: ${OTEL_COLLECTOR_PORT_GRPC}
    - name: opentelemetry_collector_http
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: opentelemetry_collector_http
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${OTEL_COLLECTOR_HOST}
                      port_value: ${OTEL_COLLECTOR_PORT_HTTP}
    - name: frontend
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      # circuit_breakers (max_requests: 4096) được tách sang PM-153 PR riêng
      # để giữ PM-154 focus vào route classification + rate-limit only.
      load_assignment:
        cluster_name: frontend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FRONTEND_HOST}
                      port_value: ${FRONTEND_PORT}
    - name: image-provider
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: image-provider
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${IMAGE_PROVIDER_HOST}
                      port_value: ${IMAGE_PROVIDER_PORT}
    - name: flagservice
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: flagservice
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FLAGD_HOST}
                      port_value: ${FLAGD_PORT}
    - name: flagd-ui
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: flagd-ui
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${FLAGD_UI_HOST}
                      port_value: ${FLAGD_UI_PORT}
    - name: loadgen
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: loadgen
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${LOCUST_WEB_HOST}
                      port_value: ${LOCUST_WEB_PORT}
    - name: grafana
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: grafana
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${GRAFANA_HOST}
                      port_value: ${GRAFANA_PORT}
    - name: jaeger
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: jaeger
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${JAEGER_HOST}
                      port_value: ${JAEGER_UI_PORT}
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: ${ENVOY_ADMIN_PORT}
layered_runtime:
  layers:
    - name: static_layer_0
      static_layer:
        envoy:
          resource_limits:
            listener:
              example_listener_name:
                connection_limit: 10000
