{{- if .Values.otelGateway.enabled }}
{{- $gateway := .Values.otelGateway }}
{{- $collectorConfig := index .Values "opentelemetry-collector" "config" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway
  labels:
    helm.sh/chart: {{ include "techx-corp.chart" . }}
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: otel-gateway
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    opentelemetry.io/name: otel-gateway
data:
  relay.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
    exporters:
      {{- toYaml $collectorConfig.exporters | nindent 6 }}
    processors:
      {{- toYaml $collectorConfig.processors | nindent 6 }}
    {{- with $collectorConfig.connectors }}
    connectors:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, resource, transform, batch]
          exporters: [otlp/jaeger, spanmetrics]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [opensearch]
      telemetry:
        metrics:
          level: detailed
          readers:
            - periodic:
                interval: 10000
                timeout: 5000
                exporter:
                  otlp:
                    protocol: http/protobuf
                    endpoint: http://localhost:4318
                    insecure: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  labels:
    helm.sh/chart: {{ include "techx-corp.chart" . }}
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: otel-gateway
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    opentelemetry.io/name: otel-gateway
spec:
  replicas: {{ $gateway.replicas | default 2 }}
  minReadySeconds: {{ $gateway.minReadySeconds | default 15 }}
  revisionHistoryLimit: {{ $gateway.revisionHistoryLimit | default 5 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-gateway
      opentelemetry.io/name: otel-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-gateway
        app.kubernetes.io/component: otel-gateway
        app.kubernetes.io/part-of: techx-corp
        opentelemetry.io/name: otel-gateway
    spec:
      serviceAccountName: {{ $gateway.serviceAccountName | default "otel-collector" }}
      terminationGracePeriodSeconds: {{ $gateway.terminationGracePeriodSeconds | default 45 }}
      securityContext:
        {{- toYaml $gateway.podSecurityContext | nindent 8 }}
      # Mandate 13 elastic (batch 3, last/riskiest): opt-in NodePool flash-sale-spot
      # + hard spread ca hostname va zone (minDomains:2), thay podAntiAffinity mem
      # cu - cung pattern da fix o batch 1 (PR #319). otel-gateway khong dung co
      # che schedulingRules chung (template rieng), nen sua truc tiep o day.
      nodeSelector:
        techx.io/workload: elastic
      tolerations:
        - key: techx.io/workload
          operator: Equal
          value: elastic
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-gateway
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-gateway
      containers:
        - name: opentelemetry-collector
          {{- if $gateway.image.digest }}
          image: "{{ $gateway.image.repository }}@{{ $gateway.image.digest }}"
          {{- else }}
          image: "{{ $gateway.image.repository }}:{{ $gateway.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ $gateway.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --config=/conf/relay.yaml
          ports:
            - name: otlp
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          resources:
            {{- toYaml $gateway.resources | nindent 12 }}
          securityContext:
            {{- toYaml $gateway.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          volumeMounts:
            - name: otel-gateway-config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: otel-gateway-config
          configMap:
            name: otel-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: otel-gateway
  labels:
    helm.sh/chart: {{ include "techx-corp.chart" . }}
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/component: otel-gateway
    app.kubernetes.io/part-of: techx-corp
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    opentelemetry.io/name: otel-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-gateway
    opentelemetry.io/name: otel-gateway
  ports:
    - name: otlp
      port: 4317
      targetPort: otlp
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
    - name: metrics
      port: 8888
      targetPort: metrics
      protocol: TCP
{{- end }}
