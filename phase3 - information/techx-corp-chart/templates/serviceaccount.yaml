{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  {{- $_ := set . "serviceAccount" .Values.serviceAccount }}
  name: {{ include "techx-corp.serviceAccountName" . }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.annotations }}
  annotations:
    {{- range $key, $value := .Values.serviceAccount.annotations }}
    {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}

{{- define "techx-corp.componentServiceAccount" -}}
{{- if and .componentScopedServiceAccount .serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "techx-corp.serviceAccountName" . }}
  labels:
    {{- include "techx-corp.labels" . | nindent 4 }}
  {{- if .serviceAccount.annotations }}
  annotations:
    {{- range $key, $value := .serviceAccount.annotations }}
    {{- printf "%s: %s" $key (tpl $value $ | quote) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
