      - --dir
      - /data
    additionalVolumeMounts:
      - name: valkey-cart-data
        mountPath: /data
    additionalVolumes:
      - name: valkey-cart-data
        persistentVolumeClaim:
          claimName: valkey-cart
    persistence:
      enabled: true            # chart tạo PVC 'valkey-cart' (valkey-cart-pvc.yaml). AOF ghi vào PVC
      size: 1Gi
      storageClassName: gp2
    strategy:                  # RWO PVC + Deployment -> Recreate tránh deadlock rolling update
      type: Recreate
    podAnnotations:            # datastore: đừng để cluster-autoscaler evict lúc scale-down
      cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
      # Mandate 2 do-not-disrupt đã gỡ (PM-108 cleanup) - cùng lý do với postgresql phía trên,
      # valkey giờ chạy trên node group stateful riêng, ngoài Karpenter flash-sale-spot NodePool.
    readinessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 5
  flagd:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 75Mi
    env:
      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: FLAGD_OTEL_COLLECTOR_URI
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 60MiB
      - name: FLAGD_SYNC_TOKEN
        valueFrom:
          secretKeyRef:
            name: flagd-sync-token
            key: token
    command:
      - "/flagd-build"
      - "start"
      - "--port"
      - "8013"
      - "--ofrep-port"
      - "8016"
      - "--sources"
      - '[{"uri":"https://122.248.223.194.sslip.io/flags.json","provider":"http","authHeader":"Bearer $(FLAGD_SYNC_TOKEN)"}]'
    # Full copy of components.flagd.sidecarContainers[0] from the chart
    # default (../techx-corp-chart/values.yaml), not just an imageOverride -
    # Helm replaces arrays wholesale on override (no per-item merge), so a
    # partial or empty array here silently drops flagd-ui entirely. That is
    # exactly what the previous `sidecarContainers: []` did, undetected,
    # since the initial GitOps bootstrap (2026-07-12). If flagd-ui's env,
    # resources, or volumeMounts change in the chart default, update this
    # copy in the same PR or production will silently diverge from it.
    #
    # Already happened once: PR #207 added `securityContext` to flagd-ui in
    # the chart default (2026-07-17) but this copy predated it, so production
    # ran flagd-ui without the intended non-root hardening until this fix
    # (caught via Kyverno Audit PolicyViolation on containers[1], not a crash
    # - flagd-ui runs fine either way, this only closes the drift).
    sidecarContainers:
      - name: flagd-ui
        imageOverride:
          digest: sha256:fe39070cf36d8d1f1524c6aa7c67393d4ee5871813dd453e36bb79e38910417c
        useDefault:
          env: true
        service:
          port: 4000
        env:
          - name: FLAGD_METRICS_EXPORTER
            value: otel
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://$(OTEL_COLLECTOR_NAME):4318
          - name: FLAGD_UI_PORT
            value: "4000"
          - name: SECRET_KEY_BASE
            value: yYrECL4qbNwleYInGJYvVnSkwJuSQJ4ijPTx5tirGUXrbznFIBFVJdPl5t6O9ASw
          - name: PHX_HOST
            value: localhost
        resources:
          requests:
            cpu: 100m
            memory: 250Mi
          limits:
            cpu: 200m
            memory: 250Mi
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: config-rw
            mountPath: /app/data
  frontend-proxy:
    replicasManagedExternally: true
    # Mandate 3: graceful shutdown - RIENG frontend-proxy dai hon cac service khac (5s) vi day la
    # ALB target (type=ip), khong phai chi Service noi bo cluster. Endpoint noi bo propagate nhanh
    # (~vai giay) nhung ALB deregistration cham hon: sau DeregisterTargets, ALB can ~chuc giay de
    # ngung route connection moi toi target dang draining. preStop 20s giu pod phuc vu suot cua so
    # do (khop deregistration_delay=30s dat o gitops/edge/frontend-proxy-internal-ingress.yaml).
    # grace 40s = 20s preStop + 20s cho Envoy drain in-flight sau SIGTERM.
    terminationGracePeriodSeconds: 40
    lifecycle:
      preStop:
        sleep:
          seconds: 20
    # Mandate 3 (bảo trì không downtime): ép 2 replica ra 2 AZ khác nhau (hard, DoNotSchedule)
    # => luôn ở 2 node khác nhau => drain 1 node không bao giờ mất cả service. hostname soft
    # (ScheduleAnyway) để HPA scale-up trong 1 AZ không bị kẹt lịch. Pattern giống checkout.
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0        # rollout không bao giờ tụt dưới số replica mong muốn
        maxSurge: 1
    # Mandate 13 elastic (batch 3): opt-in NodePool flash-sale-spot + hard spread
    # ca hostname va zone (minDomains:2) - pattern da fix o batch 1 (PR #319).
    schedulingRules:
      nodeSelector:
        techx.io/workload: elastic
      tolerations:
        - key: techx.io/workload
          operator: Equal
          value: elastic
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: frontend-proxy
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: frontend-proxy
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2        # cổng vào DUY NHẤT (Envoy) — SPOF của toàn hệ thống
    imageOverride: # mandate-01: gỡ route Envoy - xem comment imageOverride đầu components:
      digest: sha256:6b8243bbf1d91d1bc195703fdbe2e8029a948c38b5717efec8b41ecf1847b3f0
      tag: 43dcf62-29569108433-frontend-proxy
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    ingress:
      annotations:
        alb.ingress.kubernetes.io/healthcheck-path: /
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
      enabled: false
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
              port: 8080
      ingressClassName: alb

rollouts:
  checkout:
    replicasManagedExternally: true
