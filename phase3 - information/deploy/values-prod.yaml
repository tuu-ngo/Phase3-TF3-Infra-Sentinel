    # (ScheduleAnyway) để HPA scale-up trong 1 AZ không bị kẹt lịch. Pattern giống checkout.
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0        # rollout không bao giờ tụt dưới số replica mong muốn
        maxSurge: 1
    # Mandate 13 elastic (batch 2): opt-in NodePool flash-sale-spot + hard spread
    # ca hostname va zone (minDomains:2) - pattern da fix o batch 1 (PR #319).
    schedulingRules:
      nodeSelector:
        techx.io/workload: elastic
      tolerations:
        - key: techx.io/workload
          operator: Equal
          value: elastic
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: product-catalog
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: product-catalog
    replicas: 2        # backend traffic cao nhất + có crash history (REL-14)
    imageOverride: # CDO02 fix main.go - xem comment imageOverride đầu components:
      digest: sha256:8bfd3b9a23a2fd7624bc116844248ccd2bbb246635927899f0b4208fd179d2ed
      tag: 43dcf62-29569108433-product-catalog
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 500m
        memory: 64Mi
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
    # Mandate #8 buoc 2 (cutover Postgres -> RDS, runbook §5 buoc 4): DB_CONNECTION_STRING -> RDS
    # qua secret techx-tf3-postgres-conn (format Go DSN, sslmode=require). product-catalog CHI DOC.
    envOverrides:
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: techx-tf3-postgres-conn
