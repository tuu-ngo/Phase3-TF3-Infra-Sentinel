# Production values override for techx-corp-chart
# Extracted from EKS live cluster active values to ensure 100% parity and zero downtime.

default:
  image:
    # Switched to the new AWS account's ECR (temporary account, see team notes).
    # Tag stays as-is until the build-push-ecr.yml run for frontend-proxy finishes -
    # bump it in the same PR as the envoy.tmpl.yaml route removal once that image exists.
    repository: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp
    tag: 58b13f2

grafana:
  # REL-17: Grafana giờ có hostname riêng qua Cloudflare (grafana.arthur-ngo.org).
  # Base chart values.yaml đặt root_url = http://%(domain)s:%(http_port)s/grafana +
  # serve_from_sub_path=true (cho đường truy cập /grafana subpath cũ) → khi vào qua
  # hostname riêng, Grafana redirect tuyệt đối về http://localhost:3000/grafana (domain
  # rỗng mặc định localhost) → ERR_CONNECTION_REFUSED. Override để phục vụ ở ROOT của
  # hostname riêng. Đánh đổi đã chấp nhận: port-forward localhost:3000 cho Grafana sẽ
  # redirect về hostname này thay vì đứng độc lập (dùng Cloudflare URL thay thế).
  grafana.ini:
    server:
      domain: grafana.arthur-ngo.org
      root_url: "%(protocol)s://%(domain)s/"
      serve_from_sub_path: false
  sidecar:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        cpu: 150m
        memory: 256Mi
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 1Gi

jaeger:
  jaeger:
    # Mandate 2: OOMKilled thật giữa lúc load test 200 user (Exit Code 137, xác nhận qua
    # kubectl describe) - limit cũ 1Gi bị bỏ sót khi tăng Prometheus/OpenSearch/Kafka trước đó.
    # Volume trace tăng mạnh dưới 200 user, tăng limit tương tự nhóm quan sát kia.
    resources:
      requests:
        cpu: 100m
        memory: 750Mi
      limits:
        cpu: 500m
        memory: 2Gi

