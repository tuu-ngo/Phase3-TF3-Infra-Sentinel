otel-node-agent:
  # Re-enabled 22/07/2026 after verifying CPU headroom on all 7 nodes (min free
  # 555m on the tightest node ip-10-0-8-134, vs this DaemonSet's 10m/pod request -
  # 55x margin). ip-10-0-26-153, the node that caused the original Pending
  # incident (only 15m free at the time), now has 565m free after batch2/3
  # Karpenter elastic migration moved load off the on-demand fleet.
  enabled: true
  # Without tolerations this DaemonSet skips nodes carrying the custom taint
  # techx.io/workload=<elastic|stateful> - confirmed live: it only scheduled on
  # 4/7 nodes, missing both Karpenter elastic Spot nodes (now running 11
  # services from the batch 2/3 migration) and the stateful node (postgres/
  # valkey). Old otel-collector-agent ran on all 7 nodes (no such taint existed
  # when it was deployed), so this closes a real coverage gap vs what it's
  # meant to replace.
  tolerations:
    - key: techx.io/workload
      operator: Equal
      value: elastic
      effect: NoSchedule
    - key: techx.io/workload
      operator: Equal
      value: stateful
      effect: NoSchedule
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

components:
  # imageOverride (per-component) - dùng khi build/deploy lại 1 service riêng lẻ mà
  # KHÔNG bump default.image.tag dùng chung ở trên. build-push-ecr.yml giờ build scoped
  # theo service đổi (xem workflow) - bump default.image.tag sẽ làm MỌI service không có
  # tag đó bị pull lỗi -> ImagePullBackOff hàng loạt. Giá trị hiện tại ở mỗi
  # imageOverride.tag dưới đây = no-op (khớp default.image.tag hiện có). Đổi thành
  # "<tag-CI-vừa-build>-<service>" (FULL string - chart KHÔNG tự nối hậu tố tên service
  # cho imageOverride.tag, khác với default.image.tag) sau khi build-push-ecr.yml build
  # xong service đó, trước khi tạo PR. Đang set cho: frontend-proxy (mandate-01, gỡ route
  # Envoy) + accounting/cart/checkout/product-catalog/product-reviews/recommendation
  # (fix app-code từ CDO02, xem handoff-cdo02-to-cdo01-deploy.md).
  #
  # REL-01 (ADR 0001 — pre-work bước 1 nâng cấp EKS 1.32→1.34): replicas ≥2 cho nhóm
  # đường ra tiền + gateway, để node rolling-replace lúc upgrade không đứt checkout.
  # PDB đi kèm ở gitops/infrastructure/pdb-checkout.yaml.
  # Đặt theo TÍNH SẴN SÀNG (chống SPOF), không theo tải — traffic hiện ~demo scale
  # (frontend 1.4 rps, product-catalog 1.1 rps, còn lại <0.1 rps). Scale theo tải là việc
  # của HPA sau. LƯU Ý: KHÔNG thêm replicas cho postgresql/kafka/valkey (stateful singleton
  # — sẽ hỏng dữ liệu; HA datastore đi qua RDS/ElastiCache, xem ADR 0002).
  ad:
    replicasManagedExternally: true
    imageOverride:
      digest: sha256:04d1460d9a48b35182d85b17d416f4a4d16b74011bb42fdee417f288340a2052
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  frontend:
    replicasManagedExternally: true
    # Mandate 3: graceful shutdown. preStop sleep giu pod phuc vu them 5s SAU khi bi go khoi
    # Service endpoints (tranh race: traffic con route toi pod dang terminate -> reset). Native
    # sleep handler (khong can shell, chay ca voi container distroless). grace 30s = 25s cho
    # in-flight hoan tat sau SIGTERM.
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        sleep:
          seconds: 5
    # Mandate 3 (bảo trì không downtime): ép 2 replica ra 2 AZ khác nhau (hard, DoNotSchedule)
    # => luôn ở 2 node khác nhau => drain 1 node không bao giờ mất cả service. hostname soft
    # (ScheduleAnyway) để HPA scale-up trong 1 AZ không bị kẹt lịch. Pattern giống checkout.
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0        # rollout không bao giờ tụt dưới số replica mong muốn
        maxSurge: 1
    # Mandate 13 elastic (batch 3): opt-in NodePool flash-sale-spot + hard spread
    # ca hostname va zone (minDomains:2) - pattern da fix o batch 1 (PR #319).
    schedulingRules:
      nodeSelector:
        techx.io/workload: elastic
      tolerations:
        - key: techx.io/workload
          operator: Equal
          value: elastic
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: frontend
        - maxSkew: 1
          minDomains: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: frontend
    imageOverride:
      digest: sha256:e6874914182473a905354d9e17c55fc1aec7d690c5f1428758c0b6c78e114e9e
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2        # web khách thấy, traffic HTTP cao nhất
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 500m
        memory: 250Mi
  product-catalog:
    replicasManagedExternally: true
    # Mandate 3: graceful shutdown. preStop sleep giu pod phuc vu them 5s SAU khi bi go khoi
