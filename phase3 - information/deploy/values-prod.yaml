# Production values override for techx-corp-chart
# Extracted from EKS live cluster active values to ensure 100% parity and zero downtime.

default:
  image:
    # Switched to the new AWS account's ECR (temporary account, see team notes).
    # Tag stays as-is until the build-push-ecr.yml run for frontend-proxy finishes -
    # bump it in the same PR as the envoy.tmpl.yaml route removal once that image exists.
    repository: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp
    tag: 58b13f2

grafana:
  sidecar:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        cpu: 150m
        memory: 256Mi
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 1Gi

jaeger:
  jaeger:
    resources:
      requests:
        cpu: 100m
        memory: 500Mi
      limits:
        cpu: 500m
        memory: 1Gi

opensearch:
  resources:
    requests:
      cpu: 250m
      memory: 750Mi
    limits:
      cpu: 750m
      memory: 1100Mi

prometheus:
  server:
    resources:
      requests:
        cpu: 150m
        memory: 450Mi
      limits:
        cpu: 800m
        memory: 800Mi

components:
  # imageOverride (per-component) - dùng khi build/deploy lại 1 service riêng lẻ mà
  # KHÔNG bump default.image.tag dùng chung ở trên. build-push-ecr.yml giờ build scoped
  # theo service đổi (xem workflow) - bump default.image.tag sẽ làm MỌI service không có
  # tag đó bị pull lỗi -> ImagePullBackOff hàng loạt. Giá trị hiện tại ở mỗi
  # imageOverride.tag dưới đây = no-op (khớp default.image.tag hiện có). Đổi thành
  # "<tag-CI-vừa-build>-<service>" (FULL string - chart KHÔNG tự nối hậu tố tên service
  # cho imageOverride.tag, khác với default.image.tag) sau khi build-push-ecr.yml build
  # xong service đó, trước khi tạo PR. Đang set cho: frontend-proxy (mandate-01, gỡ route
  # Envoy) + accounting/cart/checkout/product-catalog/product-reviews/recommendation
  # (fix app-code từ CDO02, xem handoff-cdo02-to-cdo01-deploy.md).
  #
  # REL-01 (ADR 0001 — pre-work bước 1 nâng cấp EKS 1.32→1.34): replicas ≥2 cho nhóm
  # đường ra tiền + gateway, để node rolling-replace lúc upgrade không đứt checkout.
  # PDB đi kèm ở gitops/infrastructure/pdb-checkout.yaml.
  # Đặt theo TÍNH SẴN SÀNG (chống SPOF), không theo tải — traffic hiện ~demo scale
  # (frontend 1.4 rps, product-catalog 1.1 rps, còn lại <0.1 rps). Scale theo tải là việc
  # của HPA sau. LƯU Ý: KHÔNG thêm replicas cho postgresql/kafka/valkey (stateful singleton
  # — sẽ hỏng dữ liệu; HA datastore đi qua RDS/ElastiCache, xem ADR 0002).
  ad:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 500m
        memory: 300Mi
  frontend:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2        # web khách thấy, traffic HTTP cao nhất
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 500m
        memory: 250Mi
  product-catalog:
    replicas: 2        # backend traffic cao nhất + có crash history (REL-14)
    imageOverride: # CDO02 fix main.go - xem comment imageOverride đầu components:
      tag: 6a3fe95-product-catalog
    resources:
      requests:
        cpu: 100m
        memory: 16Mi
      limits:
        cpu: 500m
        memory: 20Mi
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  cart:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2
    imageOverride: # CDO02 fix HealthCheckService.cs - xem comment imageOverride đầu components:
      tag: 6a3fe95-cart
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 160Mi
  checkout:
    replicas: 2
    imageOverride: # CDO02 fix kafka/producer.go + main.go - xem comment imageOverride đầu components:
      tag: 7527509-checkout
    # Backlog #14 controlled failure: this temporary override must be reverted
    # after the AnalysisRun proves automatic canary abort.
    envOverrides:
      - name: PAYMENT_ADDR
        value: payment.invalid:8085
    resources:
      requests:
        cpu: 100m
        memory: 16Mi
      limits:
        cpu: 500m
        memory: 20Mi
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  payment:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 300m
        memory: 180Mi
  currency:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 8Mi
      limits:
        cpu: 300m
        memory: 20Mi
  shipping:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 8Mi
      limits:
        cpu: 150m
        memory: 20Mi
  quote:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2        # shipping phụ thuộc quote
    resources:
      requests:
        cpu: 50m
        memory: 24Mi
      limits:
        cpu: 150m
        memory: 40Mi
  product-reviews:
    replicas: 2        # đứng sau tính năng AI tóm tắt review
    imageOverride: # CDO02 fix database.py + product_reviews_server.py - xem comment imageOverride đầu components:
      tag: 6a3fe95-product-reviews
    resources:
      requests:
        cpu: 100m
        memory: 80Mi
      limits:
        cpu: 500m
        memory: 150Mi
    readinessProbe:
      grpc:
        port: 3551
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 3551
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  recommendation:
    imageOverride: # CDO02 fix recommendation_server.py - xem comment imageOverride đầu components:
      tag: 6a3fe95-recommendation
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 500Mi
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  accounting:
    imageOverride: # CDO02 fix Consumer.cs - xem comment imageOverride đầu components:
      tag: 6a3fe95-accounting
    resources:
      requests:
        cpu: 50m
        memory: 150Mi
      limits:
        cpu: 200m
        memory: 350Mi
  email:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 100Mi
  fraud-detection:
    resources:
      requests:
        cpu: 50m
        memory: 250Mi
      limits:
        cpu: 300m
        memory: 300Mi
  image-provider:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8081
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8081
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 50Mi
  kafka:
    resources:
      requests:
        cpu: 100m
        memory: 650Mi
      limits:
        cpu: 500m
        memory: 700Mi
  llm:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 300m
        memory: 256Mi
  load-generator:
    envOverrides:
      - name: LOCUST_AUTOSTART
        value: "true"
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 1500Mi
  postgresql:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 100Mi
    envOverrides:              # PGDATA vào subdir để lost+found của EBS volume không làm initdb từ chối
      - name: PGDATA
        value: /var/lib/postgresql/data/pgdata
    additionalVolumeMounts:
      - name: postgresql-data
        mountPath: /var/lib/postgresql/data
    additionalVolumes:
      - name: postgresql-data
        # EBS CSI is not installed in this cluster, so the gp2 PVC cannot bind.
        # Keep PostgreSQL available on ephemeral storage until CSI is ready.
        emptyDir: {}
    strategy:                  # RWO PVC + Deployment -> Recreate tránh deadlock rolling update
      type: Recreate
    podAnnotations:            # datastore: đừng để cluster-autoscaler evict lúc scale-down
      cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    readinessProbe:
      tcpSocket:
        port: 5432
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 5432
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 5
  valkey-cart:
    podSecurityContext:
      fsGroup: 999
    resources:
      requests:
        cpu: 50m
        memory: 8Mi
      limits:
        cpu: 200m
        memory: 20Mi
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --dir
      - /data
    additionalVolumeMounts:
      - name: valkey-cart-data
        mountPath: /data
    additionalVolumes:
      - name: valkey-cart-data
        emptyDir: {}
    persistence:
      # EBS CSI is not installed in this cluster. Keeping the gp2 PVC enabled
      # leaves Valkey Pending and takes cart/checkout out of service.
      enabled: false
      size: 1Gi
      storageClassName: gp2
    strategy:                  # RWO PVC + Deployment -> Recreate tránh deadlock rolling update
      type: Recreate
    podAnnotations:            # datastore: đừng để cluster-autoscaler evict lúc scale-down
      cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    readinessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 5
  flagd:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 75Mi
    env:
      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: FLAGD_OTEL_COLLECTOR_URI
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 60MiB
      - name: FLAGD_SYNC_TOKEN
        valueFrom:
          secretKeyRef:
            name: flagd-sync-token
            key: token
    command:
      - "/flagd-build"
      - "start"
      - "--port"
      - "8013"
      - "--ofrep-port"
      - "8016"
      - "--sources"
      - '[{"uri":"https://122.248.223.194.sslip.io/flags.json","provider":"http","authHeader":"Bearer $(FLAGD_SYNC_TOKEN)"}]'
    sidecarContainers: []
  frontend-proxy:
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2        # cổng vào DUY NHẤT (Envoy) — SPOF của toàn hệ thống
    imageOverride: # mandate-01: gỡ route Envoy - xem comment imageOverride đầu components:
      tag: 6a3fe95-frontend-proxy
    resources:
      requests:
        cpu: 100m
        memory: 32Mi
      limits:
        cpu: 500m
        memory: 65Mi
    ingress:
      annotations:
        alb.ingress.kubernetes.io/healthcheck-path: /
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
      enabled: false
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
              port: 8080
      ingressClassName: alb
