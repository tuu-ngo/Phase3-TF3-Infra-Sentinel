      tag: 3252f28-29655310361-cart
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 160Mi
    # Mandate #8 buoc 2 (cutover Valkey -> ElastiCache, runbook mandate-08-managed-cutover.md §4 buoc 4):
    # LAT DOC sang ElastiCache: primary = ElastiCache (TLS + auth), dual-write DAO CHIEU -> ghi
    # nguoc ve valkey-cart cu (plaintext) de GIU DUONG LUI (rollback zero-loss cho toi §8).
    # CHI merge SAU khi da co proof hoi tu (miss=0) o buoc 1. envOverrides khop name -> override
    # VALKEY_ADDR goc (valkey-cart:6379) thanh ElastiCache. Rolling restart maxUnavailable:0 -> 0 rot request.
    envOverrides:
      # primary -> ElastiCache (doc + ghi chinh)
      - name: VALKEY_ADDR
        value: master.techx-tf3-valkey.pkeslh.apse1.cache.amazonaws.com:6379
      - name: VALKEY_TLS
        value: "true"
      - name: VALKEY_AUTH_TOKEN
        valueFrom:
          secretKeyRef:
            name: techx-tf3-valkey-auth
            key: auth_token
      # Mandate #8 §8: DA GO dual-write dao chieu ve valkey-cart cu. Truoc day cart ghi song song
      # ve kho cu de giu "duong lui nong" (Plan A). Nay chuyen sang Plan B (snapshot ElastiCache
      # + PITR) truoc khi xoa kho cu, nen bo dual-write: khong con ghi vao valkey-cart, va cart
      # se khong loi khi kho cu bien mat.
  checkout:
    # Mandate 3: checkout is managed by Argo Rollouts, but the Rollout still reuses this
    # pod template through workloadRef. Keep the same graceful shutdown contract as the
    # other revenue services so drain/rollout does not cut an in-flight PlaceOrder.
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        sleep:
          seconds: 5
    replicas: 2
    imageOverride: # CDO02 fix kafka/producer.go + main.go - xem comment imageOverride đầu components:
      digest: sha256:efb7eff627bf064ee66c8f77a76d0e1ce222b96fe98fe6c6a94b5af25b13ae33
      tag: 33d062e-29720289535-checkout
    # Mandate #8 buoc 3/3 (cutover Kafka -> MSK, runbook §6 buoc 2): PRODUCER TRUOC.
    # checkout doi KAFKA_ADDR -> MSK bootstrap (nhieu broker, phan tach dau phay - da fix
    # split o main.go PR #271) + SASL_SSL + SCRAM tu secret techx-tf3-kafka-scram.
    # An toan hon 0010: image efb7eff co fail-fast (PR #269) -> neu noi MSK loi, pod KHONG
    # Ready -> canary dung khung, KHONG outage. Consumer (accounting + fraud-detection) doi
    # sang MSK o PR SAU, chi khi kafka cu LAG=0 (Earliest -> an sach backlog tu day).
    envOverrides:
      - name: KAFKA_ADDR
        value: b-1.techxtf3kafka.4xa0zb.c6.kafka.ap-southeast-1.amazonaws.com:9096,b-2.techxtf3kafka.4xa0zb.c6.kafka.ap-southeast-1.amazonaws.com:9096,b-3.techxtf3kafka.4xa0zb.c6.kafka.ap-southeast-1.amazonaws.com:9096
      - name: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL
      - name: KAFKA_SASL_USERNAME
        valueFrom:
          secretKeyRef:
            name: techx-tf3-kafka-scram
            key: username
      - name: KAFKA_SASL_PASSWORD
        valueFrom:
          secretKeyRef:
            name: techx-tf3-kafka-scram
            key: password
