# Production values override for techx-corp-chart
# Extracted from EKS live cluster active values to ensure 100% parity and zero downtime.

default:
  image:
    # Switched to the new AWS account's ECR (temporary account, see team notes).
    # Tag stays as-is until the build-push-ecr.yml run for frontend-proxy finishes -
    # bump it in the same PR as the envoy.tmpl.yaml route removal once that image exists.
    repository: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp
    tag: 58b13f2

grafana:
  # REL-17: Grafana giờ có hostname riêng qua Cloudflare (grafana.arthur-ngo.org).
  # Base chart values.yaml đặt root_url = http://%(domain)s:%(http_port)s/grafana +
  # serve_from_sub_path=true (cho đường truy cập /grafana subpath cũ) → khi vào qua
  # hostname riêng, Grafana redirect tuyệt đối về http://localhost:3000/grafana (domain
  # rỗng mặc định localhost) → ERR_CONNECTION_REFUSED. Override để phục vụ ở ROOT của
  # hostname riêng. Đánh đổi đã chấp nhận: port-forward localhost:3000 cho Grafana sẽ
  # redirect về hostname này thay vì đứng độc lập (dùng Cloudflare URL thay thế).
  grafana.ini:
    server:
      domain: grafana.arthur-ngo.org
      root_url: "%(protocol)s://%(domain)s/"
      serve_from_sub_path: false
  sidecar:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        cpu: 150m
        memory: 256Mi
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 1Gi

jaeger:
  jaeger:
    # Mandate 2: OOMKilled thật giữa lúc load test 200 user (Exit Code 137, xác nhận qua
    # kubectl describe) - limit cũ 1Gi bị bỏ sót khi tăng Prometheus/OpenSearch/Kafka trước đó.
    # Volume trace tăng mạnh dưới 200 user, tăng limit tương tự nhóm quan sát kia.
    resources:
      requests:
        cpu: 100m
        memory: 750Mi
      limits:
        cpu: 500m
        memory: 2Gi

opensearch:
  resources:
    requests:
      cpu: 250m
      memory: 750Mi
    limits:
      cpu: 750m
      memory: 1600Mi

prometheus:
  server:
    resources:
      requests:
        cpu: 150m
        memory: 450Mi
      limits:
        cpu: 800m
        memory: 1200Mi

opentelemetry-collector:
  resources:
    limits:
      memory: 350Mi

components:
  # imageOverride (per-component) - dùng khi build/deploy lại 1 service riêng lẻ mà
  # KHÔNG bump default.image.tag dùng chung ở trên. build-push-ecr.yml giờ build scoped
  # theo service đổi (xem workflow) - bump default.image.tag sẽ làm MỌI service không có
  # tag đó bị pull lỗi -> ImagePullBackOff hàng loạt. Giá trị hiện tại ở mỗi
  # imageOverride.tag dưới đây = no-op (khớp default.image.tag hiện có). Đổi thành
  # "<tag-CI-vừa-build>-<service>" (FULL string - chart KHÔNG tự nối hậu tố tên service
  # cho imageOverride.tag, khác với default.image.tag) sau khi build-push-ecr.yml build
  # xong service đó, trước khi tạo PR. Đang set cho: frontend-proxy (mandate-01, gỡ route
  # Envoy) + accounting/cart/checkout/product-catalog/product-reviews/recommendation
  # (fix app-code từ CDO02, xem handoff-cdo02-to-cdo01-deploy.md).
  #
  # REL-01 (ADR 0001 — pre-work bước 1 nâng cấp EKS 1.32→1.34): replicas ≥2 cho nhóm
  # đường ra tiền + gateway, để node rolling-replace lúc upgrade không đứt checkout.
  # PDB đi kèm ở gitops/infrastructure/pdb-checkout.yaml.
  # Đặt theo TÍNH SẴN SÀNG (chống SPOF), không theo tải — traffic hiện ~demo scale
  # (frontend 1.4 rps, product-catalog 1.1 rps, còn lại <0.1 rps). Scale theo tải là việc
  # của HPA sau. LƯU Ý: KHÔNG thêm replicas cho postgresql/kafka/valkey (stateful singleton
  # — sẽ hỏng dữ liệu; HA datastore đi qua RDS/ElastiCache, xem ADR 0002).
  ad:
    replicasManagedExternally: true
    imageOverride:
      digest: sha256:a45fdb96972c11c4b75261ef1205f96c92f5c23fb5edbc47f3b6bb95eb3f27bb
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  frontend:
    replicasManagedExternally: true
    # Mandate 3: graceful shutdown. preStop sleep giu pod phuc vu them 5s SAU khi bi go khoi
    # Service endpoints (tranh race: traffic con route toi pod dang terminate -> reset). Native
    # sleep handler (khong can shell, chay ca voi container distroless). grace 30s = 25s cho
    # in-flight hoan tat sau SIGTERM.
    terminationGracePeriodSeconds: 30
    lifecycle:
      preStop:
        sleep:
          seconds: 5
    # Mandate 3 (bảo trì không downtime): ép 2 replica ra 2 AZ khác nhau (hard, DoNotSchedule)
    # => luôn ở 2 node khác nhau => drain 1 node không bao giờ mất cả service. hostname soft
    # (ScheduleAnyway) để HPA scale-up trong 1 AZ không bị kẹt lịch. Pattern giống checkout.
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0        # rollout không bao giờ tụt dưới số replica mong muốn
        maxSurge: 1
    schedulingRules:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              opentelemetry.io/name: frontend
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              opentelemetry.io/name: frontend
    imageOverride:
      digest: sha256:047faed92fe4ecf8b2bb7d3d99c191a2d495f41024abc44c204fe94a9ae019a3
    # REL-03: tcpSocket probe (an toan - chi check port mo, khong false-fail vi thieu
    # grpc-health/sai HTTP path). liveness long hon readiness.
    readinessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    replicas: 2        # web khách thấy, traffic HTTP cao nhất
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 500m
        memory: 250Mi
