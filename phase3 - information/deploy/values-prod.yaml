# Production values override for techx-corp-chart
# Extracted from EKS live cluster active values to ensure 100% parity and zero downtime.

default:
  image:
    # Switched to the new AWS account's ECR (temporary account, see team notes).
    # Tag stays as-is until the build-push-ecr.yml run for frontend-proxy finishes -
    # bump it in the same PR as the envoy.tmpl.yaml route removal once that image exists.
    repository: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp
    tag: d2bc367

grafana:
  resources:
    requests:
      memory: 250Mi

components:
  # REL-01 (ADR 0001 — pre-work bước 1 nâng cấp EKS 1.32→1.34): replicas ≥2 cho nhóm
  # đường ra tiền + gateway, để node rolling-replace lúc upgrade không đứt checkout.
  # PDB đi kèm ở gitops/infrastructure/pdb-checkout.yaml.
  # Đặt theo TÍNH SẴN SÀNG (chống SPOF), không theo tải — traffic hiện ~demo scale
  # (frontend 1.4 rps, product-catalog 1.1 rps, còn lại <0.1 rps). Scale theo tải là việc
  # của HPA sau. LƯU Ý: KHÔNG thêm replicas cho postgresql/kafka/valkey (stateful singleton
  # — sẽ hỏng dữ liệu; HA datastore đi qua RDS/ElastiCache, xem ADR 0002).
  frontend:
    replicas: 2        # web khách thấy, traffic HTTP cao nhất
  product-catalog:
    replicas: 2        # backend traffic cao nhất + có crash history (REL-14)
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  cart:
    replicas: 2
  checkout:
    replicas: 2
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  payment:
    replicas: 2
  currency:
    replicas: 2
  shipping:
    replicas: 2
  quote:
    replicas: 2        # shipping phụ thuộc quote
  product-reviews:
    replicas: 2        # đứng sau tính năng AI tóm tắt review
    readinessProbe:
      grpc:
        port: 3551
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 3551
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  recommendation:
    readinessProbe:
      grpc:
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    livenessProbe:
      tcpSocket:
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  accounting:
    resources:
      limits:
        memory: 350Mi
  valkey-cart:
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --dir
      - /data
    additionalVolumeMounts:
      - name: valkey-cart-data
        mountPath: /data
    additionalVolumes:
      - name: valkey-cart-data
        persistentVolumeClaim:
          claimName: valkey-cart
    persistence:
      enabled: true
      size: 1Gi
  flagd:
    env:
      - name: FLAGD_METRICS_EXPORTER
        value: otel
      - name: FLAGD_OTEL_COLLECTOR_URI
        value: $(OTEL_COLLECTOR_NAME):4317
      - name: GOMEMLIMIT
        value: 60MiB
      - name: FLAGD_SYNC_TOKEN
        valueFrom:
          secretKeyRef:
            name: flagd-sync-token
            key: token
    command:
      - "/flagd-build"
      - "start"
      - "--port"
      - "8013"
      - "--ofrep-port"
      - "8016"
      - "--sources"
      - '[{"uri":"https://122.248.223.194.sslip.io/flags.json","provider":"http","authHeader":"Bearer $(FLAGD_SYNC_TOKEN)"}]'
    sidecarContainers: []
  frontend-proxy:
    replicas: 2        # cổng vào DUY NHẤT (Envoy) — SPOF của toàn hệ thống
    # Tag riêng cho frontend-proxy - KHÔNG dùng chung default.image.tag với 17 service
    # còn lại. Lý do: build-push-ecr.yml giờ build scoped theo service đổi (chỉ
    # frontend-proxy cho lần sửa route Envoy này), nên ECR sẽ KHÔNG có
    # <tag-mới>-checkout / -cart / -... — nếu bump default.image.tag lên tag mới thay
    # vì dùng imageOverride ở đây, 17 service kia sẽ pull 1 tag không tồn tại và
    # ImagePullBackOff hàng loạt. imageOverride.tag phải là FULL tag như CI đã push
    # (templates/_objects.tpl KHÔNG tự nối "-frontend-proxy" khi có imageOverride.tag,
    # khác với default.image.tag).
    # TODO (sau khi build-push-ecr.yml build xong frontend-proxy dưới commit mới):
    # đổi giá trị dưới đây thành "<tag-mới>-frontend-proxy" trước khi tạo PR.
    imageOverride:
      tag: d2bc367-frontend-proxy
    ingress:
      annotations:
        alb.ingress.kubernetes.io/healthcheck-path: /
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
      enabled: true
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
              port: 8080
      ingressClassName: alb
