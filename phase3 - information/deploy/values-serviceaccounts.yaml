      automountServiceAccountToken: false

  postgresql:
    serviceAccount:
      create: true
      name: "techx-postgresql"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 8: flagd — MIGRATE CUỐI CÙNG ───────────────────────────────────
  # flagd giữ BTC sync token. SA riêng để ngăn shared identity với service khác.
  # Token sync (Bearer) được truyền qua args, KHÔNG qua K8s SA token →
  # automountServiceAccountToken: false an toàn ở đây.
  #
  # KIỂM TRA ĐẶC BIỆT sau rollout:
  #   kubectl logs deploy/flagd -n techx-tf3 --tail=20
  #   → Phải thấy sync success, không có "auth" error với BTC endpoint.

  flagd:
    serviceAccount:
      create: true
      name: "techx-flagd"
      annotations: {}
      automountServiceAccountToken: false
