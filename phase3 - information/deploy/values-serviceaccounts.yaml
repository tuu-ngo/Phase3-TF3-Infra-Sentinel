# values-serviceaccounts.yaml
# T10 — Tạo 22 ServiceAccount riêng, 1 SA per service.
#
# Chiến lược migration:
#   Bật từng service một (uncomment từ trên xuống dưới).
#   Sau mỗi helm upgrade, kiểm tra log 403/401 và rollout status.
#   Nếu pass → uncomment service tiếp theo.
#
# Cơ chế:
#   Khi component có key "serviceAccount:", chart tự tạo SA riêng
#   (techx-corp.componentServiceAccount) và Deployment dùng SA đó.
#   automountServiceAccountToken: false vì không service nào cần K8s API.
#
# Lưu ý Helm merge:
#   File này chỉ khai báo serviceAccount per component.
#   Các config khác (imageOverride, resources, probes, replicas...) vẫn lấy
#   từ values-prod.yaml và values.yaml gốc — Helm deep-merge không ghi đè.
#   Thứ tự flag -f quan trọng (sau cùng thắng nếu trùng key):
#     -f deploy/values-prod.yaml -f deploy/values-serviceaccounts.yaml
#
# CẢNH BÁO checkout (Argo Rollouts):
#   checkout dùng Argo Rollouts (replicasManagedExternally: true trong values-prod.yaml).
#   Đổi serviceAccountName trong Deployment KHÔNG tự động propagate sang Rollout object.
#   Sau khi helm upgrade cho checkout, cần patch Rollout riêng:
#     kubectl -n techx-tf3 patch rollout checkout \
#       --type=merge -p '{"spec":{"template":{"spec":{"serviceAccountName":"techx-checkout"}}}}'
#
# CẢNH BÁO kafka (Recreate strategy + PVC):
#   Kafka dùng strategy: Recreate + PVC. Đổi SA sẽ terminate pod cũ TRƯỚC khi tạo pod mới
#   (khác RollingUpdate). Trong thời gian đó Kafka không available → checkout có thể
#   accumulated Kafka producer errors. Thực hiện ngoài giờ cao điểm.
#
# Deploy lệnh:
#   helm upgrade techx-corp ./techx-corp-chart \
#     --set default.image.repository=197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp \
#     -f deploy/values-flagd-sync.yaml \
#     -f deploy/values-prod.yaml \
#     -f deploy/values-serviceaccounts.yaml \
#     -n techx-tf3 --wait --timeout 180s
#
# Verify sau mỗi wave:
#   ./scripts/verify-sa-migration.sh <service-name>

components:

  # ── WAVE 1: Stateless, không trên checkout path ─────────────────────────
  # Rủi ro thấp nhất — migrate trước.

  image-provider:
    serviceAccount:
      create: true
      name: "techx-image-provider"
      annotations: {}
      automountServiceAccountToken: false

  ad:
    serviceAccount:
      create: true
      name: "techx-ad"
      annotations: {}
      automountServiceAccountToken: false

  recommendation:
    serviceAccount:
      create: true
      name: "techx-recommendation"
      annotations: {}
      automountServiceAccountToken: false

  quote:
    serviceAccount:
      create: true
      name: "techx-quote"
      annotations: {}
      automountServiceAccountToken: false

  currency:
    serviceAccount:
      create: true
      name: "techx-currency"
      annotations: {}
      automountServiceAccountToken: false

  email:
    serviceAccount:
      create: true
      name: "techx-email"
      annotations: {}
      automountServiceAccountToken: false

  shipping:
    serviceAccount:
      create: true
      name: "techx-shipping"
      annotations: {}
      automountServiceAccountToken: false

  load-generator:
    serviceAccount:
      create: true
      name: "techx-load-generator"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 2: AI/ML services ───────────────────────────────────────────────

  llm:
    serviceAccount:
      create: true
      name: "techx-llm"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 3: Data read path ───────────────────────────────────────────────

  product-catalog:
    serviceAccount:
      create: true
      name: "techx-product-catalog"
      annotations: {}
      automountServiceAccountToken: false

  product-reviews:
    serviceAccount:
      create: true
      name: "techx-product-reviews"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 4: Frontend layer ───────────────────────────────────────────────

  frontend:
    serviceAccount:
      create: true
      name: "techx-frontend"
      annotations: {}
      automountServiceAccountToken: false

  frontend-proxy:
    serviceAccount:
      create: true
      name: "techx-frontend-proxy"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 5: Async consumers ─────────────────────────────────────────────

  fraud-detection:
    serviceAccount:
      create: true
      name: "techx-fraud-detection"
      annotations: {}
      automountServiceAccountToken: false

  accounting:
    serviceAccount:
      create: true
      name: "techx-accounting"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 6: Revenue-critical path ────────────────────────────────────────
  # Cẩn thận nhất — rollout từng cái, verify trước khi sang cái tiếp theo.

  payment:
    serviceAccount:
      create: true
      name: "techx-payment"
      annotations: {}
      automountServiceAccountToken: false

  checkout:
    serviceAccount:
      create: true
      name: "techx-checkout"
      annotations: {}
      automountServiceAccountToken: false

  cart:
    serviceAccount:
      create: true
      name: "techx-cart"
      annotations: {}
      automountServiceAccountToken: false

  # ── WAVE 7: Stateful infrastructure ─────────────────────────────────────
  # SA thay đổi không ảnh hưởng data, nhưng restart pod stateful cần chú ý.

  kafka:
    serviceAccount:
      create: true
      name: "techx-kafka"
      annotations: {}
      automountServiceAccountToken: false

  valkey-cart:
    serviceAccount:
      create: true
      name: "techx-valkey-cart"
