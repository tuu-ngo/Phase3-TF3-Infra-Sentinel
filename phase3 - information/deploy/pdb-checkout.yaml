# REL-01 (pre-work cho ADR 0001): PodDisruptionBudget cho nhóm checkout.
# Chart techx-corp không có template PDB nên khai báo standalone (giống cách
# CDO01 thêm NetworkPolicy/ResourceQuota trong nhánh ArgoCD).
#
# minAvailable: 1 → khi node drain lúc upgrade, K8s giữ ít nhất 1 pod mỗi service
# sống trong lúc pod kia được reschedule. Bắt buộc đi kèm values-ha-checkout.yaml
# (replicas ≥2) — PDB minAvailable:1 với replicas:1 sẽ CHẶN drain hoàn toàn (deadlock).
#
# Selector dùng `opentelemetry.io/name` — đây là selector label thật của chart
# (templates/_helpers.tpl → techx-corp.selectorLabels), khớp chính xác pod từng service.
#
# Apply: kubectl -n techx-tf3 apply -f deploy/pdb-checkout.yaml
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cart-pdb
  namespace: techx-tf3
spec:
  minAvailable: 1
  selector:
    matchLabels:
      opentelemetry.io/name: cart
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: checkout-pdb
  namespace: techx-tf3
spec:
