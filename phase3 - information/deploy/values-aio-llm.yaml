# AIO: cắm LLM thật thay mock (envOverrides = upsert, không xoá env khác).
# Production-safe path: dùng IRSA riêng cho product-reviews để gọi Bedrock,
# không cấp quyền Bedrock cho toàn bộ workload đang dùng serviceAccount chung.
components:
  product-reviews:
    serviceAccount:
      create: true
      name: product-reviews-bedrock
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::197826770971:role/techx-corp-tf3-product-reviews-bedrock
    envOverrides:
      # Lựa chọn LLM Provider: 'openai' hoặc 'bedrock'
      - name: LLM_PROVIDER
        value: bedrock

      # Model tóm tắt review chính.
      - name: LLM_MODEL
        value: amazon.nova-lite-v1:0

      # Judge model sẽ mặc định về amazon.nova-micro-v1:0 trong code nếu không override.
      - name: AWS_REGION
        value: us-east-1

      # Mandate #8 buoc 2 (cutover Postgres -> RDS, runbook §5 buoc 4): DB_CONNECTION_STRING -> RDS
      # qua secret techx-tf3-postgres-conn (format libpq keyword, sslmode=require). product-reviews CHI DOC.
      # DAT O DAY (khong o values-prod.yaml): file nay override sau -> envOverrides list nay la list cuoi
      # cung, phai chua ca DB_CONNECTION_STRING neu khong Helm se clobber override tu values-prod.
      - name: DB_CONNECTION_STRING
        valueFrom:
          secretKeyRef:
            name: techx-tf3-postgres-conn
            key: libpq

      # Nếu cần rollback sang OpenAI/LiteLLM, thêm lại các biến sau:
      # - name: LLM_BASE_URL
      #   value: https://api.openai.com/v1
      # - name: OPENAI_API_KEY
      #   valueFrom: { secretKeyRef: { name: llm-api-key, key: key } }
