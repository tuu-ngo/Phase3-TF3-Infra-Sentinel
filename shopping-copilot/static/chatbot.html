<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Copilot — Debug Console</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:#0d1117; color:#c9d1d9; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:#0d1117; }
  ::-webkit-scrollbar-thumb { background:#30363d; border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#484f58; }

  /* ── Header ── */
  .header { background:#161b22; border-bottom:1px solid #30363d; padding:8px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .header h1 { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .header h1 .logo { color:#58a6ff; }
  .header .badge { font-size:10px; background:#1f6feb22; color:#58a6ff; border:1px solid #1f6feb44; padding:2px 8px; border-radius:4px; }
  .header-right { display:flex; align-items:center; gap:12px; }
  .status-indicator { display:flex; align-items:center; gap:6px; font-size:12px; color:#8b949e; }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .status-dot.ok { background:#3fb950; }
  .status-dot.busy { background:#d29922; }
  .status-dot.err { background:#f85149; }

  /* ── Session Bar ── */
  .session-bar { background:#0d1117; border-bottom:1px solid #21262d; padding:6px 20px; font-size:12px; display:flex; gap:20px; flex-shrink:0; flex-wrap:wrap; }
  .session-bar .field { color:#8b949e; display:flex; align-items:center; gap:4px; }
  .session-bar .field code { color:#e6edf3; background:#161b22; padding:1px 6px; border-radius:3px; font-size:11px; }
  .session-bar .field input { background:#0d1117; border:1px solid #30363d; border-radius:3px; padding:2px 6px; color:#e6edf3; font-size:11px; width:100px; outline:none; }
  .session-bar .field input:focus { border-color:#58a6ff; }

  /* ── Main Layout ── */
  .main { display:flex; flex:1; min-height:0; }
  .chat-panel { flex:1; display:flex; flex-direction:column; border-right:1px solid #21262d; min-width:300px; }
  .debug-panel { width:420px; display:flex; flex-direction:column; background:#0d1117; flex-shrink:0; border-left:1px solid #21262d; }

  /* ── Debug Panel Tabs ── */
  .debug-tabs { display:flex; border-bottom:1px solid #21262d; flex-shrink:0; }
  .debug-tab { padding:8px 14px; font-size:12px; font-weight:600; color:#8b949e; cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
  .debug-tab:hover { color:#e6edf3; background:#161b22; }
  .debug-tab.active { color:#58a6ff; border-bottom-color:#58a6ff; }
  .debug-content { flex:1; overflow-y:auto; display:none; }
  .debug-content.active { display:flex; flex-direction:column; }

  /* ── Timeline ── */
  .timeline { padding:10px; flex:1; overflow-y:auto; }
  .tl-step { display:flex; gap:10px; padding:6px 0; position:relative; cursor:pointer; border-radius:6px; transition:background .1s; }
  .tl-step:hover { background:#161b22; }
  .tl-step.selected { background:#1c2333; }
  .tl-line { display:flex; flex-direction:column; align-items:center; width:20px; flex-shrink:0; }
  .tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
  .tl-dot.PASS, .tl-dot.OK, .tl-dot.CACHE { background:#3fb950; }
  .tl-dot.BLOCK { background:#f85149; }
  .tl-dot.PENDING { background:#d29922; }
  .tl-dot.ERROR { background:#f85149; }
  .tl-connector { width:2px; flex:1; min-height:12px; background:#30363d; }
  .tl-body { flex:1; min-width:0; }
  .tl-header { display:flex; align-items:center; gap:6px; font-size:12px; }
  .tl-action { color:#58a6ff; font-weight:600; font-family:'Consolas','Courier New',monospace; }
  .tl-status { font-size:10px; padding:1px 6px; border-radius:3px; font-weight:600; }
  .tl-status.PASS, .tl-status.OK { background:#23863622; color:#3fb950; border:1px solid #23863644; }
  .tl-status.CACHE { background:#484f5822; color:#8b949e; border:1px solid #484f5844; }
  .tl-status.BLOCK { background:#da363322; color:#f85149; border:1px solid #da363344; }
  .tl-status.PENDING { background:#d2992222; color:#d29922; border:1px solid #d2992244; }
  .tl-status.ERROR { background:#da363322; color:#f85149; border:1px solid #da363344; }
  .tl-duration { color:#8b949e; font-size:11px; margin-left:auto; font-family:'Consolas','Courier New',monospace; }
  .tl-detail { color:#8b949e; font-size:11px; margin-top:2px; word-break:break-word; white-space:pre-wrap; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .tl-step.expanded .tl-detail { -webkit-line-clamp:unset; display:block; }
  .tl-arrow { color:#30363d; font-size:10px; margin-left:4px; }

  /* ── Step Detail Panel ── */
  .step-detail { border-top:1px solid #21262d; background:#0d1117; max-height:40%; overflow-y:auto; display:none; flex-shrink:0; }
  .step-detail.open { display:block; }
  .step-detail-header { padding:8px 14px; border-bottom:1px solid #21262d; display:flex; align-items:center; justify-content:space-between; }
  .step-detail-header h4 { font-size:12px; color:#8b949e; font-weight:600; }
  .step-detail-header .close-btn { background:none; border:none; color:#8b949e; cursor:pointer; font-size:16px; padding:0 4px; }
  .step-detail-header .close-btn:hover { color:#e6edf3; }
  .step-detail-body { padding:10px 14px; font-size:12px; }
  .detail-field { margin-bottom:8px; }
  .detail-field label { color:#8b949e; font-size:11px; display:block; margin-bottom:2px; text-transform:uppercase; letter-spacing:.3px; }
  .detail-field .val { color:#e6edf3; font-family:'Consolas','Courier New',monospace; font-size:11px; word-break:break-all; background:#161b22; padding:4px 8px; border-radius:4px; border:1px solid #21262d; white-space:pre-wrap; max-height:120px; overflow-y:auto; }

  /* ── Summary Bar ── */
  .summary-bar { border-top:1px solid #21262d; padding:8px 14px; display:flex; gap:12px; font-size:11px; color:#8b949e; flex-shrink:0; flex-wrap:wrap; }
  .summary-bar .stat { display:flex; align-items:center; gap:4px; }
  .summary-bar .stat strong { color:#e6edf3; }

  /* ── Chat Messages ── */
  .messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:85%; padding:10px 14px; border-radius:8px; font-size:14px; line-height:1.5; word-wrap:break-word; animation:fadeIn .2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; background:#1f6feb; color:#fff; border-bottom-right-radius:2px; }
  .msg.assistant { align-self:flex-start; background:#161b22; border:1px solid #30363d; border-bottom-left-radius:2px; }
  .msg.system { align-self:center; background:#1a2a1a; border:1px solid #23863644; color:#7ee787; font-size:12px; text-align:center; padding:6px 16px; max-width:90%; }
  .msg .meta { font-size:10px; color:#8b949e; margin-top:4px; }
  .msg .meta .tag { display:inline-block; background:#21262d; padding:0 4px; border-radius:2px; margin-right:4px; }

  /* ── Confirmation Bar ── */
  .confirm-bar { border-top:1px solid #30363d; padding:8px 12px; display:none; gap:8px; align-items:center; background:#1a2a1a; flex-shrink:0; }
  .confirm-bar.show { display:flex; }
  .confirm-bar .msg { color:#7ee787; font-size:13px; flex:1; }
  .confirm-bar button { font-size:12px; padding:6px 14px; border-radius:4px; border:none; cursor:pointer; font-weight:600; transition:opacity .15s; }
  .confirm-bar button:disabled { opacity:.5; cursor:not-allowed; }
  .btn-confirm { background:#238636; color:#fff; }
  .btn-confirm:hover:not(:disabled) { background:#2ea043; }
  .btn-cancel { background:#21262d; color:#c9d1d9; }
  .btn-cancel:hover:not(:disabled) { background:#30363d; }

  /* ── Input Bar ── */
  .input-bar { border-top:1px solid #30363d; padding:8px 12px; display:flex; gap:6px; background:#161b22; flex-shrink:0; }
  .input-bar input { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:8px 12px; color:#e6edf3; font-size:14px; outline:none; }
  .input-bar input:focus { border-color:#58a6ff; }
  .input-bar button { border-radius:6px; border:none; font-size:13px; font-weight:600; cursor:pointer; padding:8px 14px; white-space:nowrap; transition:opacity .15s; }
  .input-bar button:disabled { opacity:.5; cursor:not-allowed; }
  .btn-send { background:#238636; color:#fff; }
  .btn-send:hover:not(:disabled) { background:#2ea043; }
  .btn-new { background:#21262d; color:#c9d1d9; }
  .btn-new:hover:not(:disabled) { background:#30363d; }
  .btn-clear { background:#21262d; color:#c9d1d9; }
  .btn-clear:hover:not(:disabled) { background:#30363d; }

  /* ── Empty States ── */
  .empty-state { color:#484f58; text-align:center; padding:30px 14px; font-size:13px; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .empty-state .icon { font-size:28px; }
  .empty-state .hint { font-size:11px; color:#30363d; }

  /* ── Loading ── */
  .loading { display:inline-flex; align-items:center; gap:6px; }
  .spinner { width:14px; height:14px; border:2px solid #8b949e; border-top-color:#58a6ff; border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width:900px) { .main { flex-direction:column; } .debug-panel { width:100%; max-height:45%; border-left:none; border-top:1px solid #21262d; } }
  @media (max-width:600px) { .session-bar { gap:8px; } .session-bar .field { width:100%; } }
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <h1><span class="logo">&#9729;</span> Shopping Copilot <span class="badge">Debug Console</span></h1>
  <div class="header-right">
    <div class="status-indicator">
      <span class="status-dot ok" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </div>
</div>

<!-- ═══ Session Bar ═══ -->
<div class="session-bar">
  <div class="field">Session: <code id="sessionId">—</code></div>
  <div class="field">User: <input id="userId" value="test_user" spellcheck="false"></div>
</div>

<!-- ═══ Main ═══ -->
<div class="main">

  <!-- ─── Chat Panel ─── -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>

    <div class="confirm-bar" id="confirmBar">
      <span class="msg" id="confirmMsg">&#9203; Cần xác nhận hành động</span>
      <button class="btn-confirm" id="btnConfirm" onclick="confirmAction()">Xác nhận</button>
      <button class="btn-cancel" onclick="cancelConfirm()">Huỷ</button>
    </div>

    <div class="input-bar">
      <button class="btn-new" onclick="newSession()">+ Mới</button>
      <button class="btn-clear" onclick="clearTrace()">Clear trace</button>
      <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." autofocus>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">Gửi</button>
    </div>
  </div>

  <!-- ─── Debug Panel ─── -->
  <div class="debug-panel">
    <div class="debug-tabs">
      <div class="debug-tab active" data-tab="timeline" onclick="switchTab('timeline')">Timeline</div>
      <div class="debug-tab" data-tab="raw" onclick="switchTab('raw')">Raw JSON</div>
      <div class="debug-tab" data-tab="memory" onclick="switchTab('memory'); refreshMemory()">Memory</div>
    </div>

    <!-- Timeline Tab -->
    <div class="debug-content active" id="tab-timeline">
      <div class="timeline" id="timeline">
        <div class="empty-state">
          <div class="icon">&#128640;</div>
          <div>Chưa có request nào</div>
          <div class="hint">Gửi tin nhắn để xem trace từng bước</div>
        </div>
      </div>
      <div class="summary-bar" id="summaryBar" style="display:none">
        <div class="stat">Steps: <strong id="statSteps">0</strong></div>
        <div class="stat">Total: <strong id="statTime">0ms</strong></div>
        <div class="stat">Status: <strong id="statStatus">—</strong></div>
      </div>
    </div>

    <!-- Raw JSON Tab -->
    <div class="debug-content" id="tab-raw">
      <div class="timeline" style="padding:10px">
        <pre id="rawJson" style="font-family:'Consolas','Courier New',monospace;font-size:11px;color:#e6edf3;white-space:pre-wrap;word-break:break-all;background:#161b22;padding:12px;border-radius:6px;border:1px solid #21262d;overflow:auto;max-height:100%;">Chưa có dữ liệu.</pre>
      </div>
    </div>

    <!-- Memory Tab -->
    <div class="debug-content" id="tab-memory">
      <div style="padding:8px;display:flex;gap:6px;border-bottom:1px solid #21262d;flex-shrink:0">
        <button class="btn-new" onclick="refreshMemory()" style="font-size:11px;padding:4px 10px">Refresh</button>
      </div>
      <div class="timeline" id="memoryContent" style="flex:1;overflow-y:auto">
        <div class="empty-state"><div class="icon">&#128196;</div><div>Bấm Refresh để xem memory state</div></div>
      </div>
    </div>

    <!-- Step Detail (slide-up) -->
    <div class="step-detail" id="stepDetail">
      <div class="step-detail-header">
        <h4>Step Details</h4>
        <button class="close-btn" onclick="closeStepDetail()">&times;</button>
      </div>
      <div class="step-detail-body" id="stepDetailBody"></div>
    </div>
  </div>
</div>

<script>
// ── State ──
let sessionId = crypto.randomUUID().slice(0, 8);
let userId = 'test_user';
let pendingToken = null;
let lastResponse = null;
let selectedStepIndex = -1;

document.getElementById('sessionId').textContent = sessionId;

// ── DOM shortcuts ──
const $ = id => document.getElementById(id);
const chatInput = $('chatInput');

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── Status ──
function setStatus(ok, text) {
  const dot = $('statusDot');
  dot.className = 'status-dot';
  dot.classList.add(ok ? 'ok' : text === 'Đang xử lý...' ? 'busy' : 'err');
  $('statusText').textContent = text;
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.debug-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.debug-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
}

// ── Escape HTML ──
function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function scrollBottom(el) {
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

// ── Add Message ──
function addMessage(role, content, extra) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = esc(content);
  if (extra) {
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = extra;
    el.appendChild(meta);
  }
  $('messages').appendChild(el);
  scrollBottom($('messages'));
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  $('messages').appendChild(el);
  scrollBottom($('messages'));
}

// ── Timeline ──
function renderTimeline(steps) {
  const list = $('timeline');
  list.innerHTML = '';
  if (!steps || steps.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#128640;</div><div>Không có step nào</div></div>';
    $('summaryBar').style.display = 'none';
    return;
  }

  let totalMs = 0;
  steps.forEach((s, i) => {
    totalMs += s.duration_ms || 0;
    const step = document.createElement('div');
    step.className = 'tl-step' + (selectedStepIndex === i ? ' selected' : '');
    step.dataset.index = i;
    step.onclick = () => selectStep(i);

    step.innerHTML = `
      <div class="tl-line">
        <div class="tl-dot ${s.status}"></div>
        ${i < steps.length - 1 ? '<div class="tl-connector"></div>' : ''}
      </div>
      <div class="tl-body">
        <div class="tl-header">
          <span class="tl-action">${esc(s.action)}</span>
          <span class="tl-status ${s.status}">${s.status}</span>
          <span class="tl-duration">${s.duration_ms}ms</span>
          <span class="tl-arrow">${selectedStepIndex === i ? '&#9660;' : '&#9654;'}</span>
        </div>
        <div class="tl-detail">${esc(s.detail || '')}</div>
      </div>
    `;
    list.appendChild(step);
  });

  // Summary
  const finalStatus = steps[steps.length - 1].status;
  $('summaryBar').style.display = 'flex';
  $('statSteps').textContent = steps.length;
  $('statTime').textContent = totalMs + 'ms';
  $('statStatus').textContent = finalStatus;
  $('statStatus').style.color = finalStatus === 'OK' || finalStatus === 'PASS' ? '#3fb950' : finalStatus === 'BLOCK' || finalStatus === 'ERROR' ? '#f85149' : '#d29922';

  scrollBottom(list);
}

// ── Step Detail ──
function selectStep(index) {
  selectedStepIndex = index;
  const steps = lastResponse?.steps || [];
  if (lastResponse) renderTimeline(lastResponse.steps);

  const s = steps[index];
  if (!s) return;

  // Pretty-print detail: if it contains JSON-like content, format it
  let detailHtml = esc(s.detail || '(empty)');
  // Try to detect and format inline JSON in detail
  detailHtml = detailHtml.replace(/(args=|Result:)(\{.*?\})/gs, (m, prefix, json) => {
    try {
      const parsed = JSON.parse(json);
      return esc(prefix) + '<br>' + esc(JSON.stringify(parsed, null, 2));
    } catch { return esc(m); }
  });
  // Show action with icon based on name
  const actionIcon = s.action.startsWith('Exec:') ? '&#9655;' : s.action.startsWith('LLM') ? '&#129504;' : '&#9881;';
  const statusColor = s.status === 'PASS' || s.status === 'OK' ? '#3fb950' : s.status === 'BLOCK' || s.status === 'ERROR' ? '#f85149' : s.status === 'CACHE' ? '#8b949e' : '#d29922';

  const body = $('stepDetailBody');
  body.innerHTML = `
    <div class="detail-field">
      <label>Action</label>
      <div class="val" style="font-size:13px;font-weight:600;color:#58a6ff">${actionIcon} ${esc(s.action)}</div>
    </div>
    <div class="detail-field">
      <label>Status</label>
      <div class="val" style="color:${statusColor};font-weight:600">${s.status}</div>
    </div>
    <div class="detail-field">
      <label>Duration</label>
      <div class="val">${s.duration_ms}ms</div>
    </div>
    <div class="detail-field">
      <label>Detail</label>
      <div class="val" style="white-space:pre-wrap;max-height:200px;line-height:1.6">${detailHtml}</div>
    </div>
    <div class="detail-field">
      <label>Raw JSON</label>
      <div class="val" style="max-height:200px">${esc(JSON.stringify(s, null, 2))}</div>
    </div>
  `;
  $('stepDetail').classList.add('open');
}

function closeStepDetail() {
  selectedStepIndex = -1;
  $('stepDetail').classList.remove('open');
  if (lastResponse) renderTimeline(lastResponse.steps);
}

// ── Raw JSON ──
function renderRaw(response) {
  const el = $('rawJson');
  if (!response) {
    el.textContent = 'Chưa có dữ liệu.';
    return;
  }
  el.textContent = JSON.stringify(response, null, 2);
}

// ── Send Message ──
async function sendMessage() {
  const msg = chatInput.value.trim();
  if (!msg) return;

  userId = $('userId').value.trim() || 'anonymous';

  chatInput.value = '';
  $('sendBtn').disabled = true;
  $('sendBtn').innerHTML = '<span class="loading"><span class="spinner"></span> Đang xử lý...</span>';
  setStatus(true, 'Đang xử lý...');

  addMessage('user', msg);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, session_id: sessionId, user_id: userId }),
    });
    const data = await res.json();

    if (data.session_id) {
      sessionId = data.session_id;
      $('sessionId').textContent = sessionId;
    }

    lastResponse = data;

    // Render trace
    const steps = data.steps || [];
    renderTimeline(steps);
    renderRaw(data);

    // Auto-select last step
    if (steps.length > 0) {
      selectStep(steps.length - 1);
    }

    // Response
    if (data.status === 'ok') {
      addMessage('assistant', data.reply);
      setStatus(true, 'Sẵn sàng');
    } else if (data.status === 'pending') {
      addMessage('assistant', data.reply + ' &#128309;', `<span class="tag">TOKEN</span> ${data.token?.slice(0, 24)}...`);
      pendingToken = data.token;
      $('confirmBar').classList.add('show');
      $('confirmMsg').textContent = data.reply;
      setStatus(true, 'Chờ xác nhận');
    } else if (data.status === 'error') {
      addMessage('system', '\u26D4 ' + data.reply);
      setStatus(false, 'Bị chặn');
    }
  } catch (err) {
    addMessage('system', '\u26D4 Lỗi kết nối: ' + err.message);
    setStatus(false, 'Lỗi');
  } finally {
    $('sendBtn').disabled = false;
    $('sendBtn').textContent = 'Gửi';
    chatInput.focus();
  }
}

// ── Confirm ──
async function confirmAction() {
  if (!pendingToken) return;
  $('btnConfirm').disabled = true;
  $('btnConfirm').textContent = '...';

  try {
    const res = await fetch('/api/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, token: pendingToken }),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      addMessage('assistant', data.reply);
    } else {
      addMessage('system', '\u26D4 ' + data.reply);
    }
  } catch (err) {
    addMessage('system', '\u26D4 Lỗi: ' + err.message);
  } finally {
    pendingToken = null;
    $('confirmBar').classList.remove('show');
    $('btnConfirm').disabled = false;
    $('btnConfirm').textContent = 'Xác nhận';
    setStatus(true, 'Sẵn sàng');
  }
}

function cancelConfirm() {
  pendingToken = null;
  $('confirmBar').classList.remove('show');
  addSystemMsg('Đã huỷ xác nhận.');
  setStatus(true, 'Sẵn sàng');
}

// ── New Session ──
function newSession() {
  sessionId = crypto.randomUUID().slice(0, 8);
  $('sessionId').textContent = sessionId;
  $('messages').innerHTML = '';
  $('timeline').innerHTML = '<div class="empty-state"><div class="icon">&#128640;</div><div>Chưa có request nào</div><div class="hint">Gửi tin nhắn để xem trace từng bước</div></div>';
  $('summaryBar').style.display = 'none';
  $('rawJson').textContent = 'Chưa có dữ liệu.';
  $('memoryContent').innerHTML = '<div class="empty-state"><div class="icon">&#128196;</div><div>Bấm Refresh để xem memory state</div></div>';
  closeStepDetail();
  pendingToken = null;
  lastResponse = null;
  $('confirmBar').classList.remove('show');
  addSystemMsg('Phiên mới: ' + sessionId);
  setStatus(true, 'Sẵn sàng');
  chatInput.focus();
}

// ── Memory Tab ──
async function refreshMemory() {
  const container = $('memoryContent');
  container.innerHTML = '<div class="empty-state"><span class="spinner"></span> Loading...</div>';

  try {
    const [sessionRes, cacheRes, rateRes] = await Promise.all([
      fetch('/debug/session/' + encodeURIComponent(sessionId)),
      fetch('/debug/cache'),
      fetch('/debug/ratelimit'),
    ]);

    // Session
    const sessionData = sessionRes.ok ? await sessionRes.json() : null;
    // Cache
    const cacheData = cacheRes.ok ? await cacheRes.json() : null;

    let html = '';

    // ── Session ──
    if (sessionData) {
      const msgs = sessionData.messages || [];
      html += `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:#58a6ff;margin-bottom:6px;display:flex;align-items:center;gap:6px">
            <span>&#128172;</span> Session: <code style="color:#e6edf3;font-size:11px">${esc(sessionData.session_id)}</code>
            <span style="color:#8b949e;font-weight:400;font-size:11px">(${msgs.length} msgs)</span>
          </div>
          <div style="background:#161b22;border:1px solid #21262d;border-radius:6px;padding:8px;font-size:11px">
            <div style="color:#8b949e;margin-bottom:4px">User: <strong style="color:#e6edf3">${esc(sessionData.user_id)}</strong>
              | Created: ${esc(sessionData.created_at || '?')}
              | TTL: ${sessionData.ttl_seconds || 1800}s
            </div>
            ${msgs.length === 0 ? '<div style="color:#484f58;padding:4px">(no messages)</div>' : ''}
            ${msgs.map((m, i) => `
              <div style="padding:4px 6px;margin:2px 0;border-left:2px solid ${m.role === 'user' ? '#1f6feb' : m.role === 'assistant' ? '#3fb950' : '#8b949e'};background:#0d1117;border-radius:3px">
                <span style="color:#8b949e;font-size:10px;display:block">#${i} ${m.role} @ ${(m.timestamp || '').slice(11,19)}</span>
                <span style="color:#e6edf3;font-size:11px;word-break:break-word">${esc(m.content).slice(0, 200)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      html += `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:#f85149;margin-bottom:6px">&#128172; Session: ${esc(sessionId)}</div>
          <div style="color:#8b949e;font-size:11px">Chưa có session data (gửi tin nhắn trước)</div>
        </div>
      `;
    }

    // ── Cache ──
    if (cacheData) {
      const stats = cacheData.stats || {};
      const entries = cacheData.entries || {};
      const entryKeys = Object.keys(entries);
      html += `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:#d29922;margin-bottom:6px;display:flex;align-items:center;gap:6px">
            <span>&#9889;</span> Cache Store
            <span style="color:#8b949e;font-weight:400;font-size:11px">(${entryKeys.length} entries)</span>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap">
            <span style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:2px 8px;font-size:11px;color:#8b949e">Hits: <strong style="color:#3fb950">${stats.hits || 0}</strong></span>
            <span style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:2px 8px;font-size:11px;color:#8b949e">Misses: <strong style="color:#f85149">${stats.misses || 0}</strong></span>
            <span style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:2px 8px;font-size:11px;color:#8b949e">Hit rate: <strong style="color:#58a6ff">${stats.hit_rate_pct || 0}%</strong></span>
          </div>
          ${entryKeys.length === 0 ? '<div style="color:#484f58;font-size:11px">(cache trống)</div>' : ''}
          ${entryKeys.slice(0, 10).map(k => {
            const e = entries[k];
            return `
              <div style="padding:4px 6px;margin:2px 0;background:#0d1117;border-radius:3px;font-size:10px;font-family:'Consolas','Courier New',monospace">
                <div style="color:#58a6ff">${esc(k)}</div>
                <div style="color:#8b949e">TTL: ${e.expires_at || '?'} | hits: ${e.hit_count || 0}</div>
              </div>
            `;
          }).join('')}
          ${entryKeys.length > 10 ? `<div style="color:#484f58;font-size:10px;margin-top:4px">... and ${entryKeys.length - 10} more</div>` : ''}
        </div>
      `;
    }

    // ── Rate Limiter ──
    const rateData = rateRes.ok ? await rateRes.json() : null;
    if (rateData) {
      const cfg = rateData.config || {};
      const userInfo = rateData.users && rateData.users[userId] ? rateData.users[userId] : null;
      html += `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:#f85149;margin-bottom:6px;display:flex;align-items:center;gap:6px">
            <span>&#128683;</span> Rate Limiter
            <span style="color:#8b949e;font-weight:400;font-size:11px">(${rateData.active_users || 0} active users)</span>
          </div>
          <div style="background:#161b22;border:1px solid #21262d;border-radius:6px;padding:8px;font-size:11px">
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span style="color:#8b949e">Max/min: <strong style="color:#e6edf3">${cfg.max_per_minute}</strong></span>
              <span style="color:#8b949e">Max/day: <strong style="color:#e6edf3">${cfg.max_per_day}</strong></span>
              <span style="color:#8b949e">Token budget: <strong style="color:#e6edf3">${cfg.max_tokens_per_day}</strong></span>
            </div>
            ${userInfo ? `
              <div style="color:#8b949e;border-top:1px solid #21262d;padding-top:4px;margin-top:4px">
                Your requests (24h): <strong style="color:#e6edf3">${userInfo.requests_last_24h || 0}</strong>
                | Tokens today: <strong style="color:#e6edf3">${userInfo.tokens_today || 0}</strong>
              </div>
            ` : '<div style="color:#484f58;padding-top:4px;margin-top:4px;border-top:1px solid #21262d">(no rate data for this user yet)</div>'}
          </div>
        </div>
      `;
    }

    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = `<div style="color:#f85149;font-size:12px;padding:10px">Lỗi: ${esc(err.message)}</div>`;
  }
}

// ── Clear Trace (keep messages) ──
function clearTrace() {
  $('timeline').innerHTML = '<div class="empty-state"><div class="icon">&#128640;</div><div>Chưa có request nào</div><div class="hint">Gửi tin nhắn để xem trace từng bước</div></div>';
  $('summaryBar').style.display = 'none';
  $('rawJson').textContent = 'Chưa có dữ liệu.';
  $('memoryContent').innerHTML = '<div class="empty-state"><div class="icon">&#128196;</div><div>Bấm Refresh để xem memory state</div></div>';
  closeStepDetail();
  lastResponse = null;
}

// ── Init ──
addSystemMsg('Shopping Copilot s\u1eb5n s\u00e0ng. Nh\u1eadp c\u00e2u h\u1ecfi \u0111\u1ec3 b\u1eaft \u0111\u1ea7u.');
chatInput.focus();
</script>
</body>
</html>
