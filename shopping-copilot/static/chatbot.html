<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Copilot — Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface-alt: #f8f9fa;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-light: #eff6ff;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --border: #e5e7eb;
    --success: #059669;
    --success-bg: #ecfdf5;
    --error: #dc2626;
    --error-bg: #fef2f2;
    --warn: #d97706;
    --warn-bg: #fffbeb;
    --skip: #6b7280;
    --skip-bg: #f3f4f6;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .header h1 span { color: var(--primary); }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .session-id {
    font-size: 12px; color: var(--text-muted);
    background: var(--surface-alt); padding: 4px 10px;
    border-radius: 20px; border: 1px solid var(--border);
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btn-new {
    padding: 6px 14px; font-size: 13px; font-weight: 600;
    background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; transition: all .15s;
  }
  .btn-new:hover { background: var(--surface-alt); color: var(--text); }

  /* ── Chat area ── */
  .chat { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .chat:empty::after {
    content: 'Gửi tin nhắn để bắt đầu kiểm tra.';
    display: block; text-align: center; color: var(--text-muted);
    font-size: 14px; margin-top: 40px;
  }

  /* ── Messages ── */
  .msg { max-width: 85%; animation: fadeIn .25s ease-out; }
  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; width: 100%; }

  .msg.user .bubble {
    background: var(--primary); color: #fff;
    padding: 10px 16px; border-radius: 18px 18px 4px 18px;
    font-size: 14px; word-break: break-word;
  }

  .msg.bot .bubble {
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 20px; border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* ── Steps timeline ── */
  .steps { display: flex; flex-direction: column; gap: 6px; margin: 0 0 12px; }
  .step {
    display: flex; align-items: stretch; gap: 10px;
    padding: 8px 12px; border-radius: var(--radius-sm);
    font-size: 13px; line-height: 1.4;
    opacity: 0; transform: translateY(6px);
    transition: opacity .3s ease, transform .3s ease;
  }
  .step.visible { opacity: 1; transform: translateY(0); }

  .step-icon {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .step-icon.ok { background: var(--success-bg); color: var(--success); }
  .step-icon.pass { background: var(--success-bg); color: var(--success); }
  .step-icon.error { background: var(--error-bg); color: var(--error); }
  .step-icon.block { background: var(--error-bg); color: var(--error); }
  .step-icon.skip { background: var(--skip-bg); color: var(--skip); }
  .step-icon.warn { background: var(--warn-bg); color: var(--warn); }

  .step-body { flex: 1; min-width: 0; }
  .step-action { font-weight: 600; color: var(--text); }
  .step-detail { color: var(--text-secondary); font-size: 12px; margin-top: 1px; word-break: break-word; }
  .step-time {
    flex-shrink: 0; font-size: 11px; color: var(--text-muted);
    align-self: center; font-variant-numeric: tabular-nums;
  }

  /* step backgrounds */
  .step.ok-bg { background: var(--success-bg); }
  .step.pass-bg { background: var(--success-bg); }
  .step.error-bg { background: var(--error-bg); }
  .step.block-bg { background: var(--error-bg); }
  .step.skip-bg { background: var(--skip-bg); }
  .step.warn-bg { background: var(--warn-bg); }

  /* ── Reply text (markdown rendered) ── */
  .reply { font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .reply h1, .reply h2, .reply h3 { margin: 12px 0 6px; }
  .reply h1 { font-size: 17px; } .reply h2 { font-size: 15px; } .reply h3 { font-size: 14px; }
  .reply p { margin: 4px 0; }
  .reply ul, .reply ol { margin: 4px 0; padding-left: 20px; }
  .reply li { margin: 2px 0; }
  .reply strong { font-weight: 600; }
  .reply code {
    background: var(--surface-alt); padding: 1px 6px;
    border-radius: 4px; font-size: 13px; font-family: 'Cascadia Code', 'JetBrains Mono', monospace;
  }
  .reply hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* ── Confirm button ── */
  .confirm-area { margin-top: 12px; display: flex; gap: 8px; }
  .btn-confirm {
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    background: var(--primary); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; transition: background .15s;
  }
  .btn-confirm:hover { background: var(--primary-hover); }
  .btn-confirm:disabled { opacity: .5; cursor: not-allowed; }
  .btn-cancel {
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; transition: all .15s;
  }
  .btn-cancel:hover { background: var(--surface-alt); }

  /* ── Loading ── */
  .loading {
    display: flex; align-items: center; gap: 10px;
    align-self: flex-start; background: var(--surface); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: var(--radius); box-shadow: var(--shadow);
    font-size: 14px; color: var(--text-secondary);
  }
  .spinner { width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }

  /* ── Footer / Input ── */
  .footer { flex-shrink: 0; padding: 16px 24px; background: var(--surface); border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-row textarea {
    flex: 1; resize: none; padding: 10px 14px; font-size: 14px; font-family: var(--font);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    outline: none; transition: border-color .15s; line-height: 1.5; min-height: 44px; max-height: 120px;
  }
  .input-row textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .input-row textarea::placeholder { color: var(--text-muted); }
  .btn-send {
    padding: 10px 20px; font-size: 14px; font-weight: 600;
    background: var(--primary); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; transition: all .15s;
    height: 44px; flex-shrink: 0;
  }
  .btn-send:hover { background: var(--primary-hover); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 16px; }
    .chat { padding: 12px 16px; }
    .msg { max-width: 95%; }
    .msg.bot .bubble { padding: 12px 14px; }
    .footer { padding: 12px 16px; }
    .session-id { display: none; }
  }

  /* ── Scrollbar ── */
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .chat::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── Error toast ── */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--error-bg); color: var(--error); border: 1px solid var(--error);
    padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg); z-index: 1000;
    animation: fadeIn .2s ease-out;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <h1>Shopping <span>Copilot</span></h1>
    <div class="header-actions">
      <span class="session-id" id="sessionDisplay" title="Session ID">—</span>
      <button class="btn-new" onclick="newChat()">+ New Chat</button>
    </div>
  </header>

  <!-- Chat area -->
  <div class="chat" id="chat" role="log" aria-live="polite"></div>

  <!-- Footer / Input -->
  <footer class="footer">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Nhập câu hỏi để test..." onkeydown="onKeyDown(event)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="send()">Gửi</button>
    </div>
  </footer>
</div>

<script>
// ── State ──
const STATE = {
  sessionId: crypto.randomUUID(),
  busy: false,
  pendingToken: null,
};

const API = '/api/chat';
const API_CONFIRM = '/api/confirm';

// ── DOM refs ──
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const sessionDisplay = document.getElementById('sessionDisplay');

function updateSessionDisplay() {
  sessionDisplay.textContent = STATE.sessionId.slice(0, 8) + '…';
  sessionDisplay.title = STATE.sessionId;
}

updateSessionDisplay();

// ── API call ──
async function send() {
  const text = input.value.trim();
  if (!text || STATE.busy) return;

  input.value = '';
  autoResize();
  STATE.busy = true;
  sendBtn.disabled = true;

  // Render user message
  appendUserMsg(text);

  // Show loading
  const loadingEl = appendLoading();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: STATE.sessionId,
        user_id: 'test-' + crypto.randomUUID().slice(0, 8),
      }),
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => 'Unknown error');
      throw new Error(`${res.status} ${res.statusText} — ${errText.slice(0, 200)}`);
    }

    const data = await res.json();

    // Remove loading, append bot response with animated steps
    loadingEl.remove();
    appendBotResponse(data);
  } catch (err) {
    loadingEl.remove();
    showToast('Lỗi: ' + err.message);
  } finally {
    STATE.busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// ── Confirmation ──
async function confirmAction(token) {
  STATE.busy = true;
  try {
    const res = await fetch(API_CONFIRM, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: STATE.sessionId,
        token: token,
      }),
    });
    const data = await res.json();
    // Show confirm result as a bot message
    appendBotMsg(data.reply || 'Đã xác nhận.');
  } catch (err) {
    showToast('Lỗi xác nhận: ' + err.message);
  } finally {
    STATE.busy = false;
  }
}

function cancelConfirm() {
  appendBotMsg('Đã hủy xác nhận.');
}

// ── Render helpers ──

function appendUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function appendBotMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="bubble"><div class="reply">${escapeHtml(text)}</div></div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function appendLoading() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading-' + Date.now();
  div.innerHTML = '<div class="spinner"></div><span>Đang xử lý...</span>';
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function appendBotResponse(data) {
  const { status, reply, steps, token } = data;
  STATE.pendingToken = status === 'pending' ? token : null;

  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'bot-' + Date.now();

  let html = '<div class="bubble">';

  // Steps section
  if (steps && steps.length > 0) {
    html += '<div class="steps" id="steps-' + div.id + '">';
    for (let i = 0; i < steps.length; i++) {
      const s = steps[i];
      const statusClass = statusColor(s.status || '');
      const icon = statusIcon(s.status || '');
      html += `<div class="step ${statusClass}-bg" data-step-index="${i}">
        <div class="step-icon ${statusClass}">${icon}</div>
        <div class="step-body">
          <div class="step-action">${escapeHtml(s.action)}</div>
          <div class="step-detail">${escapeHtml(s.detail || '')}</div>
        </div>
        <div class="step-time">${s.duration_ms}ms</div>
      </div>`;
    }
    html += '</div>';
  }

  // Reply text
  if (status === 'pending') {
    html += `<div class="reply">${escapeHtml(reply)}</div>`;
    html += `<div class="confirm-area">
      <button class="btn-confirm" onclick="confirmAction('${token}')">Xác nhận</button>
      <button class="btn-cancel" onclick="cancelConfirm()">Hủy</button>
    </div>`;
  } else if (status === 'ok') {
    html += `<div class="reply">${escapeHtml(reply)}</div>`;
  } else if (status === 'error') {
    html += `<div class="reply" style="color:var(--error)">${escapeHtml(reply)}</div>`;
  } else {
    html += `<div class="reply">${escapeHtml(reply)}</div>`;
  }

  html += '</div>';
  div.innerHTML = html;
  chat.appendChild(div);
  scrollToBottom();

  // Animate steps in sequence
  const stepEls = div.querySelectorAll('.step');
  if (stepEls.length > 0) {
    stepEls.forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 100 + i * 200);
    });
    // After all steps, scroll again
    setTimeout(scrollToBottom, 100 + stepEls.length * 200 + 50);
  } else {
    scrollToBottom();
  }
}

// ── Utilities ──

function statusColor(status) {
  const s = (status || '').toLowerCase();
  if (s === 'ok' || s === 'pass') return 'ok';
  if (s === 'error' || s === 'block') return 'error';
  if (s === 'skip') return 'skip';
  if (s === 'warn' || s === 'warning') return 'warn';
  return 'skip';
}

function statusIcon(status) {
  const s = (status || '').toLowerCase();
  if (s === 'ok' || s === 'pass') return '✓';
  if (s === 'error' || s === 'block') return '✗';
  if (s === 'skip') return '–';
  if (s === 'warn' || s === 'warning') return '!';
  return '?';
}

function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function scrollToBottom() {
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function newChat() {
  STATE.sessionId = crypto.randomUUID();
  STATE.pendingToken = null;
  chat.innerHTML = '';
  updateSessionDisplay();
  input.value = '';
  input.focus();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Auto-resize textarea
input.addEventListener('input', autoResize);

// Focus on load
input.focus();
</script>
</body>
</html>
