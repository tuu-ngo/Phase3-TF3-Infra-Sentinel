rules:
  - id: mandate10.payment.javascript-dynamic-code-execution
    message: Dynamic code execution is not allowed in payment or checkout code.
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: eval(...)
          - pattern: new Function(...)
          - pattern: child_process.exec(...)
          - pattern: require("child_process").exec(...)
    metadata:
      category: security
      mandate: "10"
      confidence: HIGH

  - id: mandate10.payment.disable-tls-verification
    message: Disabling TLS verification is not allowed in payment or checkout code.
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: process.env.NODE_TLS_REJECT_UNAUTHORIZED = "0"
          - pattern: process.env.NODE_TLS_REJECT_UNAUTHORIZED = 0
    metadata:
      category: security
      mandate: "10"
      confidence: HIGH

  - id: mandate10.payment.weak-md5-hash
    message: MD5 is not acceptable for security-sensitive payment or checkout logic.
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: crypto.createHash("md5")
    metadata:
      category: security
      mandate: "10"
      confidence: HIGH

  - id: mandate10.checkout.go-shell-command
    message: Shell execution from checkout code creates command injection risk.
    severity: ERROR
    languages:
      - go
    patterns:
      - pattern-either:
          - pattern: exec.Command("sh", "-c", ...)
          - pattern: exec.Command("/bin/sh", "-c", ...)
          - pattern: exec.Command("bash", "-c", ...)
    metadata:
      category: security
      mandate: "10"
      confidence: HIGH
