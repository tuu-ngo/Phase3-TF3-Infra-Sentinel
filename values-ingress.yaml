# Public exposure via AWS Load Balancer Controller (ALB Ingress).
# Only frontend-proxy is public — it's the single entry point (Envoy) that
# fronts the storefront + routes to Jaeger/Grafana/flagd-ui internally.
# Everything else stays ClusterIP-only inside the VPC.
#
# HTTP-only for now (no domain/ACM cert yet). Once a domain is registered,
# add: alb.ingress.kubernetes.io/certificate-arn + listen-ports 443 + tls block.
components:
  frontend-proxy:
    ingress:
      enabled: true
      ingressClassName: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
        alb.ingress.kubernetes.io/healthcheck-path: /
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
              port: 8080
