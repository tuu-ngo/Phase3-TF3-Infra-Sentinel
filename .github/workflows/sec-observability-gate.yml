name: SEC-01 Observability Access Gate

on:
  push:
    branches:
      - main
    paths:
      - "phase3 - information/techx-corp-chart/**"
      - "phase3 - information/deploy/**"
      - "gitops/secrets/**"
      - "scripts/security/**"
      - ".github/workflows/sec-observability-gate.yml"
  pull_request:
    paths:
      - "phase3 - information/techx-corp-chart/**"
      - "phase3 - information/deploy/**"
      - "gitops/secrets/**"
      - "scripts/security/**"
      - ".github/workflows/sec-observability-gate.yml"

permissions:
  contents: read

jobs:
  static-security-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.3

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: "3.12"
      
      - name: Install PyYAML
        run: |
          python -m pip install \
            --require-hashes \
            -r scripts/security/requirements.txt

      - name: Run shell syntax tests
        run: |
          bash -n scripts/security/test-observability-security.sh
          bash -n scripts/security/verify-observability-auth.sh
          bash -n scripts/security/test-verify-observability-auth.sh

      - name: Run redirect parser unit tests
        run: bash scripts/security/test-verify-observability-auth.sh

      - name: Run Static Observability Security Tests
        run: bash scripts/security/test-observability-security.sh
