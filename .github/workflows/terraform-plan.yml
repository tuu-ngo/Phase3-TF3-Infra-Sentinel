name: Terraform Plan (production)

on:
  # Mandate 12: trước đây plan chỉ chạy SAU khi merge vào main, nên reviewer
  # không xem được plan trước khi duyệt PR. Với change đụng CloudTrail, bucket
  # policy và IAM, review sau merge là quá muộn. Role plan chỉ có ReadOnlyAccess
  # + quyền đọc state nên an toàn khi chạy trên PR nội bộ.
  # Dùng `pull_request` (không phải `pull_request_target`) để fork không lấy
  # được credential OIDC.
  pull_request:
    paths:
      - "infra/live/production/**"
      - "infra/modules/**"
      - ".github/workflows/terraform-plan.yml"
  push:
    branches:
      - main
    paths:
      - "infra/live/production/**"
      - "infra/modules/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.15.4"

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  plan:
    name: Plan production
    # PR từ fork không được lấy OIDC token để assume plan role. GitHub vốn đã
    # không cấp id-token: write cho fork PR, nhưng chặn tường minh ở đây để
    # không phải phụ thuộc vào hành vi ngầm của nền tảng.
    if: >-
      (github.event_name == 'pull_request'
       && github.event.pull_request.head.repo.full_name == github.repository)
      || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudfront_staging_selector: ${{ secrets.CLOUDFRONT_STAGING_SELECTOR }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_allowed_emails: ${{ vars.CLOUDFLARE_ALLOWED_EMAILS_JSON }}
    defaults:
      run:
        working-directory: infra/live/production

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure plan credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::197826770971:role/techx-corp-tf3-gha-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Check formatting
        run: terraform fmt -check -recursive ../../

      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: Validate configuration
        run: terraform validate

      - name: Plan production
        run: terraform plan -no-color -input=false
