name: Terraform Plan (production)

# Runs on every PR touching the production root or its modules and posts the
# whole team sees exactly what's about to change before merge. Read-only
# role (AWS_TF_PLAN_ROLE_ARN) - this workflow cannot modify AWS resources.

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/live/production/**"
      - "infra/modules/**"

permissions:
  id-token: write # OIDC -> assume AWS role
  contents: read
  pull-requests: write # post/update the plan comment

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.15.4"

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/live/production
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt -check
        run: terraform fmt -check -recursive ../../

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Trim plan output (GitHub comment size limit)
        run: |
          tail -c 60000 plan_output.txt > plan_output_trimmed.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/live/production/plan_output_trimmed.txt', 'utf8');
            const outcome = "${{ steps.plan.outcome }}";
            const marker = "<!-- terraform-plan-comment -->";
            const body = `${marker}\n### Terraform Plan (\`infra/live/production\`) - ${outcome === 'success' ? '✅' : '❌ failed'}\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
