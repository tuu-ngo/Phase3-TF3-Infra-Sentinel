name: Terraform Plan (migration branch)

on:
  push:
    branches:
      - deploy/account-migration-gitops
    paths:
      - "infra/live/production/**"
      - "infra/modules/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.15.4"

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  plan:
    name: Plan production
    if: github.ref == 'refs/heads/deploy/account-migration-gitops'
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudfront_staging_selector: ${{ secrets.CLOUDFRONT_STAGING_SELECTOR }}
    defaults:
      run:
        working-directory: infra/live/production

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure plan credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::197826770971:role/techx-corp-tf3-gha-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Check formatting
        run: terraform fmt -check -recursive ../../

      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: Validate configuration
        run: terraform validate

      - name: Plan production
        run: terraform plan -no-color -input=false
