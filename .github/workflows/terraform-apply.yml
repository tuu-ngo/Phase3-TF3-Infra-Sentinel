name: Terraform Apply (production)

on:
  workflow_dispatch:
    inputs:
      action:
        description: Run a fresh plan only, or apply that exact saved plan
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
      scope:
        description: Limit the saved plan to an approved rollout scope
        required: true
        type: choice
        default: full
        options:
          - full
          - pm127-kyverno-ecr
      allow_bastion_replacement:
        description: Explicitly acknowledge a reviewed shared-bastion replacement
        required: true
        type: boolean
        default: false
      bastion_replacement_ticket:
        description: Approved maintenance ticket/reference when allowing bastion replacement
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.15.4"
  TF_WORKING_DIR: infra/live/production

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  plan:
    name: Create saved plan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudfront_staging_selector: ${{ secrets.CLOUDFRONT_STAGING_SELECTOR }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_allowed_emails: ${{ vars.CLOUDFLARE_ALLOWED_EMAILS_JSON }}
    defaults:
      run:
        working-directory: infra/live/production

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure plan credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::197826770971:role/techx-corp-tf3-gha-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Check formatting
        run: terraform fmt -check -recursive ../../

      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: Validate configuration
        run: terraform validate

      - name: Create saved plan
        env:
          PLAN_SCOPE: ${{ inputs.scope }}
        run: |
          target_args=()
          case "$PLAN_SCOPE" in
            full)
              ;;
            pm127-kyverno-ecr)
              target_args=(
                -target=aws_iam_role.kyverno_ecr
                -target=aws_iam_role_policy.kyverno_ecr_read
              )
              ;;
            *)
              echo "Unsupported Terraform rollout scope: $PLAN_SCOPE" >&2
              exit 1
              ;;
          esac

          terraform plan -no-color -input=false "${target_args[@]}" -out=tfplan
          terraform show -no-color tfplan
          terraform show -json tfplan > tfplan.json
          python3 ../../../scripts/ci/validate-bastion-replacement-plan.py \
            --plan tfplan.json \
            --allow-replacement "${{ inputs.allow_bastion_replacement }}" \
            --ticket "${{ inputs.bastion_replacement_ticket }}"
          sha256sum tfplan > tfplan.sha256

      - name: Upload saved plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-plan-${{ github.run_id }}-${{ github.sha }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/tfplan.sha256
          if-no-files-found: error
          retention-days: 1

  apply:
    name: Apply saved plan
    needs: plan
    if: github.ref == 'refs/heads/main' && inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_cloudfront_staging_selector: ${{ secrets.CLOUDFRONT_STAGING_SELECTOR }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_allowed_emails: ${{ vars.CLOUDFLARE_ALLOWED_EMAILS_JSON }}
    defaults:
      run:
        working-directory: infra/live/production

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.sha }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure apply credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::197826770971:role/techx-corp-tf3-gha-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: Download saved plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: terraform-plan-${{ github.run_id }}-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Verify saved plan
        run: sha256sum --check tfplan.sha256

      - name: Apply saved plan
        run: terraform apply -input=false tfplan

      - name: Verify PM-127 Kyverno ECR role
        if: inputs.scope == 'pm127-kyverno-ecr'
        run: |
          test "$(aws iam get-role \
            --role-name techx-corp-tf3-kyverno-ecr \
            --query 'Role.Arn' \
            --output text)" = \
            "arn:aws:iam::197826770971:role/techx-corp-tf3-kyverno-ecr"

          aws iam get-role-policy \
            --role-name techx-corp-tf3-kyverno-ecr \
            --policy-name techx-corp-tf3-kyverno-ecr-read \
            --query 'PolicyDocument.Statement' \
            --output json > /dev/null

      - name: Verify staging edge paths
        shell: bash
        run: |
          if ! grep -Eq '^edge_phase[[:space:]]*=[[:space:]]*"staging"' production.auto.tfvars; then
            exit 0
          fi

          test -n "$TF_VAR_cloudfront_staging_selector"
          base_url="https://d2tn71186d7ilz.cloudfront.net"
          header="aws-cf-cd-techx-private-origin: $TF_VAR_cloudfront_staging_selector"

          assert_status() {
            local path="$1"
            local expected="$2"
            local actual
            actual=$(curl --retry 5 --retry-delay 5 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' --header "$header" "$base_url$path")
            printf '%s %s\n' "$path" "$actual"
            test "$actual" = "$expected"
          }

          assert_not_blocked() {
            local path="$1"
            local actual
            actual=$(curl --retry 5 --retry-delay 5 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' --header "$header" "$base_url$path")
            printf '%s %s\n' "$path" "$actual"
            test "$actual" != "403"
          }

          assert_status "/" "200"
          assert_status "/grafana/" "403"
          assert_status "/jaeger/" "403"
          assert_status "/loadgen/" "403"
          assert_status "/feature/" "403"
          assert_not_blocked "/flagservice/"
          assert_not_blocked "/otlp-http/"
