name: Terraform Apply (infra/)

# Runs after a PR touching infra/ is merged into main. Uses the "production"
# GitHub Environment, which requires manual approval before this job can
# run - so merging alone is not enough to change live AWS infra, someone
# still has to explicitly click approve after seeing the plan.
#
# Full-admin role (AWS_TF_APPLY_ROLE_ARN) can ONLY be assumed from the main
# branch (see infra/ci.tf trust policy) - no PR branch can use it.

on:
  push:
    branches: [main]
    paths:
      - "infra/**"

permissions:
  id-token: write # OIDC -> assume AWS role
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.9.8"

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=techx-corp-tf3-terraform-state" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-corp-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: terraform plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: terraform apply
        run: terraform apply -input=false tfplan
