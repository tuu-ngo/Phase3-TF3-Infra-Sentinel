name: Terraform Apply (production)

on:
  workflow_dispatch:
    inputs:
      action:
        description: Run a fresh plan only, or apply that exact saved plan
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.15.4"
  TF_WORKING_DIR: infra/live/production

concurrency:
  group: terraform-production
  cancel-in-progress: false

jobs:
  plan:
    name: Create saved plan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudfront_staging_selector: ${{ secrets.CLOUDFRONT_STAGING_SELECTOR }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_allowed_emails: ${{ vars.CLOUDFLARE_ALLOWED_EMAILS_JSON }}
    defaults:
      run:
        working-directory: infra/live/production

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure plan credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::197826770971:role/techx-corp-tf3-gha-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Check formatting
        run: terraform fmt -check -recursive ../../

      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: Validate configuration
        run: terraform validate

      - name: Create saved plan
        run: |
          terraform plan -no-color -input=false -out=tfplan
          terraform show -no-color tfplan
          sha256sum tfplan > tfplan.sha256

      - name: Upload saved plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}-${{ github.sha }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/tfplan.sha256
          if-no-files-found: error
          retention-days: 1

  apply:
    name: Apply saved plan
    needs: plan
    if: github.ref == 'refs/heads/main' && inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_cloudfront_staging_selector: ${{ secrets.CLOUDFRONT_STAGING_SELECTOR }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_cloudflare_allowed_emails: ${{ vars.CLOUDFLARE_ALLOWED_EMAILS_JSON }}
    defaults:
      run:
        working-directory: infra/live/production

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure apply credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::197826770971:role/techx-corp-tf3-gha-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - name: Initialize Terraform
        run: |
          terraform init \
            -backend-config="bucket=techx-tf3-197826770971-tfstate" \
            -backend-config="key=eks-baseline/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=techx-tf3-terraform-lock" \
            -backend-config="encrypt=true"

      - name: Download saved plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Verify saved plan
        run: sha256sum --check tfplan.sha256

      - name: Apply saved plan
        run: terraform apply -input=false tfplan

      - name: Verify staging edge paths
        shell: bash
        run: |
          if ! grep -Eq '^edge_phase[[:space:]]*=[[:space:]]*"staging"' production.auto.tfvars; then
            exit 0
          fi

          test -n "$TF_VAR_cloudfront_staging_selector"
          base_url="https://d2tn71186d7ilz.cloudfront.net"
          header="aws-cf-cd-techx-private-origin: $TF_VAR_cloudfront_staging_selector"

          assert_status() {
            local path="$1"
            local expected="$2"
            local actual
            actual=$(curl --retry 5 --retry-delay 5 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' --header "$header" "$base_url$path")
            printf '%s %s\n' "$path" "$actual"
            test "$actual" = "$expected"
          }

          assert_not_blocked() {
            local path="$1"
            local actual
            actual=$(curl --retry 5 --retry-delay 5 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' --header "$header" "$base_url$path")
            printf '%s %s\n' "$path" "$actual"
            test "$actual" != "403"
          }

          assert_status "/" "200"
          assert_status "/grafana/" "403"
          assert_status "/jaeger/" "403"
          assert_status "/loadgen/" "403"
          assert_status "/feature/" "403"
          assert_not_blocked "/flagservice/"
          assert_not_blocked "/otlp-http/"
