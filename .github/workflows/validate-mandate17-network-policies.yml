name: Validate Mandate 17 NetworkPolicies

"on":
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/validate-mandate17-network-policies.yml"
      - "gitops/apps/infrastructure-app.yaml"
      - "gitops/infrastructure/network-policy-staged/**"
      - "gitops/infrastructure/*.yaml"
      - "scripts/ci/test_mandate17_network_policy_contract.py"
      - "scripts/network-policy/mandate-17-connectivity-test.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: Mandate 17 policy contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          pytest==8.4.1 PyYAML==6.0.2

      - name: Validate staged policy contract
        run: >-
          python -m pytest -q
          scripts/ci/test_mandate17_network_policy_contract.py
