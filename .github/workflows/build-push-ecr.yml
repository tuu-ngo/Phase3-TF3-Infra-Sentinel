name: Build & Push TechX Corp images to ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override tag (default: git short SHA)"
        required: false
        default: ""
      platforms:
        description: "Build platforms"
        required: false
        default: "linux/amd64,linux/arm64"
      services:
        description: "Optional space-separated service list; empty means all"
        required: false
        default: ""

  push:
    branches: [main]
    paths:
      - "phase3 - information/techx-corp-platform/**"

permissions:
  id-token: write # required for OIDC -> assume AWS role
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: techx-corp
  # Every bake target with its own src/<name> build context (see docker-compose.yml).
  # opensearch is deliberately excluded - it has a `build:` stanza but no `image:` tag
  # (pulled from the public registry per GETTING_STARTED.md, not pushed to the TF's
  # ECR) - bake would fail on it with "tag is needed when pushing to registry".
  ALL_SERVICES: >-
    accounting ad cart checkout currency email fraud-detection frontend
    frontend-proxy image-provider kafka llm load-generator payment
    product-catalog product-reviews quote recommendation shipping flagd-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: "phase3 - information/techx-corp-platform"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need full history to diff against github.event.before

      - name: Resolve image tag
        id: vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect which services changed
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.services }}" ]; then
              REQUESTED_SERVICES="${{ inputs.services }}"
              for svc in $REQUESTED_SERVICES; do
                if ! grep -qw "$svc" <<< "$ALL_SERVICES"; then
                  echo "Unsupported service: $svc" >&2
                  exit 1
                fi
              done
              UNIQ=$(echo "$REQUESTED_SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
              echo "mode=scoped" >> "$GITHUB_OUTPUT"
              echo "services=$UNIQ" >> "$GITHUB_OUTPUT"
              echo "Manual trigger -> scoped build for $UNIQ"
            else
              echo "mode=full" >> "$GITHUB_OUTPUT"
              echo "Manual trigger -> full build of all services."
            fi
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          CURRENT="${{ github.sha }}"

          if [ -z "$BEFORE" ] || \
             [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || \
             ! git -C "$GITHUB_WORKSPACE" cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Previous commit unavailable -> full build."
            exit 0
          fi

          if ! CHANGED=$(git -C "$GITHUB_WORKSPACE" diff --name-only "$BEFORE" "$CURRENT" -- "phase3 - information/techx-corp-platform"); then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Diff failed -> full build."
            exit 0
          fi
          echo "Changed files under techx-corp-platform:"
          echo "$CHANGED"

          PREFIX="phase3 - information/techx-corp-platform/src/"
          SERVICES=""
          FULL=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              "$PREFIX"*)
                svc=$(echo "$f" | sed "s|^$PREFIX||" | cut -d/ -f1)
                if echo " $ALL_SERVICES " | grep -q " $svc "; then
                  SERVICES="$SERVICES $svc"
                else
                  FULL=true
                fi
                ;;
              *)
                FULL=true
                ;;
            esac
          done <<< "$CHANGED"

          if [ "$FULL" = true ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Change touches shared/unrecognized paths -> full build."
          elif [ -z "$SERVICES" ]; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "No image-affecting changes under techx-corp-platform -> nothing to build."
          else
            UNIQ=$(echo "$SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            echo "mode=scoped" >> "$GITHUB_OUTPUT"
            echo "services=$UNIQ" >> "$GITHUB_OUTPUT"
            echo "Scoped build -> $UNIQ"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.scope.outputs.mode != 'none'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.scope.outputs.mode != 'none'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        if: steps.scope.outputs.mode != 'none'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.scope.outputs.mode != 'none'
        uses: docker/setup-buildx-action@v3

      - name: Point registry at TF3 ECR repo (runtime-only, not committed)
        if: steps.scope.outputs.mode != 'none'
        run: |
          cat > .env.override <<EOF
          IMAGE_NAME=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          IMAGE_VERSION=${{ steps.vars.outputs.tag }}
          DEMO_VERSION=${{ steps.vars.outputs.tag }}
          EOF

      - name: Smoke build checkout (fail fast, single-arch, no push)
        if: steps.scope.outputs.mode == 'full'
        run: docker compose build checkout

      - name: Create multiplatform builder
        if: steps.scope.outputs.mode != 'none'
        run: make create-multiplatform-builder || true

      - name: Filter existing images
        id: filter_existing
        if: steps.scope.outputs.mode != 'none'
        run: |
          set -a; . ./.env.override; set +a
          SERVICES_TO_CHECK=""
          if [ "${{ steps.scope.outputs.mode }}" = "scoped" ]; then
             SERVICES_TO_CHECK="${{ steps.scope.outputs.services }}"
          else
             SERVICES_TO_CHECK="$ALL_SERVICES"
          fi
          
          SERVICES_TO_BUILD=""
          for svc in $SERVICES_TO_CHECK; do
            if aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids "imageTag=${IMAGE_VERSION}-${svc}" >/dev/null 2>&1; then
              echo "Tag ${IMAGE_VERSION}-${svc} already exists in ECR. Skipping push."
            else
              SERVICES_TO_BUILD="$SERVICES_TO_BUILD $svc"
            fi
          done
          
          SERVICES_TO_BUILD=$(echo "$SERVICES_TO_BUILD" | tr -s ' ' | xargs)
          echo "services_to_build=$SERVICES_TO_BUILD" >> "$GITHUB_OUTPUT"

      - name: Build & push required images
        if: steps.scope.outputs.mode != 'none' && steps.filter_existing.outputs.services_to_build != ''
        run: |
          set -a; . ./.env.override; set +a
          echo "Building: ${{ steps.filter_existing.outputs.services_to_build }}"
          docker buildx bake -f docker-compose.yml --push \
            --set "*.platform=${{ inputs.platforms || 'linux/amd64,linux/arm64' }}" \
            ${{ steps.filter_existing.outputs.services_to_build }}

      - name: Set up Trivy
        if: steps.scope.outputs.mode != 'none'
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # master
        with:
          version: v0.51.1
          cache: true

      - name: Scan pushed images with Trivy (Security Gate)
        if: steps.scope.outputs.mode != 'none'
        run: |
          set -a; . ./.env.override; set +a
          
          SERVICES="$ALL_SERVICES"
          if [ "${{ steps.scope.outputs.mode }}" = "scoped" ]; then
            SERVICES="${{ steps.scope.outputs.services }}"
          fi
          
          mkdir -p reports
          echo -e "service\ttag\tecr_digest\tplatform\tcritical\thigh" > image-digests.tsv
          
          IFS=',' read -ra PLATFORMS <<< "${{ inputs.platforms || 'linux/amd64,linux/arm64' }}"
          
          for svc in $SERVICES; do
            TAG="${IMAGE_VERSION}-${svc}"
            DIGEST="$(aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids "imageTag=${TAG}" --query 'imageDetails[0].imageDigest' --output text || true)"
            
            case "$DIGEST" in
              sha256:*) ;;
              *)
                echo "Unable to resolve digest for $svc (tag: $TAG)" >&2
                exit 1
                ;;
            esac
            
            IMAGE_REF="${IMAGE_NAME}@${DIGEST}"
            
            for plat in "${PLATFORMS[@]}"; do
              plat_safe=$(echo "$plat" | tr '/' '-')
              report_file="reports/${svc}-${plat_safe}.json"
              
              echo "Scanning $IMAGE_REF for $plat..."
              trivy image \
                --platform "$plat" \
                --scanners vuln \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --format json \
                --output "$report_file" \
                --exit-code 0 \
                "$IMAGE_REF"
              
              CRIT=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$report_file")
              HIGH=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$report_file")
              
              echo -e "${svc}\t${TAG}\t${DIGEST}\t${plat}\t${CRIT}\t${HIGH}" >> image-digests.tsv
            done
          done

      - name: Evaluate Trivy Reports
        if: steps.scope.outputs.mode != 'none'
        run: |
          chmod +x ../../scripts/ci/evaluate-trivy-report.sh
          ../../scripts/ci/evaluate-trivy-report.sh
          
      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-${{ steps.vars.outputs.tag }}-${{ github.run_id }}
          path: |
            phase3 - information/techx-corp-platform/reports/**
            phase3 - information/techx-corp-platform/image-digests.tsv
            phase3 - information/techx-corp-platform/summary.md
          if-no-files-found: warn
          
      - name: Write Job Summary
        if: always()
        run: |
          if [ -f "summary.md" ]; then
            cat "summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Workflow finished without summary.md" >> $GITHUB_STEP_SUMMARY
          fi
