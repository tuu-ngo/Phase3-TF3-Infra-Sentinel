name: Build & Push TechX Corp images to ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override tag (default: git short SHA)"
        required: false
        default: ""
      platforms:
        description: "Build platforms"
        required: false
        default: "linux/amd64,linux/arm64"
      services:
        description: "Optional space-separated allowlisted targets (default: all)"
        required: false
        default: ""
      scan_only:
        description: "Build and run the blocking Trivy gate without ECR push/sign"
        required: false
        type: boolean
        default: false

  push:
    branches: [main]
    paths:
      - "phase3 - information/techx-corp-platform/**"

permissions:
  id-token: write # required for OIDC -> assume AWS role
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: techx-corp
  # Team-agreed release gate: no HIGH or CRITICAL CVE is allowed into ECR.
  # Keep this at zero until Security records an explicitly approved exception.
  TRIVY_SEVERITIES: HIGH,CRITICAL
  # Every bake target with its own src/<name> build context (see docker-compose.yml).
  # opensearch is deliberately excluded - it has a `build:` stanza but no `image:` tag
  # (pulled from the public registry per GETTING_STARTED.md, not pushed to the TF's
  # ECR) - bake would fail on it with "tag is needed when pushing to registry".
  ALL_SERVICES: >-
    accounting ad cart checkout currency email fraud-detection frontend
    frontend-proxy image-provider kafka llm load-generator payment
    product-catalog product-reviews quote recommendation shipping flagd-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: "phase3 - information/techx-corp-platform"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need full history to diff against github.event.before

      - name: Resolve image tag
        id: vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # workflow_dispatch = manual "build everything" escape hatch. push = scoped to
      # whichever src/<service>/ dirs actually changed, so touching one service (e.g.
      # frontend-proxy for a route change) doesn't pay for a full 18-image rebuild.
      # Anything outside a recognized src/<service>/ dir (docker-compose.yml, pb/,
      # Makefile, shared Dockerfile snippets, ...) falls back to a full build since more
      # than one image's Dockerfile can depend on it (see pb/ COPY in a few services).
      - name: Detect which services changed
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REQUESTED="${{ inputs.services }}"
            if [ -z "$REQUESTED" ]; then
              echo "mode=full" >> "$GITHUB_OUTPUT"
              echo "Manual trigger -> full build of all services."
              exit 0
            fi

            SERVICES=""
            for svc in $REQUESTED; do
              if ! echo " $ALL_SERVICES " | grep -q " $svc "; then
                echo "Unknown build target: $svc" >&2
                exit 1
              fi
              SERVICES="$SERVICES $svc"
            done
            UNIQ=$(echo "$SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            echo "mode=scoped" >> "$GITHUB_OUTPUT"
            echo "services=$UNIQ" >> "$GITHUB_OUTPUT"
            echo "Manual scoped build -> $UNIQ"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "No previous commit to diff against (new branch/force-push) -> full build."
            exit 0
          fi

          # -C "$GITHUB_WORKSPACE": this step's cwd is already the working-directory default
          # (phase3 - information/techx-corp-platform), and a bare `-- <pathspec>` resolves
          # relative to cwd, not repo root - without -C this pathspec silently matched nothing
          # (git treats a non-matching pathspec as "no changes", not an error) and every build
          # step below got skipped regardless of what actually changed.
          CHANGED=$(git -C "$GITHUB_WORKSPACE" diff --name-only "$BEFORE" "${{ github.sha }}" -- "phase3 - information/techx-corp-platform")
          echo "Changed files under techx-corp-platform:"
          echo "$CHANGED"

          PREFIX="phase3 - information/techx-corp-platform/src/"
          SERVICES=""
          FULL=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              "$PREFIX"*)
                svc=$(echo "$f" | sed "s|^$PREFIX||" | cut -d/ -f1)
                if echo " $ALL_SERVICES " | grep -q " $svc "; then
                  SERVICES="$SERVICES $svc"
                else
                  FULL=true
                fi
                ;;
              *)
                FULL=true
                ;;
            esac
          done <<< "$CHANGED"

          if [ "$FULL" = true ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "Change touches shared/unrecognized paths -> full build."
          elif [ -z "$SERVICES" ]; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "No image-affecting changes under techx-corp-platform -> nothing to build."
          else
            UNIQ=$(echo "$SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            echo "mode=scoped" >> "$GITHUB_OUTPUT"
            echo "services=$UNIQ" >> "$GITHUB_OUTPUT"
            echo "Scoped build -> $UNIQ"
          fi

      - name: Set up QEMU
        if: steps.scope.outputs.mode != 'none'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.scope.outputs.mode != 'none'
        uses: docker/setup-buildx-action@v3

      - name: Point registry at TF3 ECR repo (runtime-only, not committed)
        if: steps.scope.outputs.mode != 'none'
        run: |
          cat > .env.override <<EOF
          IMAGE_NAME=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          IMAGE_VERSION=${{ steps.vars.outputs.tag }}
          DEMO_VERSION=${{ steps.vars.outputs.tag }}
          EOF

      - name: Smoke build checkout (fail fast, single-arch, no push)
        if: steps.scope.outputs.mode == 'full'
        run: docker compose build checkout

      - name: Create multiplatform builder
        if: steps.scope.outputs.mode != 'none'
        run: make create-multiplatform-builder || true

      # A docker exporter can only load one platform into the runner's local image
      # store.  It is deliberately used for the amd64 candidate gate before the
      # later multi-arch registry push; amd64 is the EKS node architecture.
      - name: Build local image candidates for the Trivy gate
        if: steps.scope.outputs.mode != 'none'
        run: |
          set -euo pipefail
          set -a; . ./.env.override; set +a
          SERVICES="$ALL_SERVICES"
          if [ "${{ steps.scope.outputs.mode }}" = "scoped" ]; then
            SERVICES="${{ steps.scope.outputs.services }}"
          fi

          for svc in $SERVICES; do
            echo "Building local linux/amd64 candidate: $svc"
            docker buildx bake -f docker-compose.yml "$svc" \
              --set "${svc}.platform=linux/amd64" \
              --set "${svc}.output=type=docker"
          done

      - name: Install Trivy
        if: steps.scope.outputs.mode != 'none'
        uses: aquasecurity/setup-trivy@v0.3.1

      - name: Scan local image candidates with Trivy (blocking gate)
        if: steps.scope.outputs.mode != 'none'
        run: |
          set -euo pipefail
          set -a; . ./.env.override; set +a
          SERVICES="$ALL_SERVICES"
          if [ "${{ steps.scope.outputs.mode }}" = "scoped" ]; then
            SERVICES="${{ steps.scope.outputs.services }}"
          fi

          mkdir -p "$GITHUB_WORKSPACE/trivy-reports/app"
          for svc in $SERVICES; do
            IMAGE="${IMAGE_NAME}:${IMAGE_VERSION}-${svc}"
            REPORT="$GITHUB_WORKSPACE/trivy-reports/app/${svc}.json"
            echo "Writing vulnerability evidence for $IMAGE to $REPORT"
            trivy image --scanners vuln --format json --output "$REPORT" --no-progress "$IMAGE"
            echo "Enforcing zero ${TRIVY_SEVERITIES} findings for $IMAGE"
            trivy image --scanners vuln --severity "$TRIVY_SEVERITIES" --exit-code 1 --no-progress "$IMAGE"
          done

      - name: Upload Trivy app-image reports
        if: always() && steps.scope.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-app-images-${{ github.run_id }}
          path: trivy-reports/app/
          if-no-files-found: warn
          retention-days: 90

      # Registry credentials are intentionally requested only after the local
      # vulnerability gate passes. scan_only remediation runs never receive AWS
      # credentials and therefore cannot mutate ECR.
      - name: Configure AWS credentials (OIDC)
        if: steps.scope.outputs.mode != 'none' && inputs.scan_only != true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.scope.outputs.mode != 'none' && inputs.scan_only != true
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push all pre-scanned app images
        if: steps.scope.outputs.mode == 'full' && inputs.scan_only != true
        run: |
          set -euo pipefail
          set -a; . ./.env.override; set +a
          read -r -a SERVICES <<< "$ALL_SERVICES"
          docker buildx bake -f docker-compose.yml --push \
            --set "*.platform=${{ inputs.platforms || 'linux/amd64,linux/arm64' }}" \
            "${SERVICES[@]}"

      - name: Build & push pre-scanned changed service images only
        if: steps.scope.outputs.mode == 'scoped' && inputs.scan_only != true
        run: |
          set -euo pipefail
          set -a; . ./.env.override; set +a
          echo "Building: ${{ steps.scope.outputs.services }}"
          read -r -a SERVICES <<< "${{ steps.scope.outputs.services }}"
          docker buildx bake -f docker-compose.yml --push \
            --set "*.platform=${{ inputs.platforms || 'linux/amd64,linux/arm64' }}" \
            "${SERVICES[@]}"

      # Cosign uses GitHub Actions' short-lived OIDC token (id-token: write), so
      # there is no static private signing key in the repository or its secrets.
      - name: Install Cosign
        if: steps.scope.outputs.mode != 'none' && inputs.scan_only != true
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign pushed image digests with keyless Cosign
        if: steps.scope.outputs.mode != 'none' && inputs.scan_only != true
        run: |
          set -euo pipefail
          set -a; . ./.env.override; set +a
          EVIDENCE_ROOT="$GITHUB_WORKSPACE/release-evidence"
          VERIFY_ROOT="$EVIDENCE_ROOT/cosign"
          SUMMARY="$EVIDENCE_ROOT/signed-images.jsonl"
          EXPECTED_IDENTITY="https://github.com/${GITHUB_WORKFLOW_REF}"
          mkdir -p "$VERIFY_ROOT"
          : > "$SUMMARY"

          SERVICES="$ALL_SERVICES"
          if [ "${{ steps.scope.outputs.mode }}" = "scoped" ]; then
            SERVICES="${{ steps.scope.outputs.services }}"
          fi

          for svc in $SERVICES; do
            IMAGE="${IMAGE_NAME}:${IMAGE_VERSION}-${svc}"
            # BatchGetImage is already granted to the GitHub ECR role and returns
            # the immutable manifest-list digest associated with this tag.
            DIGEST=$(aws ecr batch-get-image \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="${IMAGE_VERSION}-${svc}" \
              --query 'images[0].imageId.imageDigest' \
              --output text)
            test -n "$DIGEST" && test "$DIGEST" != "None"
            echo "Signing ${IMAGE}@${DIGEST}"
            cosign sign --yes "${IMAGE}@${DIGEST}"

            VERIFY_REPORT="$VERIFY_ROOT/${svc}.json"
            echo "Verifying ${IMAGE_NAME}@${DIGEST} as ${EXPECTED_IDENTITY}"
            cosign verify \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$EXPECTED_IDENTITY" \
              "${IMAGE_NAME}@${DIGEST}" > "$VERIFY_REPORT"

            jq -nc \
              --arg service "$svc" \
              --arg image "$IMAGE_NAME" \
              --arg tag "${IMAGE_VERSION}-${svc}" \
              --arg digest "$DIGEST" \
              --arg git_sha "$GITHUB_SHA" \
              --arg run_id "$GITHUB_RUN_ID" \
              --arg run_url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg workflow_identity "$EXPECTED_IDENTITY" \
              --arg trivy_report "trivy-app-images-${GITHUB_RUN_ID}/${svc}.json" \
              --arg cosign_report "signed-release-evidence-${GITHUB_RUN_ID}/cosign/${svc}.json" \
              '{service: $service, image: $image, tag: $tag, digest: $digest,
                git_sha: $git_sha, run_id: $run_id, run_url: $run_url,
                workflow_identity: $workflow_identity, trivy_report: $trivy_report,
                cosign_verify_report: $cosign_report}' >> "$SUMMARY"
          done

      - name: Upload signed release evidence
        if: always() && steps.scope.outputs.mode != 'none' && inputs.scan_only != true
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-evidence-${{ github.run_id }}
          path: release-evidence/
          if-no-files-found: warn
          retention-days: 90
