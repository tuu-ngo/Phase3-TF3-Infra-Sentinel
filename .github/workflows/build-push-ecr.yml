name: Build & Push TechX Corp images to ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override tag (default: git short SHA)"
        required: false
        default: ""
      platforms:
        description: "Build platforms"
        required: false
        default: "linux/amd64,linux/arm64"

  push:
    branches: [main]
    paths:
      - "phase3 - information/techx-corp-platform/**"

concurrency:
  group: build-push-ecr-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: techx-corp
  TRIVY_SEVERITIES: HIGH,CRITICAL
  ALL_SERVICES: >-
    accounting ad cart checkout currency email fraud-detection frontend
    frontend-proxy image-provider kafka llm load-generator payment
    product-catalog product-reviews quote recommendation shipping flagd-ui

jobs:
  build-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: "phase3 - information/techx-corp-platform"
    outputs:
      mode: ${{ steps.scope.outputs.mode }}
      services: ${{ steps.scope.outputs.services }}
      source_sha: ${{ steps.scope.outputs.source_sha }}
      source_short_sha: ${{ steps.scope.outputs.source_short_sha }}
      base_tag: ${{ steps.vars.outputs.tag }}
      platforms: ${{ steps.vars.outputs.platforms }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve variables
        id: vars
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_IMAGE_TAG" ]; then
            if ! [[ "$INPUT_IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "FAIL: invalid image tag prefix" >&2
              exit 1
            fi
            TAG_PREFIX="$INPUT_IMAGE_TAG"
          else
            TAG_PREFIX="$(git rev-parse --short=7 HEAD)"
          fi

          # ECR tag immutability means a rerun must not reuse the same tag.
          # run_id identifies the workflow run; run_attempt increments on rerun.
          BASE_TAG="${TAG_PREFIX}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          # Validate every final per-service tag before any build or push occurs.
          for service in $ALL_SERVICES; do
            FULL_TAG="${BASE_TAG}-${service}"
            if [ "${#FULL_TAG}" -gt 128 ]; then
              echo "FAIL: final image tag exceeds 128 characters: $FULL_TAG" >&2
              exit 1
            fi
          done

          NORMALIZED_PLATFORMS="$({
            printf '%s' "$INPUT_PLATFORMS" |
              tr ',' '\n' |
              sed '/^[[:space:]]*$/d' |
              sed 's/^[[:space:]]*//;s/[[:space:]]*$//' |
              sort -u |
              paste -sd, -
          })"

          if [ -z "$NORMALIZED_PLATFORMS" ]; then
            echo "FAIL: platforms must not be empty" >&2
            exit 1
          fi

          while IFS= read -r platform; do
            case "$platform" in
              linux/amd64|linux/arm64)
                ;;
              *)
                echo "FAIL: unsupported platform: $platform" >&2
                exit 1
                ;;
            esac
          done < <(printf '%s' "$NORMALIZED_PLATFORMS" | tr ',' '\n')

          echo "tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          echo "platforms=$NORMALIZED_PLATFORMS" >> "$GITHUB_OUTPUT"

      - name: Detect which services changed
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SOURCE_REF" != "refs/heads/main" ]; then
            echo "FAIL: production image promotion may only be dispatched from main" >&2
            exit 1
          fi

          SOURCE_SHORT_SHA="$(git rev-parse --short=7 "$SOURCE_SHA")"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "source_short_sha=$SOURCE_SHORT_SHA" >> "$GITHUB_OUTPUT"

          ALL_SORTED="$(printf '%s\n' $ALL_SERVICES | sort -u | paste -sd' ' -)"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "services=$ALL_SORTED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "services=$ALL_SORTED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(
            git -C "$GITHUB_WORKSPACE" diff --name-only \
              "$EVENT_BEFORE" \
              "$SOURCE_SHA" \
              -- "phase3 - information/techx-corp-platform"
          )"

          PREFIX="phase3 - information/techx-corp-platform/src/"
          SERVICES=""
          FULL=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              "$PREFIX"*)
                service="$(printf '%s' "$file" | sed "s|^$PREFIX||" | cut -d/ -f1)"
                if grep -Fqw -- "$service" <<< "$ALL_SERVICES"; then
                  SERVICES="$SERVICES $service"
                else
                  FULL=true
                fi
                ;;
              *)
                FULL=true
                ;;
            esac
          done <<< "$CHANGED"

          if [ "$FULL" = true ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "services=$ALL_SORTED" >> "$GITHUB_OUTPUT"
          elif [ -z "${SERVICES// }" ]; then
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "services=" >> "$GITHUB_OUTPUT"
          else
            UNIQUE_SERVICES="$(printf '%s\n' $SERVICES | sort -u | paste -sd' ' -)"
            echo "mode=scoped" >> "$GITHUB_OUTPUT"
            echo "services=$UNIQUE_SERVICES" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.scope.outputs.mode != 'none'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.scope.outputs.mode != 'none'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        if: steps.scope.outputs.mode != 'none'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.scope.outputs.mode != 'none'
        uses: docker/setup-buildx-action@v3

      - name: Point registry at TF3 ECR repository
        if: steps.scope.outputs.mode != 'none'
        run: |
          set -euo pipefail

          cat > .env.override <<EOF
          IMAGE_NAME=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          IMAGE_VERSION=${{ steps.vars.outputs.tag }}
          DEMO_VERSION=${{ steps.vars.outputs.tag }}
          EOF

      - name: Smoke build checkout
        if: steps.scope.outputs.mode == 'full'
        run: |
          set -euo pipefail
          docker compose build checkout

      - name: Create multiplatform builder
        if: steps.scope.outputs.mode != 'none'
        run: |
          set -euo pipefail
          make create-multiplatform-builder

      - name: Build local image candidates for the Trivy gate
        if: steps.scope.outputs.mode != 'none'
        env:
          BUILD_MODE: ${{ steps.scope.outputs.mode }}
          SCOPED_SERVICES: ${{ steps.scope.outputs.services }}
        run: |
          set -euo pipefail
          set -a
          . ./.env.override
          set +a

          SERVICES="$ALL_SERVICES"
          if [ "$BUILD_MODE" = "scoped" ]; then
            SERVICES="$SCOPED_SERVICES"
          fi

          for service in $SERVICES; do
            echo "Building local linux/amd64 candidate: $service"
            docker buildx bake -f docker-compose.yml "$service" \
              --set "${service}.platform=linux/amd64" \
              --set "${service}.output=type=docker"
          done

      - name: Install Trivy
        if: steps.scope.outputs.mode != 'none'
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan local image candidates with Trivy (blocking pre-push gate)
        if: steps.scope.outputs.mode != 'none'
        env:
          BUILD_MODE: ${{ steps.scope.outputs.mode }}
          SCOPED_SERVICES: ${{ steps.scope.outputs.services }}
        run: |
          set -euo pipefail
          set -a
          . ./.env.override
          set +a

          SERVICES="$ALL_SERVICES"
          if [ "$BUILD_MODE" = "scoped" ]; then
            SERVICES="$SCOPED_SERVICES"
          fi

          REPORT_ROOT="$GITHUB_WORKSPACE/trivy-reports/pre-push"
          mkdir -p "$REPORT_ROOT"

          for service in $SERVICES; do
            IMAGE="${IMAGE_NAME}:${IMAGE_VERSION}-${service}"
            REPORT="$REPORT_ROOT/${service}.json"

            echo "Writing pre-push vulnerability evidence for $IMAGE"
            trivy image \
              --scanners vuln \
              --format json \
              --output "$REPORT" \
              --no-progress \
              "$IMAGE"

            echo "Enforcing zero ${TRIVY_SEVERITIES} findings for $IMAGE"
            trivy image \
              --scanners vuln \
              --severity "$TRIVY_SEVERITIES" \
              --exit-code 1 \
              --no-progress \
              "$IMAGE"
          done

      - name: Upload pre-push Trivy reports
        if: always() && steps.scope.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-pre-push-${{ github.run_id }}-${{ github.run_attempt }}
          path: trivy-reports/pre-push/
          if-no-files-found: warn
          retention-days: 90

      - name: Build and push all pre-scanned app images
        if: steps.scope.outputs.mode == 'full'
        env:
          BUILD_PLATFORMS: ${{ steps.vars.outputs.platforms }}
        run: |
          set -euo pipefail
          set -a
          . ./.env.override
          set +a

          read -r -a SERVICES <<< "$ALL_SERVICES"

          docker buildx bake -f docker-compose.yml --push \
            --set "*.platform=$BUILD_PLATFORMS" \
            "${SERVICES[@]}"

      - name: Build and push pre-scanned changed service images only
        if: steps.scope.outputs.mode == 'scoped'
        env:
          BUILD_PLATFORMS: ${{ steps.vars.outputs.platforms }}
          SCOPED_SERVICES: ${{ steps.scope.outputs.services }}
        run: |
          set -euo pipefail
          set -a
          . ./.env.override
          set +a

          read -r -a SERVICES <<< "$SCOPED_SERVICES"

          docker buildx bake -f docker-compose.yml --push \
            --set "*.platform=$BUILD_PLATFORMS" \
            "${SERVICES[@]}"

      - name: Resolve pushed image metadata
        if: steps.scope.outputs.mode != 'none'
        env:
          EXPECTED_SERVICES: ${{ steps.scope.outputs.services }}
          BASE_TAG: ${{ steps.vars.outputs.tag }}
          BUILD_MODE: ${{ steps.scope.outputs.mode }}
          BUILD_PLATFORMS: ${{ steps.vars.outputs.platforms }}
          SOURCE_SHA: ${{ steps.scope.outputs.source_sha }}
          SOURCE_SHORT_SHA: ${{ steps.scope.outputs.source_short_sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          cat > approved-images.json <<EOF
          {
            "schemaVersion": 1,
            "repository": "${ECR_REPOSITORY}",
            "registry": "${ECR_REGISTRY}",
            "sourceSha": "${SOURCE_SHA}",
            "sourceShortSha": "${SOURCE_SHORT_SHA}",
            "workflowRunId": "${WORKFLOW_RUN_ID}",
            "workflowRunAttempt": "${WORKFLOW_RUN_ATTEMPT}",
            "mode": "${BUILD_MODE}",
            "baseTag": "${BASE_TAG}",
            "platforms": "${BUILD_PLATFORMS}",
            "services": []
          }
          EOF

          for service in $EXPECTED_SERVICES; do
            FULL_TAG="${BASE_TAG}-${service}"

            if [ "${#FULL_TAG}" -gt 128 ]; then
              echo "FAIL: full image tag exceeds Docker tag limit: $FULL_TAG" >&2
              exit 1
            fi

            success=false
            for attempt in {1..12}; do
              echo "Resolving digest for $FULL_TAG (attempt $attempt)..."

              if metadata="$(
                aws ecr describe-images \
                  --repository-name "$ECR_REPOSITORY" \
                  --image-ids "imageTag=$FULL_TAG" \
                  --region "$AWS_REGION" \
                  --query 'imageDetails[0].{digest:imageDigest,mediaType:imageManifestMediaType}' \
                  --output json 2>/dev/null
              )"; then
                if [ -n "$metadata" ] && [ "$metadata" != "null" ]; then
                  digest="$(jq -r '.digest // empty' <<< "$metadata")"
                  media_type="$(jq -r '.mediaType // empty' <<< "$metadata")"

                  if [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                    if [[ "$BUILD_PLATFORMS" == *,* ]]; then
                      case "$media_type" in
                        application/vnd.oci.image.index.v1+json|application/vnd.docker.distribution.manifest.list.v2+json)
                          ;;
                        *)
                          echo "FAIL: invalid media type $media_type for multi-platform image $FULL_TAG" >&2
                          exit 1
                          ;;
                      esac
                    fi

                    jq \
                      --arg name "$service" \
                      --arg tag "$FULL_TAG" \
                      --arg digest "$digest" \
                      --arg media_type "$media_type" \
                      '.services += [{
                        "name": $name,
                        "tag": $tag,
                        "digest": $digest,
                        "manifestMediaType": $media_type
                      }]' \
                      approved-images.json > approved-images.tmp.json

                    mv approved-images.tmp.json approved-images.json
                    success=true
                    break
                  fi
                fi
              fi

              sleep 5
            done

            if [ "$success" != true ]; then
              echo "FAIL: could not resolve a valid digest for $FULL_TAG" >&2
              exit 1
            fi
          done

          EXPECTED_SERVICES_JSON="$(
            printf '%s\n' $EXPECTED_SERVICES |
              jq -R . |
              jq -s 'sort'
          )"

          jq -e \
            --arg repository "$ECR_REPOSITORY" \
            --arg registry "$ECR_REGISTRY" \
            --arg source_sha "$SOURCE_SHA" \
            --arg source_short_sha "$SOURCE_SHORT_SHA" \
            --arg run_id "$WORKFLOW_RUN_ID" \
            --arg run_attempt "$WORKFLOW_RUN_ATTEMPT" \
            --arg mode "$BUILD_MODE" \
            --arg base_tag "$BASE_TAG" \
            --arg platforms "$BUILD_PLATFORMS" \
            --argjson expected_services "$EXPECTED_SERVICES_JSON" \
            '
              .schemaVersion == 1 and
              .repository == $repository and
              .registry == $registry and
              .sourceSha == $source_sha and
              .sourceShortSha == $source_short_sha and
              .workflowRunId == $run_id and
              .workflowRunAttempt == $run_attempt and
              .mode == $mode and
              .baseTag == $base_tag and
              .platforms == $platforms and
              ([.services[].name] | sort) == $expected_services and
              (([.services[].name] | length) == ([.services[].name] | unique | length)) and
              all(.services[];
                (.name | type == "string") and
                (.tag == ($base_tag + "-" + .name)) and
                (.digest | test("^sha256:[0-9a-f]{64}$")) and
                (.manifestMediaType | IN(
                  "application/vnd.oci.image.index.v1+json",
                  "application/vnd.docker.distribution.manifest.list.v2+json",
                  "application/vnd.oci.image.manifest.v1+json",
                  "application/vnd.docker.distribution.manifest.v2+json"
                ))
              )
            ' approved-images.json > /dev/null

      - name: Scan pushed immutable images with Trivy (blocking post-push gate)
        if: steps.scope.outputs.mode != 'none'
        env:
          BUILD_PLATFORMS: ${{ steps.vars.outputs.platforms }}
        run: |
          set -euo pipefail

          REPORT_ROOT="$GITHUB_WORKSPACE/trivy-reports/post-push"
          mkdir -p "$REPORT_ROOT"

          service_count="$(jq '.services | length' approved-images.json)"

          for ((index = 0; index < service_count; index++)); do
            service="$(jq -r ".services[$index].name" approved-images.json)"
            digest="$(jq -r ".services[$index].digest" approved-images.json)"
            image="${ECR_REGISTRY}/${ECR_REPOSITORY}@${digest}"

            while IFS= read -r platform; do
              safe_platform="${platform//\//-}"
              report="$REPORT_ROOT/${service}-${safe_platform}.json"

              echo "Writing immutable-image vulnerability evidence for $image ($platform)"
              trivy image \
                --scanners vuln \
                --platform "$platform" \
                --format json \
                --output "$report" \
                --no-progress \
                "$image"

              echo "Enforcing zero ${TRIVY_SEVERITIES} findings for $image ($platform)"
              trivy image \
                --scanners vuln \
                --platform "$platform" \
                --severity "$TRIVY_SEVERITIES" \
                --exit-code 1 \
                --no-progress \
                "$image"
            done < <(printf '%s' "$BUILD_PLATFORMS" | tr ',' '\n')
          done

      - name: Upload post-push Trivy reports
        if: always() && steps.scope.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-post-push-${{ github.run_id }}-${{ github.run_attempt }}
          path: trivy-reports/post-push/
          if-no-files-found: warn
          retention-days: 90

      - name: Install Cosign
        if: steps.scope.outputs.mode != 'none'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign and verify approved image digests with keyless Cosign
        if: steps.scope.outputs.mode != 'none'
        env:
          SOURCE_SHA: ${{ steps.scope.outputs.source_sha }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          EVIDENCE_ROOT="$GITHUB_WORKSPACE/release-evidence"
          VERIFY_ROOT="$EVIDENCE_ROOT/cosign"
          SUMMARY="$EVIDENCE_ROOT/signed-images.jsonl"
          EXPECTED_IDENTITY="https://github.com/${GITHUB_WORKFLOW_REF}"

          mkdir -p "$VERIFY_ROOT"
          : > "$SUMMARY"

          service_count="$(jq '.services | length' approved-images.json)"

          for ((index = 0; index < service_count; index++)); do
            service="$(jq -r ".services[$index].name" approved-images.json)"
            tag="$(jq -r ".services[$index].tag" approved-images.json)"
            digest="$(jq -r ".services[$index].digest" approved-images.json)"
            image="${ECR_REGISTRY}/${ECR_REPOSITORY}@${digest}"
            verify_report="$VERIFY_ROOT/${service}.json"

            echo "Signing $image"
            cosign sign --yes "$image"

            echo "Verifying $image as $EXPECTED_IDENTITY"
            cosign verify \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$EXPECTED_IDENTITY" \
              "$image" > "$verify_report"

            jq -nc \
              --arg service "$service" \
              --arg image "$image" \
              --arg tag "$tag" \
              --arg digest "$digest" \
              --arg source_sha "$SOURCE_SHA" \
              --arg run_id "$WORKFLOW_RUN_ID" \
              --arg run_attempt "$WORKFLOW_RUN_ATTEMPT" \
              --arg run_url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg workflow_identity "$EXPECTED_IDENTITY" \
              '{
                service: $service,
                image: $image,
                tag: $tag,
                digest: $digest,
                sourceSha: $source_sha,
                runId: $run_id,
                runAttempt: $run_attempt,
                runUrl: $run_url,
                workflowIdentity: $workflow_identity
              }' >> "$SUMMARY"
          done

      - name: Upload signed release evidence
        if: always() && steps.scope.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-evidence/
          if-no-files-found: warn
          retention-days: 90

      - name: Upload approved image manifest
        if: success() && steps.scope.outputs.mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: approved-images-${{ github.run_id }}-${{ github.run_attempt }}
          path: phase3 - information/techx-corp-platform/approved-images.json
          retention-days: 7
          if-no-files-found: error

  open-image-bump-pr:
    needs: build-scan
    if: >-
      ${{ needs.build-scan.result == 'success'
          && needs.build-scan.outputs.mode != 'none' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout approved source commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.build-scan.outputs.source_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install image-bump dependencies
        run: |
          set -euo pipefail
          python -m pip install \
            --disable-pip-version-check \
            -r scripts/ci/requirements-image-bump.txt

      - name: Run image-bump tests
        run: |
          set -euo pipefail
          python -m pytest --collect-only -q scripts/ci
          python -m pytest -q scripts/ci

      - name: Download approved image manifest
        uses: actions/download-artifact@v4
        with:
          name: approved-images-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Confirm approved image manifest exists
        run: |
          set -euo pipefail
          test -f approved-images.json
          test ! -L approved-images.json

      - name: Update values-prod.yaml
        env:
          EXPECTED_SOURCE_SHA: ${{ needs.build-scan.outputs.source_sha }}
          EXPECTED_SOURCE_SHORT_SHA: ${{ needs.build-scan.outputs.source_short_sha }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
          EXPECTED_RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_MODE: ${{ needs.build-scan.outputs.mode }}
          EXPECTED_BASE_TAG: ${{ needs.build-scan.outputs.base_tag }}
          EXPECTED_PLATFORMS: ${{ needs.build-scan.outputs.platforms }}
          EXPECTED_SERVICES: ${{ needs.build-scan.outputs.services }}
        run: |
          set -euo pipefail

          python3 scripts/ci/update-image-overrides.py \
            --values "phase3 - information/deploy/values-prod.yaml" \
            --manifest approved-images.json \
            --excluded-service flagd-ui \
            --summary-output image-bump-summary.json \
            --expected-source-sha "$EXPECTED_SOURCE_SHA" \
            --expected-source-short-sha "$EXPECTED_SOURCE_SHORT_SHA" \
            --expected-run-id "$EXPECTED_RUN_ID" \
            --expected-run-attempt "$EXPECTED_RUN_ATTEMPT" \
            --expected-mode "$EXPECTED_MODE" \
            --expected-registry "$ECR_REGISTRY" \
            --expected-repository "$ECR_REPOSITORY" \
            --expected-base-tag "$EXPECTED_BASE_TAG" \
            --expected-platforms "$EXPECTED_PLATFORMS" \
            --expected-services "$EXPECTED_SERVICES"

      - name: Validate exact Git diff
        run: |
          set -euo pipefail
          git diff --check

          mapfile -t changed_files < <(git diff --name-only)

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "no_changes=true" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "${#changed_files[@]}" -ne 1 ] || \
             [ "${changed_files[0]}" != "phase3 - information/deploy/values-prod.yaml" ]; then
            printf 'FAIL: unexpected changed files:\n' >&2
            printf '  %s\n' "${changed_files[@]}" >&2
            exit 1
          fi

          if git diff -- "phase3 - information/deploy/values-prod.yaml" |
             grep -Fq 'default.image.tag'; then
            echo "FAIL: default.image.tag was modified" >&2
            exit 1
          fi

      - name: Helm lint, render, and verify immutable images
        if: env.no_changes != 'true'
        run: |
          set -euo pipefail

          helm dependency build "phase3 - information/techx-corp-chart"

          helm lint "phase3 - information/techx-corp-chart" \
            -f "phase3 - information/techx-corp-chart/values.yaml" \
            -f "phase3 - information/deploy/values-flagd-sync.yaml" \
            -f "phase3 - information/deploy/values-prod.yaml"

          helm template techx-corp "phase3 - information/techx-corp-chart" \
            --namespace techx-tf3 \
            -f "phase3 - information/techx-corp-chart/values.yaml" \
            -f "phase3 - information/deploy/values-flagd-sync.yaml" \
            -f "phase3 - information/deploy/values-prod.yaml" \
            > /tmp/techx-rendered.yaml

          python3 scripts/ci/verify-rendered-images.py \
            --rendered /tmp/techx-rendered.yaml \
            --manifest approved-images.json \
            --registry "$ECR_REGISTRY" \
            --repository "$ECR_REPOSITORY" \
            --excluded-service flagd-ui

      - name: Push image-bump branch and create pull request
        if: env.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ needs.build-scan.outputs.source_sha }}
          SOURCE_SHORT_SHA: ${{ needs.build-scan.outputs.source_short_sha }}
          BUILD_MODE: ${{ needs.build-scan.outputs.mode }}
          BUILD_PLATFORMS: ${{ needs.build-scan.outputs.platforms }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          BRANCH_NAME="ci/bump-images-${{ github.run_id }}-${{ github.run_attempt }}"

          git config user.name "techx-image-bump[bot]"
          git config user.email "techx-image-bump[bot]@users.noreply.github.com"

          git switch -c "$BRANCH_NAME"
          git add -- "phase3 - information/deploy/values-prod.yaml"
          git diff --cached --check
          git commit -m "chore(deploy): bump images from ${SOURCE_SHORT_SHA}"

          LOCAL_SHA="$(git rev-parse HEAD)"
          REMOTE_SHA="$(
            git ls-remote origin "refs/heads/$BRANCH_NAME" |
              awk '{print $1}'
          )"

          if [ -n "$REMOTE_SHA" ]; then
            if [ "$LOCAL_SHA" != "$REMOTE_SHA" ]; then
              echo "FAIL: remote branch exists with a different commit" >&2
              echo "local:  $LOCAL_SHA" >&2
              echo "remote: $REMOTE_SHA" >&2
              exit 1
            fi
          else
            git push --set-upstream origin "$BRANCH_NAME"
            REMOTE_SHA="$(
              git ls-remote origin "refs/heads/$BRANCH_NAME" |
                awk '{print $1}'
            )"
          fi

          test -n "$REMOTE_SHA"
          test "$LOCAL_SHA" = "$REMOTE_SHA"

          service_count="$(jq '.services | length' approved-images.json)"

          {
            echo "## Automated image promotion"
            echo
            echo "Source commit: \`${SOURCE_SHA}\`"
            echo "Source workflow run: \`https://github.com/${REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}\`"
            echo "Attempt: \`${WORKFLOW_RUN_ATTEMPT}\`"
            echo "Build mode: \`${BUILD_MODE}\`"
            echo "Platforms: \`${BUILD_PLATFORMS}\`"
            echo "ECR registry: \`${ECR_REGISTRY}\`"
            echo "ECR repository: \`${ECR_REPOSITORY}\`"
            echo
            echo "| Service | Tag | Digest |"
            echo "|---|---|---|"
          } > pr_body.txt

          for ((index = 0; index < service_count; index++)); do
            service="$(jq -r ".services[$index].name" approved-images.json)"
            tag="$(jq -r ".services[$index].tag" approved-images.json)"
            digest="$(jq -r ".services[$index].digest" approved-images.json)"
            echo "| $service | $tag | $digest |" >> pr_body.txt
          done

          {
            echo
            echo "## Safety checks"
            echo "- [x] Local linux/amd64 candidates passed the Trivy HIGH/CRITICAL gate before ECR push."
            echo "- [x] Every published platform in each immutable ECR digest passed the Trivy HIGH/CRITICAL gate."
            echo "- [x] Approved digests were signed and verified with keyless Cosign."
            echo "- [x] Only services approved by the source workflow were changed."
            echo "- [x] \`default.image.tag\` was not changed."
            echo "- [x] Helm dependency build, lint, and production rendering passed."
            echo "- [x] Rendered workload images match the exact approved repository@digest references."
            echo
            echo "## Review requirement"
            echo "This PR does not deploy directly. Merge manually after review and required checks pass."
          } >> pr_body.txt

          if [ "$service_count" -eq 1 ]; then
            service="$(jq -r '.services[0].name' approved-images.json)"
            PR_TITLE="chore(deploy): bump $service image to ${SOURCE_SHORT_SHA}"
          else
            PR_TITLE="chore(deploy): bump ${service_count} images from ${SOURCE_SHORT_SHA}"
          fi

          EXISTING_PR_JSON="$(
            gh pr list \
              --state open \
              --head "$BRANCH_NAME" \
              --base main \
              --json url,headRefOid,baseRefName,state \
              --jq '.[0] // empty'
          )"

          if [ -n "$EXISTING_PR_JSON" ]; then
            EXISTING_HEAD_SHA="$(jq -r '.headRefOid' <<< "$EXISTING_PR_JSON")"
            EXISTING_BASE="$(jq -r '.baseRefName' <<< "$EXISTING_PR_JSON")"
            EXISTING_STATE="$(jq -r '.state' <<< "$EXISTING_PR_JSON")"

            test "$EXISTING_HEAD_SHA" = "$REMOTE_SHA"
            test "$EXISTING_BASE" = "main"
            test "$EXISTING_STATE" = "OPEN"

            echo "Pull request already exists and matches the remote branch."
            exit 0
          fi

          gh pr create \
            --title "$PR_TITLE" \
            --body-file pr_body.txt \
            --head "$BRANCH_NAME" \
            --base main

          CREATED_PR_JSON="$(
            gh pr list \
              --state open \
              --head "$BRANCH_NAME" \
              --base main \
              --json url,headRefOid,baseRefName,state \
              --jq '.[0] // empty'
          )"

          test -n "$CREATED_PR_JSON"
          test "$(jq -r '.headRefOid' <<< "$CREATED_PR_JSON")" = "$REMOTE_SHA"
          test "$(jq -r '.baseRefName' <<< "$CREATED_PR_JSON")" = "main"
          test "$(jq -r '.state' <<< "$CREATED_PR_JSON")" = "OPEN"