name: Immutable dependency audit

"on":
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Verify action and Docker digest drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Run immutable pin audit
        run: |
          set -euo pipefail
          mkdir -p artifacts/immutable
          python3 scripts/ci/verify-immutable-pins.py \
            --workflows \
            2>&1 | tee artifacts/immutable/audit.log

      - name: Upload audit evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: immutable-dependency-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/immutable/
          if-no-files-found: error
          retention-days: 90
