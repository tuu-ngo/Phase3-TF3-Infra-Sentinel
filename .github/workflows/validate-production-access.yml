name: Validate production access

"on":
  pull_request:
    paths:
      - "scripts/access/**"
      - "scripts/ci/test_production_access_contract.py"
      - "gitops/infrastructure/rbac-production-access.yaml"
      - "infra/live/production/**"
      - "infra/modules/eks-platform/**"
      - ".github/workflows/validate-production-access.yml"
  push:
    branches: [main]
    paths:
      - "scripts/access/**"
      - "scripts/ci/test_production_access_contract.py"
      - "gitops/infrastructure/rbac-production-access.yaml"
      - "infra/live/production/**"
      - "infra/modules/eks-platform/**"
      - ".github/workflows/validate-production-access.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate production access
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/live/production
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        working-directory: .
        run: python -m pip install --disable-pip-version-check pytest==8.4.1 PyYAML==6.0.2

      - name: Test bootstrap and access contracts
        working-directory: .
        env:
          PYTHONPATH: scripts/access
        run: python -m pytest scripts/access/test_bootstrap_iam_users.py scripts/ci/test_production_access_contract.py -q

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform without backend
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate
