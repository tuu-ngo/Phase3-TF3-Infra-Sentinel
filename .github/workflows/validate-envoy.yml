name: Validate Envoy Config (PM-154)

# Trigger khi có thay đổi envoy.tmpl.yaml trên PR hoặc push lên main/feat branches.
# Fail-fast: block merge nếu Envoy config không valid.
on:
  pull_request:
    paths:
      - "phase3 - information/techx-corp-platform/src/frontend-proxy/envoy.tmpl.yaml"
  push:
    branches: [main, "feat/*"]
    paths:
      - "phase3 - information/techx-corp-platform/src/frontend-proxy/envoy.tmpl.yaml"

jobs:
  validate-envoy:
    name: Render + validate envoy.tmpl.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install envsubst (gettext)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gettext-base

      - name: Render envoy.tmpl.yaml with test values
        # Tất cả biến phải được đặt để envsubst không để lại ${VAR} thô,
        # vì envoy --mode validate sẽ reject YAML với chuỗi ${...} literal.
        env:
          ENVOY_ADDR: "0.0.0.0"
          ENVOY_PORT: "8080"
          ENVOY_ADMIN_PORT: "9901"
          OTEL_SERVICE_NAME: "frontend-proxy"
          OTEL_COLLECTOR_HOST: "otel-collector"
          OTEL_COLLECTOR_PORT_GRPC: "4317"
          OTEL_COLLECTOR_PORT_HTTP: "4318"
          FRONTEND_HOST: "frontend"
          FRONTEND_PORT: "8080"
          IMAGE_PROVIDER_HOST: "image-provider"
          IMAGE_PROVIDER_PORT: "8081"
          FLAGD_HOST: "flagd"
          FLAGD_PORT: "8013"
          FLAGD_UI_HOST: "flagd-ui"
          FLAGD_UI_PORT: "4000"
          LOCUST_WEB_HOST: "loadgen"
          LOCUST_WEB_PORT: "8089"
          GRAFANA_HOST: "grafana"
          GRAFANA_PORT: "3000"
          JAEGER_HOST: "jaeger"
          JAEGER_UI_PORT: "16686"
        run: |
          set -euo pipefail
          TMPL="phase3 - information/techx-corp-platform/src/frontend-proxy/envoy.tmpl.yaml"
          OUT="/tmp/envoy-rendered.yaml"

          envsubst < "$TMPL" > "$OUT"
          echo "=== Rendered config (first 80 lines) ==="
          head -80 "$OUT"

          # Sanity check: không còn ${VAR} nào sót lại
          if grep -qE '\$\{[A-Z_]+\}' "$OUT"; then
            echo "ERROR: Unresolved template variables in rendered config:" >&2
            grep -nE '\$\{[A-Z_]+\}' "$OUT" >&2
            exit 1
          fi
          echo "✓ All variables resolved"

      - name: Validate Envoy config with official image
        run: |
          set -euo pipefail
          docker run --rm \
            -v /tmp/envoy-rendered.yaml:/etc/envoy/envoy.yaml:ro \
            envoyproxy/envoy:v1.34.10@sha256:3343a698c1bdfdbb174f1bd907dea789d728692f4f99a943e3e6f0bc5ef6513f \
            envoy --mode validate -c /etc/envoy/envoy.yaml

          echo "✓ Envoy config validation PASSED"

      - name: Upload rendered config as artifact (debug)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: envoy-rendered-config
          path: /tmp/envoy-rendered.yaml
          retention-days: 7
