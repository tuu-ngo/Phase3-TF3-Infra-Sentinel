# Mandate #2: metrics-server - nền tảng bắt buộc cho HPA + `kubectl top`.
# Hiện cluster KHÔNG có metrics-server (đã gỡ trước đó). ArgoCD App-of-Apps
# (techx-corp-bootstrap sync gitops/apps/) sẽ pick up file này.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: 3.12.2
    helm:
      values: |
        args:
          # EKS kubelet serving certs không khớp hostname mặc định -> cần flag này
          # để metrics-server scrape được node (nếu không sẽ x509/CrashLoop).
          - --kubelet-insecure-tls
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            memory: 200Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
