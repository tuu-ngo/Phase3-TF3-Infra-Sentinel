apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tuu-ngo/Phase3-TF3-Infra-Sentinel.git'
    targetRevision: main
    path: phase3 - information/techx-corp-chart
    helm:
      valueFiles:
        - values.yaml
        - ../deploy/values-flagd-sync.yaml
        - ../deploy/values-prod.yaml
        - ../deploy/values-aio-llm.yaml
      parameters:
        - name: default.image.repository
          value: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp
        - name: default.image.tag
          value: 58b13f2
        - name: components.frontend-proxy.ingress.enabled
          value: "false"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: techx-tf3
  # The rollout controller progressively scales its referenced Deployment down.
  # ArgoCD must not self-heal that controller-owned replica count back to 2.
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      name: checkout-rollout
      namespace: techx-tf3
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: checkout
      namespace: techx-tf3
      jsonPointers:
        - /spec/replicas
    # HPA owns scale for these Deployments; Argo CD owns all remaining fields.
    # Mandate #8 buoc 2: accounting them vao day de FREEZE duoc (scale=0 giu) trong cua so
    # cutover Postgres->RDS. accounting KHONG co HPA -> khong ai keo len -> scale=0 giu vinh vien
    # cho toi khi scale=1 lai. GO entry nay sau cutover de tra accounting ve ArgoCD-managed.
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: accounting
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: ad
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: cart
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: currency
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: frontend
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: frontend-proxy
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: product-catalog
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: product-reviews
      jsonPointers: [/spec/replicas]
    - group: apps
      kind: Deployment
      namespace: techx-tf3
      name: recommendation
      jsonPointers: [/spec/replicas]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
