apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tuu-ngo/Phase3-TF3-Infra-Sentinel.git'
    targetRevision: deploy/account-migration-gitops
    path: phase3 - information/techx-corp-chart
    helm:
      valueFiles:
        - values.yaml
        - ../deploy/values-flagd-sync.yaml
        - ../deploy/values-prod.yaml
      parameters:
        - name: default.image.repository
          value: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp
        - name: default.image.tag
          value: 58b13f2
        - name: components.frontend-proxy.ingress.enabled
          value: "false"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: techx-tf3
  # The rollout controller progressively scales its referenced Deployment down.
  # ArgoCD must not self-heal that controller-owned replica count back to 2.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: checkout
      namespace: techx-tf3
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
