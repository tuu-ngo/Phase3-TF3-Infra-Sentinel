apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.3.4
    helm:
      values: |
        # Mandate 5 (19/07, cap nhat theo de xuat
        # kyverno-kube-system-resources-proposal.md): thêm requests/limits.cpu
        # cho cả 4 controller - chart mặc định chỉ có requests.cpu/memory +
        # limits.memory, thiếu limits.cpu. Namespace kyverno bị loại trừ ở
        # tầng webhook validate.kyverno.svc-fail nên Kyverno không tự kiểm
        # tra được chính mình bằng ClusterPolicy - phải khai tường minh ở
        # đây thay vì trông chờ admission chặn.
        #
        # admissionController.limits.cpu để RỘNG (1000m, không siết chặt như
        # 300m ban đầu): admission webhook chạy đồng bộ trên đường deploy của
        # CẢ CLUSTER - nếu bị CPU throttle lúc burst (Karpenter scale-out,
        # GitOps sync lớn tạo nhiều pod cùng lúc), Kyverno có thể vượt quá
        # 10s timeout mặc định của webhook -> API server tự huỷ request ->
        # tê liệt luồng deploy toàn cụm. Giới hạn RAM vẫn giữ cứng (384Mi) vì
        # rủi ro memory leak chỉ ảnh hưởng OOMKill đúng 1 pod Kyverno, không
        # lan sang node/pod khác.
        # admissionController dùng field lồng qua `container:` (khác 3
        # controller còn lại) - đã verify bằng `helm template` trước khi ghi,
        # không đoán field path.
        admissionController:
          replicas: 1
          container:
            resources:
              requests:
                cpu: 100m
              limits:
                cpu: 1000m
        backgroundController:
          replicas: 1
          resources:
            requests:
              cpu: 100m
            limits:
              cpu: 500m
        reportsController:
          replicas: 1
          resources:
            requests:
              cpu: 100m
            limits:
              cpu: 500m
        cleanupController:
          replicas: 1
          resources:
            requests:
              cpu: 10m
            limits:
              cpu: 200m
        policyReportsCleanup:
          image:
            repository: bitnamilegacy/kubectl
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
