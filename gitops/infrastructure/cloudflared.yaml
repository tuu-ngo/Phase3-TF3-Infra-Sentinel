# REL-17: cloudflared runs as a plain Deployment inside techx-tf3, dialing OUT to
# Cloudflare's edge. It reaches the EKS API endpoint the same way kubelet already does
# (shared cluster/node security group) - no security-group change, no inbound port.
#
# The tunnel token Secret below is NOT created by this manifest on purpose - never commit
# a real token to a tracked file. Create it out of band after `terraform apply` in
# infra/live/production (module.cloudflare_access), same pattern already used for the
# flagd sync token:
#
#   kubectl -n techx-tf3 create secret generic cloudflared-tunnel-credentials \
#     --from-literal=token="$(terraform output -raw cloudflare_tunnel_token)"
#
# See docs/runbooks/cloudflare-zero-trust-access.md for the full sequence.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: techx-tf3
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: techx-corp
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.7.1
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-credentials
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
      # Two replicas on different nodes - one cloudflared pod dying shouldn't cut the
      # only path to the API server the way a single SSM bastion instance would.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: cloudflared
                topologyKey: kubernetes.io/hostname
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloudflared-pdb
  namespace: techx-tf3
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
