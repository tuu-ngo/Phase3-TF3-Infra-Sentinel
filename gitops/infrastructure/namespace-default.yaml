# Mandate 5 cluster-wide expansion (native, 22/07): pre-flight verify sạch
# (kubectl label --dry-run=server) trước khi ghi file này - không có vi phạm
# nào (namespace default chỉ có 1 pod, không đáng kể, nhưng vẫn nằm trong
# phạm vi "toàn cluster trừ kube-system").
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
