apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: techx-tf3
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        # PgBouncer là đường vào Postgres chính từ giờ (pooler). 3 service dưới đây giữ tạm
        # trong lúc transition (env DB host chuyển postgresql -> pgbouncer:6432 có thể sync
        # không đồng thời); siết còn mỗi pgbouncer ở PR follow-up sau khi mọi pod đã qua pooler.
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: pgbouncer
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: product-catalog
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: product-reviews
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: accounting
      ports:
        - protocol: TCP
          port: 5432
