# NetworkPolicy: default deny ingress+egress cho business pods
# Áp dụng cho tất cả pod business (component: các service chưa có NP riêng về egress)
# Pattern: tạo NP per-component với policyTypes [Ingress, Egress]
# Default là deny-all khi không có rule nào khớp.
# Mỗi service sẽ có NP riêng cho phép đúng luồng cần thiết.
---
# Egress DNS được allow riêng cho mỗi NP để tránh port 53 bị chặn
# Egress otel-collector được allow riêng cho mỗi NP để tránh PM-0006

# ── checkout ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkout-network-policy
  namespace: techx-tf3
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: checkout
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend-proxy
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend-proxy
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # OTel Collector (PM-0006: bắt buộc, thiếu → cascading failure)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
              component: agent-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # cart
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: cart
      ports:
        - protocol: TCP
          port: 8080
    # currency
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: currency
      ports:
        - protocol: TCP
          port: 8080
    # payment
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: payment
      ports:
        - protocol: TCP
          port: 8080
    # shipping
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: shipping
      ports:
        - protocol: TCP
          port: 8080
    # email
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: email
      ports:
        - protocol: TCP
          port: 8080
    # kafka
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: kafka
      ports:
        - protocol: TCP
          port: 9092
    # flagd (feature flags)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: flagd
      ports:
        - protocol: TCP
          port: 8013
        - protocol: TCP
          port: 8016
---
