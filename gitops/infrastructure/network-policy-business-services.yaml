apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-network-policy
  namespace: techx-tf3
  annotations:
    # TODO(SEC): Nếu Bedrock dùng VPC Endpoint thì xóa egress internet block này
