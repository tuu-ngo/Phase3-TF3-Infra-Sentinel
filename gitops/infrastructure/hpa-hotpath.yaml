# Mandate #2 (Cost + Reliability): HPA cho các service hot path browse+checkout.
# techx-infrastructure-app (ArgoCD) sync file này.
#
# minReplicas: 2 khớp REL-01 (baseline chống SPOF). maxReplicas có trần để không
# scale vô hạn vượt quota/ngân sách. Target CPU 65% giúp phản ứng sớm trong flash sale.
# Node burst do Karpenter Spot xử lý khi pod Pending; scaleDown giữ 2 phút để co xuống
# nhanh sau đỉnh nhưng không flap quá mạnh.
#
# Yêu cầu: metrics-server EKS add-on + CPU requests
# (LimitRange của CDO01 set default 100m). KHÔNG đặt HPA cho datastore (stateful).
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-proxy-hpa
  namespace: techx-tf3
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend-proxy }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120
