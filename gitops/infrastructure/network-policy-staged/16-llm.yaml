apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-business-policy
  namespace: techx-tf3
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: llm
  policyTypes: [Ingress, Egress]
  # Production product-reviews selects Bedrock. Enabling the local-LLM rollback
  # requires a reviewed policy change together with the provider change.
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: flagd
      ports:
        - { protocol: TCP, port: 8013 }
