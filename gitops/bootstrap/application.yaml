apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techx-corp-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/tuu-ngo/Phase3-TF3-Infra-Sentinel.git'
    targetRevision: main # Target main branch in production
    path: gitops/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
