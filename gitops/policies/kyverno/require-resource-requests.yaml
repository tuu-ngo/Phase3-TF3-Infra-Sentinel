apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests
  annotations:
    policies.kyverno.io/title: Require CPU and Memory Requests and Limits
    policies.kyverno.io/category: Cost Optimization
spec:
  # Phase 1 remains Audit. Promote only after controller templates and init
  # containers pass the rendered-manifest pre-flight check.
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-container-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
      validate:
        message: "Every container must define CPU/memory requests and limits."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"

    - name: require-init-container-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
      validate:
        message: "Every init container must define CPU/memory requests and limits."
        foreach:
          - list: "request.object.spec.initContainers || `[]`"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
