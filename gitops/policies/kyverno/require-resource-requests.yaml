apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests
  annotations:
    policies.kyverno.io/title: Require CPU and memory requests and limits
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-cpu-memory-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Cluster-wide (Mandate 5): kube-system/kyverno da bi webhook
              # validate.kyverno.svc-fail loai tru rieng. argocd/argo-rollouts
              # da duoc bo sung du request/limit (xem
              # docs/mandate-05-cluster-wide-scope-expansion.md) truoc khi mo
              # rong lai lan nay.
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "All containers and initContainers must define requests.cpu, requests.memory, limits.cpu, and limits.memory."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
          - list: "request.object.spec.initContainers || `[]`"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
