apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests
  annotations:
    policies.kyverno.io/title: Require CPU and memory requests and limits
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-cpu-memory-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Cluster-wide (Mandate 5, 19/07): bo namespaces: [techx-tf3].
              # kube-system/kyverno van duoc webhook loai tru rieng (xem
              # docs/mandate-05-cluster-wide-scope-expansion.md muc 1). argocd/
              # argo-rollouts/external-secrets da duoc bo sung du 4 field
              # truoc khi mo rong policy nay - argocd verify song 19/07 (10/10
              # container/init du field); argo-rollouts/kyverno da sua trong
              # Git (gitops/apps/{kyverno,argo-rollouts}-app.yaml), cho merge
              # + ArgoCD sync la len du - kyverno rieng khong can vi da bi
              # webhook loai tru.
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "All containers and initContainers must define requests.cpu, requests.memory, limits.cpu, and limits.memory."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
          - list: "request.object.spec.initContainers || `[]`"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
