apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests
  annotations:
    policies.kyverno.io/title: Require CPU and memory requests and limits
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-cpu-memory-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "All containers and initContainers must define requests.cpu, requests.memory, limits.cpu, and limits.memory."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
          - list: "request.object.spec.initContainers || `[]`"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
