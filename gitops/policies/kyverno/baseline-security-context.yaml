apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: custom-baseline-security-context
  annotations:
    policies.kyverno.io/title: Baseline Security Context
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-effective-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - kafka
          - resources:
              selector:
                matchLabels:
                  app: aiops-engine
      validate:
        message: "Containers and initContainers must run as non-root."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ to_string(lookup(element.securityContext || `{}`, 'runAsNonRoot')) }}"
                    operator: Equals
                    value: "false"
                  - key: "{{ element.securityContext.runAsNonRoot || request.object.spec.securityContext.runAsNonRoot || `false` }}"
                    operator: NotEquals
                    value: true
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ to_string(lookup(element.securityContext || `{}`, 'runAsNonRoot')) }}"
                    operator: Equals
                    value: "false"
                  - key: "{{ element.securityContext.runAsNonRoot || request.object.spec.securityContext.runAsNonRoot || `false` }}"
                    operator: NotEquals
                    value: true

    - name: deny-pod-run-as-user-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Pod runAsUser must not be 0."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.securityContext.runAsUser || `-1` }}"
                operator: Equals
                value: 0

    - name: deny-container-run-as-user-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - kafka
      validate:
        message: "Container and initContainer runAsUser must not be 0."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || `-1` }}"
                    operator: Equals
                    value: 0
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || `-1` }}"
                    operator: Equals
                    value: 0

    - name: deny-privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Privileged containers are not allowed."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.privileged || `false` }}"
                    operator: Equals
                    value: true
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.privileged || `false` }}"
                    operator: Equals
                    value: true

    - name: require-allow-privilege-escalation-false
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - kafka
          - resources:
              selector:
                matchLabels:
                  app: aiops-engine
      validate:
        message: "allowPrivilegeEscalation must be set to false."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                allowPrivilegeEscalation: false
          - list: "request.object.spec.initContainers || `[]`"
            pattern:
              securityContext:
                allowPrivilegeEscalation: false

    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  app: aiops-engine
      validate:
        message: "Containers must set runAsNonRoot: true."
        pattern:
          spec:
            containers:
              - securityContext:
                  runAsNonRoot: true

    - name: drop-all-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - kafka
          - resources:
              selector:
                matchLabels:
                  app: aiops-engine
      validate:
        message: "Containers and initContainers must drop all Linux capabilities."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                capabilities:
                  drop:
                    - ALL
          - list: "request.object.spec.initContainers || `[]`"
            pattern:
              securityContext:
                capabilities:
                  drop:
                    - ALL

    - name: require-seccomp-profile-runtime-default
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  app: aiops-engine
      validate:
        message: "A RuntimeDefault seccompProfile must be set at Pod or container level."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.seccompProfile.type || request.object.spec.securityContext.seccompProfile.type || '' }}"
                    operator: NotEquals
                    value: RuntimeDefault
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.seccompProfile.type || request.object.spec.securityContext.seccompProfile.type || '' }}"
                    operator: NotEquals
                    value: RuntimeDefault
