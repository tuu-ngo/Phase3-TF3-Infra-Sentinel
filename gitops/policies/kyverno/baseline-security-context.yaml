apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: custom-baseline-security-context
  annotations:
    policies.kyverno.io/title: Baseline Security Context
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-allow-privilege-escalation-false
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - kyverno
        - resources:
            namespaces:
              - techx-tf3
            selector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - currency
                - llm
                - product-reviews
      validate:
        message: "allowPrivilegeEscalation must be set to false."
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false

    - name: require-run-as-non-root
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - kyverno
        - resources:
            namespaces:
              - techx-tf3
            selector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - currency
                - llm
                - product-reviews
      validate:
        message: "Containers must set runAsNonRoot: true."
        pattern:
          spec:
            containers:
              - securityContext:
                  runAsNonRoot: true

    - name: drop-all-capabilities
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - kyverno
        - resources:
            namespaces:
              - techx-tf3
            selector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - currency
                - llm
                - product-reviews
      validate:
        message: "Containers must drop all capabilities."
        pattern:
          spec:
            containers:
              - securityContext:
                  capabilities:
                    drop:
                      - ALL

    - name: require-seccomp-profile-runtime-default
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - kyverno
        - resources:
            namespaces:
              - techx-tf3
            selector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - currency
                - llm
                - product-reviews
      validate:
        message: "seccompProfile must be set to RuntimeDefault."
        anyPattern:
          - spec:
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
          - spec:
              containers:
                - securityContext:
                    seccompProfile:
                      type: RuntimeDefault

    - name: require-init-containers-run-as-non-root
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - kyverno
        - resources:
            namespaces:
              - techx-tf3
            selector:
              matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - currency
                - llm
                - product-reviews
                - kafka
      validate:
        message: "Init containers must set runAsNonRoot: true."
        pattern:
          spec:
            initContainers:
              - securityContext:
                  runAsNonRoot: true
