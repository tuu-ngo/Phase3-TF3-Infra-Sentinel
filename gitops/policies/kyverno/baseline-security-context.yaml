apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: custom-baseline-security-context
  annotations:
    policies.kyverno.io/title: Baseline Security Context
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Enforce
  background: true
  # Cluster-wide (Mandate 5, 19/07): mọi rule dưới đây KHÔNG còn giới hạn
  # `namespaces: [techx-tf3]` - áp cho mọi namespace. kube-system và kyverno
  # KHÔNG cần loại trừ tường minh ở đây - webhook validate.kyverno.svc-fail
  # đã có namespaceSelector loại trừ 2 namespace đó ở tầng webhook (request
  # không bao giờ tới được Kyverno để đánh giá). Chi tiết + số liệu quét toàn
  # cluster trước khi mở rộng: docs/mandate-05-gap-analysis-20260718.md mục 8.
  rules:
    - name: require-effective-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.jobTemplate.spec.template.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.template.metadata.labels.\"app.kubernetes.io/name\" || '' }}"
            operator: NotEquals
            value: kafka
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.app || request.object.spec.jobTemplate.spec.template.metadata.labels.app || request.object.spec.template.metadata.labels.app || '' }}"
            operator: NotEquals
            value: aiops-engine
      validate:
        message: "Containers and initContainers must run as non-root."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ to_string(lookup(element.securityContext || `{}`, 'runAsNonRoot')) }}"
                    operator: Equals
                    value: "false"
                  - key: "{{ element.securityContext.runAsNonRoot || request.object.spec.jobTemplate.spec.template.spec.securityContext.runAsNonRoot || request.object.spec.template.spec.securityContext.runAsNonRoot || request.object.spec.securityContext.runAsNonRoot || `false` }}"
                    operator: NotEquals
                    value: true
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers || request.object.spec.template.spec.initContainers || request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ to_string(lookup(element.securityContext || `{}`, 'runAsNonRoot')) }}"
                    operator: Equals
                    value: "false"
                  - key: "{{ element.securityContext.runAsNonRoot || request.object.spec.jobTemplate.spec.template.spec.securityContext.runAsNonRoot || request.object.spec.template.spec.securityContext.runAsNonRoot || request.object.spec.securityContext.runAsNonRoot || `false` }}"
                    operator: NotEquals
                    value: true

    - name: deny-pod-run-as-user-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Pod runAsUser must not be 0."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.securityContext.runAsUser || request.object.spec.template.spec.securityContext.runAsUser || request.object.spec.securityContext.runAsUser || `-1` }}"
                operator: Equals
                value: 0

    - name: deny-container-run-as-user-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.jobTemplate.spec.template.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.template.metadata.labels.\"app.kubernetes.io/name\" || '' }}"
            operator: NotEquals
            value: kafka
      validate:
        message: "Container and initContainer runAsUser must not be 0."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || `-1` }}"
                    operator: Equals
                    value: 0
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers || request.object.spec.template.spec.initContainers || request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || `-1` }}"
                    operator: Equals
                    value: 0

    - name: deny-privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Privileged containers are not allowed."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.privileged || `false` }}"
                    operator: Equals
                    value: true
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers || request.object.spec.template.spec.initContainers || request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.privileged || `false` }}"
                    operator: Equals
                    value: true

    - name: require-allow-privilege-escalation-false
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.jobTemplate.spec.template.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.template.metadata.labels.\"app.kubernetes.io/name\" || '' }}"
            operator: NotEquals
            value: kafka
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.app || request.object.spec.jobTemplate.spec.template.metadata.labels.app || request.object.spec.template.metadata.labels.app || '' }}"
            operator: NotEquals
            value: aiops-engine
      validate:
        message: "allowPrivilegeEscalation must be set to false."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            pattern:
              securityContext:
                allowPrivilegeEscalation: false
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers || request.object.spec.template.spec.initContainers || request.object.spec.initContainers || `[]`"
            pattern:
              securityContext:
                allowPrivilegeEscalation: false

    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.app || request.object.spec.jobTemplate.spec.template.metadata.labels.app || request.object.spec.template.metadata.labels.app || '' }}"
            operator: NotEquals
            value: aiops-engine
      validate:
        message: "Containers must set runAsNonRoot: true."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsNonRoot || `false` }}"
                    operator: NotEquals
                    value: true

    - name: drop-all-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.jobTemplate.spec.template.metadata.labels.\"app.kubernetes.io/name\" || request.object.spec.template.metadata.labels.\"app.kubernetes.io/name\" || '' }}"
            operator: NotEquals
            value: kafka
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.app || request.object.spec.jobTemplate.spec.template.metadata.labels.app || request.object.spec.template.metadata.labels.app || '' }}"
            operator: NotEquals
            value: aiops-engine
      validate:
        message: "Containers and initContainers must drop all Linux capabilities."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            pattern:
              securityContext:
                capabilities:
                  drop:
                    - ALL
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers || request.object.spec.template.spec.initContainers || request.object.spec.initContainers || `[]`"
            pattern:
              securityContext:
                capabilities:
                  drop:
                    - ALL

    - name: require-seccomp-profile-runtime-default
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - ReplicaSet
                - ReplicationController
                - Rollout
              operations:
                - CREATE
                - UPDATE
      preconditions:
        all:
          - key: "{{ request.object.kind == 'Pod' && request.object.metadata.labels.app || request.object.spec.jobTemplate.spec.template.metadata.labels.app || request.object.spec.template.metadata.labels.app || '' }}"
            operator: NotEquals
            value: aiops-engine
      validate:
        message: "A RuntimeDefault seccompProfile must be set at Pod or container level."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers || request.object.spec.template.spec.containers || request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.seccompProfile.type || request.object.spec.jobTemplate.spec.template.spec.securityContext.seccompProfile.type || request.object.spec.template.spec.securityContext.seccompProfile.type || request.object.spec.securityContext.seccompProfile.type || '' }}"
                    operator: NotEquals
                    value: RuntimeDefault
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers || request.object.spec.template.spec.initContainers || request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.seccompProfile.type || request.object.spec.jobTemplate.spec.template.spec.securityContext.seccompProfile.type || request.object.spec.template.spec.securityContext.seccompProfile.type || request.object.spec.securityContext.seccompProfile.type || '' }}"
                    operator: NotEquals
                    value: RuntimeDefault
