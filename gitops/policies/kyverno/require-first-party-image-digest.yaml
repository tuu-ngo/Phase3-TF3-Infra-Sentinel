apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-first-party-image-digest
  annotations:
    policies.kyverno.io/title: Require immutable digest for TechX first-party ECR images
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-techx-ecr-sha256-digest
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  app.kubernetes.io/name: flagd
      validate:
        message: "Images from 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp must use @sha256:<64 lowercase hex>."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ regex_match('^197826770971\\.dkr\\.ecr\\.ap-southeast-1\\.amazonaws\\.com/techx-corp.*', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^197826770971\\.dkr\\.ecr\\.ap-southeast-1\\.amazonaws\\.com/techx-corp@sha256:[0-9a-f]{64}$', element.image) }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                all:
                  - key: "{{ regex_match('^197826770971\\.dkr\\.ecr\\.ap-southeast-1\\.amazonaws\\.com/techx-corp.*', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^197826770971\\.dkr\\.ecr\\.ap-southeast-1\\.amazonaws\\.com/techx-corp@sha256:[0-9a-f]{64}$', element.image) }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.ephemeralContainers || `[]`"
            deny:
              conditions:
                all:
                  - key: "{{ regex_match('^197826770971\\.dkr\\.ecr\\.ap-southeast-1\\.amazonaws\\.com/techx-corp.*', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^197826770971\\.dkr\\.ecr\\.ap-southeast-1\\.amazonaws\\.com/techx-corp@sha256:[0-9a-f]{64}$', element.image) }}"
                    operator: Equals
                    value: false
