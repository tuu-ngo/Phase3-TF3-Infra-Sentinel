apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow latest and implicit latest image references
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-explicit-non-latest-image-reference
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Cluster-wide (Mandate 5): áp cho mọi namespace, không riêng
              # techx-tf3. kube-system và kyverno KHÔNG cần loại trừ ở đây -
              # webhook validate.kyverno.svc-fail đã có namespaceSelector
              # loại trừ 2 namespace này ở tầng webhook rồi (xem
              # docs/mandate-05-gap-analysis-20260718.md mục 8.1), nên request
              # từ 2 namespace đó không bao giờ tới được Kyverno để đánh giá.
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Images must use an explicit non-latest tag or immutable digest."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(.+/)?[^/@]+:latest$', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^.+(:[^/]+|@sha256:[0-9a-f]{64})$', element.image) }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(.+/)?[^/@]+:latest$', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^.+(:[^/]+|@sha256:[0-9a-f]{64})$', element.image) }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.ephemeralContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(.+/)?[^/@]+:latest$', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^.+(:[^/]+|@sha256:[0-9a-f]{64})$', element.image) }}"
                    operator: Equals
                    value: false
