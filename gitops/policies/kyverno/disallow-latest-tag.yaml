apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow latest and implicit latest image references
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-explicit-non-latest-image-reference
      match:
        any:
          - resources:
              kinds:
                - Pod
              # Cluster-wide (Mandate 5): kube-system/kyverno da bi webhook
              # validate.kyverno.svc-fail loai tru rieng, khong can khai them
              # o day. Xem docs/mandate-05-cluster-wide-scope-expansion.md.
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Images must use an explicit non-latest tag or immutable digest."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(.+/)?[^/@]+:latest$', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^.+(:[^/]+|@sha256:[0-9a-f]{64})$', element.image) }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(.+/)?[^/@]+:latest$', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^.+(:[^/]+|@sha256:[0-9a-f]{64})$', element.image) }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.ephemeralContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ regex_match('^(.+/)?[^/@]+:latest$', element.image) }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('^.+(:[^/]+|@sha256:[0-9a-f]{64})$', element.image) }}"
                    operator: Equals
                    value: false
