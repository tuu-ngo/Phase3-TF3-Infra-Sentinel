apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow latest and implicit latest image references
    policies.kyverno.io/category: Mandate 5 Runtime Admission Enforcement
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-explicit-non-latest-image-reference
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - techx-tf3
              operations:
                - CREATE
                - UPDATE
      validate:
        message: "Images must use an explicit non-latest tag or immutable digest."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Matches
                    value: "^(.+/)?[^/@]+:latest$"
                  - key: "{{ element.image }}"
                    operator: NotMatches
                    value: "^.+(:[^/]+|@sha256:[0-9a-f]{64})$"
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Matches
                    value: "^(.+/)?[^/@]+:latest$"
                  - key: "{{ element.image }}"
                    operator: NotMatches
                    value: "^.+(:[^/]+|@sha256:[0-9a-f]{64})$"
          - list: "request.object.spec.ephemeralContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Matches
                    value: "^(.+/)?[^/@]+:latest$"
                  - key: "{{ element.image }}"
                    operator: NotMatches
                    value: "^.+(:[^/]+|@sha256:[0-9a-f]{64})$"
