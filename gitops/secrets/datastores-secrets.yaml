# Mandate #8: ExternalSecret for the 3 managed datastores. ESO syncs credentials from AWS
# Secrets Manager into K8s secrets in techx-tf3. These secrets are NOT referenced by any
# deployment until cutover (WS4), so applying this file is safe and changes no behavior.
# Reuses the existing ClusterSecretStore 'aws-secrets-manager' (see flagd-sync-token.yaml).
#
# Password values are quoted in every format so a rotated RDS password with special
# characters cannot break the connection string. RDS master password never leaves Secrets
# Manager (managed by RDS); ESO reads it via the IRSA policy created in Terraform.
---
# ---------- RDS PostgreSQL: renders 3 driver-specific connection strings ----------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-connection
  namespace: techx-tf3
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: techx-tf3-postgres-conn
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engine: v2
      data:
        # accounting (.NET / Npgsql). Password double-quoted (robust vs special chars).
        # SSL Mode=Require + Trust Server Certificate: encrypt in transit, no CA validation
        # (RDS is in a private subnet) - consistent with sslmode=require below.
        dotnet: 'Host=techx-tf3-postgres.czwcs2ocww3q.ap-southeast-1.rds.amazonaws.com;Port=5432;Username={{ .username }};Password="{{ .password }}";Database=otel;SSL Mode=Require;Trust Server Certificate=true'
        # product-catalog (Go / lib/pq). Keyword DSN (not URL) so no URL-encoding of the password.
        go-dsn: "host=techx-tf3-postgres.czwcs2ocww3q.ap-southeast-1.rds.amazonaws.com port=5432 user={{ .username }} password='{{ .password }}' dbname=otel sslmode=require"
        # product-reviews (Python / libpq).
        libpq: "host=techx-tf3-postgres.czwcs2ocww3q.ap-southeast-1.rds.amazonaws.com port=5432 user={{ .username }} password='{{ .password }}' dbname=otel sslmode=require"
  data:
    - secretKey: username
      remoteRef:
        key: "arn:aws:secretsmanager:ap-southeast-1:197826770971:secret:rds!db-78563b84-b60e-454b-a26f-6c25602a02e8-EpAVVG"
        property: username
    - secretKey: password
      remoteRef:
        key: "arn:aws:secretsmanager:ap-southeast-1:197826770971:secret:rds!db-78563b84-b60e-454b-a26f-6c25602a02e8-EpAVVG"
        property: password
---
# ---------- ElastiCache Valkey AUTH token ----------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valkey-auth
  namespace: techx-tf3
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: techx-tf3-valkey-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: auth_token
      remoteRef:
        key: "techx-tf3/elasticache-auth"
        property: auth_token
---
# ---------- MSK SASL/SCRAM credential ----------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kafka-scram
  namespace: techx-tf3
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: techx-tf3-kafka-scram
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: "AmazonMSK_techx-tf3/kafka-scram"
        property: username
    - secretKey: password
      remoteRef:
        key: "AmazonMSK_techx-tf3/kafka-scram"
        property: password
