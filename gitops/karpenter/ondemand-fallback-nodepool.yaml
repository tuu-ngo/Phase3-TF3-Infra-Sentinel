apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: elastic-ondemand-fallback
spec:
  weight: 10
  template:
    metadata:
      labels:
        techx.io/capacity: on-demand-fallback
        techx.io/workload: elastic
    spec:
      taints:
        - key: techx.io/workload
          value: elastic
          effect: NoSchedule
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4"]
        - key: karpenter.k8s.aws/instance-memory
          operator: Gt
          values: ["3072"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: elastic-ondemand-fallback
      expireAfter: 168h
      terminationGracePeriod: 10m
  limits:
    cpu: "4"
    memory: 16Gi
    nodes: 2
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
    budgets:
      - nodes: "0"
        reasons:
          - Drifted
          - Underutilized
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: elastic-ondemand-fallback
spec:
  role: KarpenterNodeRole-techx-corp-tf3
  amiFamily: AL2023
  associatePublicIPAddress: false
  amiSelectorTerms:
    - id: ami-06ec1dc854f03470c
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: techx-corp-tf3
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: techx-corp-tf3
  tags:
    karpenter.sh/discovery: techx-corp-tf3
    techx.io/mandate: "13"
    techx.io/capacity: on-demand-fallback
