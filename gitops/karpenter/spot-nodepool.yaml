apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: flash-sale-spot
spec:
  template:
    metadata:
      labels:
        techx.io/capacity: spot
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: flash-sale-spot
      expireAfter: 24h
  limits:
    cpu: "12"
    memory: 48Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    # TẠM tăng từ 2m lên 1h cho cửa sổ load test Mandate 2 (200 users) - 2m quá nhạy,
    # Karpenter đã evict pod checkout/otel-collector giữa lúc canary analysis đang đo,
    # gây latency spike giả làm rollout fail oan (xem docs/mandate-02-load-test-remediation-plan.md).
    # PHẢI đổi lại 2m ngay sau khi test xong, để lâu sẽ tốn thêm chi phí node không được tối ưu.
    consolidateAfter: 1h
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: flash-sale-spot
spec:
  role: KarpenterNodeRole-techx-corp-tf3
  amiFamily: AL2023
  associatePublicIPAddress: false
  amiSelectorTerms:
    - id: ami-06ec1dc854f03470c
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: techx-corp-tf3
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: techx-corp-tf3
  tags:
    karpenter.sh/discovery: techx-corp-tf3
    techx.io/mandate: "02"
    techx.io/capacity: spot
