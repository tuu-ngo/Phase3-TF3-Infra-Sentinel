apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: flash-sale-spot
spec:
  template:
    metadata:
      labels:
        techx.io/capacity: spot
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: flash-sale-spot
      expireAfter: 24h
  limits:
    cpu: "12"
    memory: 48Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    # Hạ về 3m (từ 1h) để "co xuống" sau load test hiện rõ nhanh cho report, thay vì đợi tới 1h.
    # An toàn vì 5 pod checkout-critical (cart/checkout/payment/shipping/quote) đã có
    # karpenter.sh/do-not-disrupt riêng (xem values-prod.yaml) - bảo vệ đúng nhóm đó bất kể
    # giá trị này, không phụ thuộc PDB (PDB chỉ đảm bảo còn ít nhất 1 pod sống, KHÔNG chặn
    # Karpenter evict 1/2 pod - đã xác nhận DISruptionsAllowed=1 trên cả 3 PDB payment/quote/
    # shipping ngay lúc đang 2/2 khỏe, đúng kiểu disruption đã gây 503/500 lần test trước).
    # Giá trị gốc trước Mandate 2 là 2m - đổi lại 2m sau khi xong, không cần giữ 3m vĩnh viễn.
    consolidateAfter: 3m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: flash-sale-spot
spec:
  role: KarpenterNodeRole-techx-corp-tf3
  amiFamily: AL2023
  associatePublicIPAddress: false
  amiSelectorTerms:
    - id: ami-06ec1dc854f03470c
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: techx-corp-tf3
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: techx-corp-tf3
  tags:
    karpenter.sh/discovery: techx-corp-tf3
    techx.io/mandate: "02"
    techx.io/capacity: spot
