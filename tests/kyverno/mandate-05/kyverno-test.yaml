apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: mandate-05-runtime-admission
policies:
  - ../../../gitops/policies/kyverno/require-resource-requests.yaml
  - ../../../gitops/policies/kyverno/baseline-security-context.yaml
  - ../../../gitops/policies/kyverno/disallow-latest-tag.yaml
  - ../../../gitops/policies/kyverno/require-first-party-image-digest.yaml
resources:
  - resources/pod-good-third-party.yaml
  - resources/pod-good-first-party-digest.yaml
  - resources/pod-missing-resources.yaml
  - resources/pod-root.yaml
  - resources/pod-nonroot-container-override.yaml
  - resources/pod-latest.yaml
  - resources/pod-first-party-tag.yaml
  - resources/pod-bad-init-container.yaml
  - resources/pod-insecure-baseline.yaml
  - resources/deployment-good-baseline.yaml
  - resources/deployment-bad-root.yaml
  - resources/deployment-aiops-exception.yaml
  - resources/deployment-kafka-exception.yaml
  - resources/deployment-controller-label-bypass.yaml
  - resources/statefulset-bad-root.yaml
  - resources/daemonset-bad-root.yaml
results:
  - policy: require-resource-requests
    rule: require-cpu-memory-requests-limits
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: require-resource-requests
    rule: require-cpu-memory-requests-limits
    resources:
      - mandate05-missing-resources
      - mandate05-bad-init
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: deny-pod-run-as-user-zero
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: deny-container-run-as-user-zero
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: deny-privileged-containers
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: require-allow-privilege-escalation-false
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: drop-all-capabilities
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: require-seccomp-profile-runtime-default
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-root
      - mandate05-nonroot-container-override
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: deny-pod-run-as-user-zero
    resources:
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: deny-container-run-as-user-zero
    resources:
      - mandate05-root
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: deny-privileged-containers
    resources:
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: require-allow-privilege-escalation-false
    resources:
      - mandate05-bad-init
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-root
      - mandate05-nonroot-container-override
      - mandate05-bad-init
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: drop-all-capabilities
    resources:
      - mandate05-bad-init
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: require-seccomp-profile-runtime-default
    resources:
      - mandate05-insecure-baseline
    kind: Pod
    result: fail
  - policy: disallow-latest-tag
    rule: require-explicit-non-latest-image-reference
    resources:
      - mandate05-good-third-party
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: disallow-latest-tag
    rule: require-explicit-non-latest-image-reference
    resources:
      - mandate05-latest
      - mandate05-bad-init
    kind: Pod
    result: fail
  - policy: require-first-party-image-digest
    rule: require-techx-ecr-sha256-digest
    resources:
      - mandate05-good-first-party
    kind: Pod
    result: pass
  - policy: require-first-party-image-digest
    rule: require-techx-ecr-sha256-digest
    resources:
      - mandate05-first-party-tag
    kind: Pod
    result: fail
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-good-controller
    kind: Deployment
    result: pass
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-bad-root-controller
      - mandate05-controller-label-bypass
    kind: Deployment
    result: fail
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-kafka-exception
      - mandate05-aiops-exception
    kind: Deployment
    result: skip
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-good-controller
      - mandate05-kafka-exception
    kind: Deployment
    result: pass
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-bad-root-controller
      - mandate05-controller-label-bypass
    kind: Deployment
    result: fail
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-aiops-exception
    kind: Deployment
    result: skip
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-bad-root-statefulset
    kind: StatefulSet
    result: fail
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-bad-root-statefulset
    kind: StatefulSet
    result: fail
  - policy: custom-baseline-security-context
    rule: require-effective-non-root
    resources:
      - mandate05-bad-root-daemonset
    kind: DaemonSet
    result: fail
  - policy: custom-baseline-security-context
    rule: require-run-as-non-root
    resources:
      - mandate05-bad-root-daemonset
    kind: DaemonSet
    result: fail
