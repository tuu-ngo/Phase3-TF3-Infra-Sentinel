apiVersion: v1
kind: Pod
metadata:
  name: mandate05-insecure-baseline
  namespace: techx-tf3
  labels:
    app.kubernetes.io/name: mandate05-test
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 0
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: registry.k8s.io/pause:3.10
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        privileged: true
        allowPrivilegeEscalation: true
        capabilities:
          add: ["NET_RAW"]
        seccompProfile:
          type: Unconfined
      resources:
        requests:
          cpu: 5m
          memory: 8Mi
        limits:
          cpu: 50m
          memory: 32Mi
