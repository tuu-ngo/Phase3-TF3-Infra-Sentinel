apiVersion: v1
kind: Pod
metadata:
  name: mandate05-first-party-tag
  namespace: techx-tf3
  labels:
    app.kubernetes.io/name: mandate05-test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp:example-frontend
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 5m
          memory: 8Mi
        limits:
          cpu: 50m
          memory: 32Mi
