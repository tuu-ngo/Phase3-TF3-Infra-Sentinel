apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandate05-explicitly-unsafe-controller
  namespace: techx-tf3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mandate05-explicitly-unsafe-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mandate05-explicitly-unsafe-controller
    spec:
      securityContext:
        runAsUser: 0
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: 197826770971.dkr.ecr.ap-southeast-1.amazonaws.com/techx-corp@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          securityContext:
            runAsUser: 0
            runAsNonRoot: true
            privileged: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
