apiVersion: v1
kind: Pod
metadata:
  name: mandate05-missing-cpu-resources
  namespace: techx-tf3
  labels:
    app.kubernetes.io/name: mandate05-test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: registry.k8s.io/pause:3.10
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          memory: 8Mi
        limits:
          memory: 32Mi
